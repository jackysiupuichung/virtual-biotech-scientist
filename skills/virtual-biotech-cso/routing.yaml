# query-intent → ClawBio skill routing map (used by the CSO orchestrator)
# Divisions mirror Zhang et al. 2026. Each entry: which skill answers which sub-question.

target_id_and_prioritization:
  germline_genetic_support:
    skill: gwas-lookup
    also: [fine-mapping, gwas-catalog-region-fetch]
    note: weak/absent signal is non-disqualifying for IO targets
  target_disease_association:            # <-- Open Targets target↔disease evidence breakdown
    skill: opentargets-association-evidence
    note: per-datatype evidence (genetic/somatic/known-drug/expression/...) linking target to disease
  somatic_mutation_frequency:            # <-- TCGA somatic-driver axis
    skill: tcga-somatic-profiler
    note: per-cancer-type somatic mutation frequency (GDC/TCGA); driver vs expression target
  single_cell_atlas_fetch:               # <-- data acquisition front-end (our skill)
    skill: cellxgene-fetch
    note: pulls a gene×tissue .h5ad slice from CELLxGENE Census (API, reproducible); feeds the two steps below
  cell_type_expression:
    skill: scrna-embedding
    consumes: cellxgene-fetch
    note: embeds/annotates the fetched atlas (raw-count fetch)
  cell_type_specificity:                 # <-- the gap we fill
    skill: celltype-specificity-profiler
    consumes: cellxgene-fetch
    note: tau + bimodality per gene on the fetched atlas; our upstream PR
  malignant_cell_localization:           # <-- is the antigen on tumour cells?
    skill: malignant-expression-profiler
    consumes: cellxgene-fetch
    note: malignant vs non-malignant expression on a tumour slice — the ADC/CAR-T efficacy axis
  functional_dependency:
    skill: crispr-screen-triage
    also: [opentargets-target-factors]    # OT geneEssentiality (DepMap), one API call

target_safety:
  prioritisation_safety_factors:          # <-- our OT factors skill
    skill: opentargets-target-factors
    note: genetic constraint, mouse-KO, bulk tissue specificity, safety liabilities (Open Targets)
  pathway_collateral:
    skill: pathway-enricher
    also: [turingdb-graph]
  off_target_expression:
    skill: celltype-specificity-profiler  # reuse: low specificity → broad-tissue risk
  post_market_adverse_events:             # <-- FDA Safety Officer (our skill)
    skill: openfda-safety
    note: FAERS adverse-event snapshot + boxed warning for a drug targeting the gene
  regulatory_safety_signals:
    skill: clinpgx

modality_selection:
  druggability_and_structure:
    skill: struct-predictor
    also: [omics-target-evidence-mapper, opentargets-target-factors]  # OT tractability + clinical stage

literature_and_landscape:                 # <-- current-web evidence (Tavily)
  recent_literature_and_competitive:
    skill: lit-synthesizer
    note: agentic Tavily web search — recent papers/preprints, competitive/clinical landscape, emerging safety; the natural reviewer re-route target for "is the evidence current?" gaps
    reroute_target: true                  # reviewer may route_to this to fill recency/competitive/safety gaps

clinical_officers:
  prior_trials_and_outcomes:
    skill: clinical-trial-finder
  fda_adverse_event_signals:
    skill: openfda-safety              # FDA Safety Officer also serves the clinical division
  trial_success_prior:
    skill: celltype-specificity-profiler  # --trial-prior flag
    note: correlational; label as Zhang et al. 2026

equity_heim:                              # stretch / Track 3
  cross_population_coverage:
    skill: equity-scorer
    also: [claw-ancestry-pca]
