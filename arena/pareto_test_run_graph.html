in melanoma tumours vs. stromal compartment vs. normal skin.", "Single-cell transcriptomics (tau specificity) for BRAF in melanoma tumours vs. stromal compartment vs. normal skin.", "Malignant-vs-stromal fractional expression for both targets in primary and metastatic melanoma tissue.", "Spatial transcriptomics or immunohistochemistry localizing FGFR2 and BRAF protein in situ within melanoma lesions.", "Expression profiling in disease-relevant cellular states (mutant-BRAF-driven vs. wild-type melanoma for BRAF; amplified vs. diploid for FGFR2)."]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses carry on-target safety liabilities due to their targets' essential developmental roles and broad knockout phenotypes. However, Hypothesis B (BRAF small-molecule) shows a more favorable safety profile on measurable grounds: (1) BRAF has 77 distinct mouse-knockout phenotypes versus FGFR2's 280\u2014a 3.6-fold reduction in pleiotropic risk signals; (2) BRAF carries 1 curated safety liability (heart disease) versus FGFR2's 0 curated liabilities, but the presence of a specific, known liability is more actionable and manageable than a broad, uncharacterized constellation of 280 phenotypes; (3) BRAF's small-molecule modality allows for more granular dosing control and selectivity tuning compared to an ADC, which delivers payload broadly once internalized and cannot be titrated post-delivery; (4) BRAF has clinical precedent (Phase 3 programme), meaning real-world safety data and managed adverse-event profiles are available, whereas FGFR2 as an ADC target in melanoma is untested clinically. The modest numerical difference in stated safety values (BRAF 0.512 vs. FGFR2 0.5) undersells BRAF's advantage because both are synthetic priors with equal confidence (0.6). The decisive advantage lies in the phenomenological evidence: fewer knockout phenotypes and an established drug safety database reduce uncertainty around the therapeutic window.", "decisive_evidence": ["BRAF has 77 mouse-knockout phenotypes vs. FGFR2's 280\u2014a 3.6-fold lower pleiotropy signal", "BRAF has 1 specific, curated safety liability (heart disease) vs. FGFR2's uncharacterized broad phenotypic burden", "BRAF small-molecule modality permits dose titration and selectivity optimization; ADC payload delivery is not reversible", "BRAF has Phase 3 clinical precedent with established safety/tolerability profile; FGFR2 ADC in melanoma is first-in-class with no clinical safety data"], "missing_evidence": ["Head-to-head ADC vs. small-molecule tolerability comparison in melanoma patients (modality-specific toxicity profile)", "On-target vs. off-target toxicity breakdown for each modality in the FGFR2 and BRAF pathways", "Measured single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets\u2014both remain synthetic priors at confidence 0.4", "Cardiac toxicity profile detail for BRAF small-molecules in practice (the 1 curated liability is mentioned but not quantified)", "ADC linker/payload contribution to safety risk for the FGFR2 hypothesis\u2014modality toxicity is not decomposed from target toxicity"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (BRAF) has a decisive clinical advantage on the right_patient axis. B reports real Phase 3 clinical precedent for a BRAF-directed drug in melanoma, meaning the patient population is already defined, stratification risk is largely retired, and meaningful endpoints have been established in practice. Hypothesis A (FGFR2) explicitly states 'no melanoma clinical precedent' and must establish both the patient population and enrichment biomarker de novo, carrying first-in-class stratification risk. While both hypotheses acknowledge unmeasured tissue specificity, B's existing clinical footprint directly addresses patient definition, population enrichment, and clinical relevance\u2014the core elements of the right_patient axis. A's synthetic biomarker stratum and absence of clinical validation create material uncertainty about whether a meaningful treatable population can be identified.", "decisive_evidence": ["B has Phase 3 clinical precedent in melanoma (Open Targets drugAndClinicalCandidates); A has no clinical precedent", "B's patient stratification and endpoint risk is 'largely retired'; A must establish stratification de novo", "B's confidence in right_patient (0.7) is substantially higher than A's (0.4), reflecting the difference between validated and synthetic patient definitions"], "missing_evidence": ["Specific biomarker enrichment criteria for B (noted as synthetic placeholder)", "Prevalence and clinical actionability of FGFR2 amplification or mutation in melanoma cohorts (would strengthen A if present)", "Real-world unmet need in BRAF-resistant or BRAF-wild-type melanoma that FGFR2 might address (would contextualize A's value relative to B)"]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "On commercial attractiveness and strategic whitespace, Hypothesis B (BRAF small-molecule) holds a material advantage over Hypothesis A (FGFR2 ADC), despite both operating in a crowded competitive space. B benefits from an established clinical precedent (Phase 3 drug already in melanoma), which de-risks patient stratification and market entry timing. This translates to clearer commercial pathway, defined payer/reimbursement precedent, and lower regulatory uncertainty. In contrast, A must establish both a novel patient biomarker and first-in-class FGFR2 melanoma stratification from scratch, adding commercial risk and time-to-value friction. Both hypotheses face similar competitive crowding on their respective targets (reflected in comparable commercial axis scores of 0.336 vs 0.3), so differentiation depends on modality novelty and clinical positioning. B's small-molecule platform is more commoditized than A's ADC, which could argue for A if the ADC modality and payload were distinctive\u2014but the reports provide no evidence of payload innovation or mechanistic differentiation beyond target choice. The absence of claimed whitespace advantages for either target means B's clinical-stage advantage becomes the decisive commercial signal.", "decisive_evidence": ["B has Phase 3 clinical precedent in melanoma (Open Targets drugAndClinicalCandidates), establishing defined patient population and reimbursement pathway.", "A has no melanoma clinical footprint for FGFR2 and must establish biomarker stratification de novo, adding first-in-class commercial risk.", "Both targets are high-association, crowded fields (A: 0.545 OT score; B: 0.701 OT score), so neither gains whitespace from target choice alone.", "B's small-molecule modality is clinically validated; A's ADC modality for FGFR2 melanoma is unproven in clinic.", "A's right_tissue axis (0.82) is a designed prior, not measured data; B's right_tissue (0.72) is also synthetic but less optimistic about tissue specificity, which is more honest about commercial risk."], "missing_evidence": ["Explicit competitor landscape for FGFR2 ADCs vs BRAF small-molecules in melanoma (both use synthetic competitor approximation).", "Payload or linker differentiation strategy for A's ADC that might claim commercial whitespace vs existing BRAF programs.", "Market size and payer positioning for BRAF resistance biomarker vs de novo FGFR2 melanoma sub-population.", "Actual measured single-cell tissue specificity (tau) and malignant-fraction data for both targets (both flagged as highest-VoI experiments).", "Intellectual property landscape and freedom-to-operate constraints for each modality in melanoma."]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (BRAF small molecule) demonstrates substantially higher tractability than Hypothesis A (FGFR2 ADC) on multiple direct, grounded criteria. BRAF satisfies the highest-evidence tractability buckets: Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, and Druggable Family. This represents clinical validation and de-risked chemistry. FGFR2 ADC satisfies only the basic AB-modality buckets (Advanced Clinical, GO CC, UniProt localization, signal peptide/TMHMM), which confirm cell-surface accessibility but lack direct modality precedent, approved drugs, or high-quality ligands specific to the ADC payload-linker-target combination. The confidence difference is explicit: BRAF tractability = 0.9 (strong); FGFR2 tractability = 0.6 (moderate). BRAF starts from approved small-molecule precedent, eliminating early-stage chemistry risk. FGFR2 as an ADC target has no clinical footprint in the ADC modality for melanoma, requiring both linker-payload optimization and ADC-specific assay development. Additionally, BRAF's kinase domain is a well-characterized druggable pocket with extensive SAR literature; FGFR2 requires ADC-specific engineering to overcome its broad developmental liabilities (280 mouse KO phenotypes vs BRAF's 77). The modality-target fit is tighter for BRAF small molecule (kinase inhibitor precedent) than FGFR2 ADC (cell-surface targeting without established clinical validation in this disease context).", "decisive_evidence": ["BRAF tractability = 0.9 (Approved Drug bucket satisfied); FGFR2 tractability = 0.6 (Advanced Clinical bucket only)", "BRAF has clinical precedent: PHASE_3 drug in melanoma (from Open Targets drugAndClinicalCandidates)", "BRAF satisfies Structure with Ligand, High-Quality Ligand, High-Quality Pocket criteria; FGFR2 lacks explicit ligand quality or pocket-specific evidence", "BRAF kinase domain is a well-validated druggable pocket with approved inhibitors; FGFR2 ADC modality lacks approved precedent in this indication", "FGFR2 has 280 mouse KO phenotypes (broader developmental role) vs BRAF's 77, increasing on-target toxicity risk and narrowing therapeutic window for ADC payload delivery", "BRAF small molecule modality matches a well-characterized target class (kinase); FGFR2 ADC requires bespoke payload-linker-cell-surface engineering without melanoma validation"], "missing_evidence": ["Specific FGFR2 ADC ligand binding affinity, selectivity, and developability data (no SAR literature cited)", "Head-to-head ADC payload-linker optimization studies for FGFR2 vs competing cell-surface targets", "BRAF small-molecule resistance mutations and acquired-resistance prevalence in melanoma (affects long-term tractability)", "FGFR2 ADC tissue penetration and tumor microenvironment delivery kinetics (critical for ADC efficacy)", "Comparative assayability: BRAF kinase assay accessibility vs FGFR2 ADC internalization / payload release assays"]}}}, {"hypothesis_a": "H14", "hypothesis_b": "H1", "relation": "tradeoff_or_unresolved", "dominator": null, "dominated": null, "comparison_summary": {"overall_relation": "tradeoff_or_unresolved", "strictly_better_axes_for_A": ["right_safety"], "strictly_better_axes_for_B": ["right_target", "right_tissue", "right_patient", "right_commercial", "tractability"], "tied_axes": [], "unresolved_axes": [], "reason": "both_sides_have_advantages"}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "Both hypotheses present strong, multi-modal causal support for their respective targets in cutaneous melanoma, but BRAF (Hypothesis B) demonstrates materially superior evidence on the right_target axis. BRAF has a higher Open Targets disease association score (0.701 vs 0.544), representing a 28.8% quantitative advantage. More importantly, BRAF shows loss-of-function constraint (LOEUF o/e = 0.15), placing it in the constrained tail and providing stronger mechanistic causality evidence that the gene is genuinely required for melanoma biology. ATR's LOEUF (0.45) falls in the tolerant range, which weakly argues against essential-gene toxicity but also weakens the causal signal\u2014a gene can be tolerant to loss-of-function while still being relevant, but constraint provides a stronger prior for true target causality. BRAF is the archetypal somatic driver mutation in melanoma (BRAF V600E is present in ~50% of cutaneous melanomas), providing direct somatic genetic evidence. This represents curated, experimentally grounded disease biology evidence. ATR, while sitting on relevant pathways (DNA damage response, TP53 regulation), lacks this direct somatic driver status in melanoma. Both have comparable pathway involvement and similar evidence sources, but the somatic driver mutation status and LoF constraint differential decisively favor BRAF for target causality strength.", "decisive_evidence": ["BRAF Open Targets disease association (0.701) significantly exceeds ATR (0.544)", "BRAF LOEUF o/e = 0.15 (constrained) vs ATR LOEUF o/e = 0.45 (tolerant)\u2014LoF constraint is a mechanistic causality signal", "BRAF V600E is the archetypal somatic driver mutation in ~50% of cutaneous melanomas\u2014direct somatic genetics evidence", "BRAF sits on Gain-of-function MRAS complexes activate RAF signaling\u2014oncogenic activation pathway", "ATR is a DNA damage sensor kinase, relevant to genotoxic stress but without melanoma-specific somatic driver status"], "missing_evidence": ["Mechanistic details on why ATR constraint tolerance does not diminish its melanoma causality", "Quantitative somatic mutation prevalence or functional impact comparisons between ATR and BRAF in melanoma cohorts", "Pathway-level perturbation data (CRISPR, RNAi) specifically in melanoma cell lines to compare on-target causality"]}, "right_tissue": {"axis": "right_tissue", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses explicitly acknowledge that single-cell tissue specificity (tau) and malignant-vs-stromal fraction are unmeasured and unavailable from Open Targets, placing both on equal footing regarding direct evidence. However, they differ materially in their prior assumptions about tissue context relevance. Hypothesis B grounds its prior in a disease-specific, mechanistic context: 'mutant-BRAF melanoma is the definitional driver context,' meaning BRAF's role in melanoma is established through oncogenic mutation in the malignant compartment itself. This is a stronger tissue-context anchor than Hypothesis A's prior of 'broadly expressed / non-specific: housekeeping replication-stress kinase; no tumour restriction.' ATR is a generic checkpoint kinase active across all proliferating cells and tissues, whereas mutant BRAF is a driver oncogene specifically enriched in melanoma malignant cells. In the absence of measured single-cell data, the mechanistic prior that links the target to the disease state and malignant compartment (B) is more credible than a generic housekeeping prior (A). Neither hypothesis provides direct spatial, single-cell, or disease-tissue-specific experimental evidence, but B's contextual assumption is less synthetic and more disease-grounded.", "decisive_evidence": ["Hypothesis B: 'mutant-BRAF melanoma is the definitional driver context' \u2014 establishes BRAF as a malignancy-specific oncogenic driver, anchoring tissue relevance to the disease state itself.", "Hypothesis A: 'broadly expressed / non-specific: housekeeping replication-stress kinase; no tumour restriction' \u2014 ATR is not restricted to malignant tissue; it is a universal checkpoint kinase, weakening the tissue-specificity prior.", "Both hypotheses explicitly state single-cell tau and malignant-vs-stromal fraction are unmeasured (synthetic_parts=true, confidence=0.4)."], "missing_evidence": ["Single-cell RNA-seq or spatial transcriptomics quantifying ATR and BRAF expression in melanoma malignant cells vs. stromal and normal skin tissue.", "Tau (tissue-specificity score) for both targets in melanoma tissue context.", "Malignant-cell fraction enrichment: direct comparison of ATR and BRAF expression in sorted malignant vs. stromal melanoma compartments.", "Disease-state-specific evidence: differential expression of ATR and BRAF in melanoma lesions vs. healthy skin or non-melanoma tissues.", "Patient-stratification data: frequency of ATR or BRAF dependency in melanoma patient-derived tumors or cell lines."]}, "right_safety": {"axis": "right_safety", "relation": "A_better", "confidence": "medium", "rationale": "Both hypotheses face significant safety headwinds due to broad developmental/essential roles and extensive knockout phenotypes, but Hypothesis A (ATR) shows a modestly better safety margin on the measured evidence. ATR has 70 mouse-knockout phenotypes with 0 curated safety liabilities, while BRAF has 77 knockout phenotypes with 1 explicit curated safety liability (heart disease). The curated liability for BRAF\u2014cardiac toxicity\u2014is particularly concerning in melanoma patients, many of whom may have prior sun exposure or other comorbidities requiring careful cardiotoxicity surveillance. Additionally, BRAF's LOEUF of 0.15 (constrained tail, intolerant to loss-of-function) raises a higher mechanistic on-target-toxicity flag compared to ATR's LOEUF of 0.45 (tolerant range), suggesting BRAF's essential functions are less dispensable systemically. Both targets require tumour-selective delivery or dosing to narrow a therapeutically risky window, but ATR's lack of curated safety liabilities and slightly better genetic constraint metrics suggest a marginally better safety profile. Neither hypothesis has measured single-cell tissue specificity or malignant-fraction data, so neither can yet leverage selectivity to mitigate systemic toxicity risk\u2014this unmeasured axis represents the true safety lever for both.", "decisive_evidence": ["BRAF carries 1 curated safety liability (heart disease); ATR carries 0 curated liabilities\u2014a measurable differentiation on the safety axis.", "BRAF LOEUF = 0.15 (constrained, intolerant to LoF); ATR LOEUF = 0.45 (tolerant range)\u2014ATR's genetic tolerance suggests less essential developmental role and lower on-target systemic toxicity risk.", "Both show extensive mouse-knockout phenotypes (BRAF 77, ATR 70) indicating broad tissue impact, but the magnitude difference is modest and offset by the liability and constraint signals."], "missing_evidence": ["Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets\u2014this is the critical unmeasured axis that could materially change safety ranking if either hypothesis shows strong tumour selectivity.", "Clinical safety data from any ATR or BRAF small-molecule programme (neither has precedent in melanoma, though BRAF has phase-3 in melanoma for a different modality); preclinical safety pharmacology (organ toxicity panels, DLT margins in mouse/non-human primate).", "On-target vs. off-target toxicity attribution\u2014BRAF's cardiac liability could be a direct kinase effect or a tissue-distribution artefact; ATR's broader phenotype profile needs mechanistic disambiguation.", "Genetic association of common variants in BRAF vs. ATR with heart disease, neural development, or bone marrow function in human populations\u2014would strengthen the genetic constraint interpretation."]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (BRAF) has established clinical precedent with a Phase 3 programme in melanoma, meaning the patient population is already defined and the stratification/endpoint risk is largely retired. Hypothesis A (ATR) has no clinical footprint in melanoma and would require de novo establishment of both patient population and biomarker, carrying first-in-class stratification risk. On the right_patient axis specifically\u2014which measures defined patient populations, biomarkers, clinical precedent, meaningful endpoints, and plausible therapeutic benefit\u2014BRAF's existing clinical validation provides direct, measured evidence of patient relevance, while ATR's complete absence of clinical data leaves both population definition and biomarker enrichment as unresolved synthetic assumptions.", "decisive_evidence": ["BRAF has real clinical precedent: PHASE_3 programme exists in melanoma (Open Targets drugAndClinicalCandidates), establishing a defined treatable patient population", "ATR has zero melanoma clinical precedent, requiring de novo population stratification and biomarker discovery", "BRAF's patient axis score (0.85, confidence 0.7) is grounded in existing clinical validation; ATR's score (0.35, confidence 0.4) is acknowledged as synthetic with no clinical footprint"], "missing_evidence": ["Specific biomarker sub-populations for BRAF enrichment (noted as synthetic placeholder in B)", "Single-cell tissue specificity data for both targets (tier-3 experiment proposed for both)", "BRAF Phase 3 programme's exact endpoint definitions and patient selection criteria", "ATR's unmet-need quantification in melanoma (no baseline clinical anchor)"]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses target crowded fields with weak explicit commercial differentiation signals (H14: 0.337, H1: 0.3). However, B demonstrates materially stronger commercial positioning through clinical precedent and de-risked tractability. BRAF has an approved small-molecule drug and a Phase 3 programme in melanoma, establishing an existing market, defined patient population, and proven chemistry pathway. This creates clear competitive benchmarks and a faster path to differentiation via modality, payload, or patient enrichment rather than target discovery. ATR, by contrast, carries first-in-class stratification risk with no clinical footprint in melanoma and only moderate tractability (vs. BRAF's strong, proven track record). While both targets are well-associated with melanoma, BRAF's commercial whitespace is defined by the opportunity to improve upon existing therapies (resistance, safety, dosing), whereas ATR must establish market demand from scratch. Neither hypothesis demonstrates strong absolute commercial attractiveness, but B's clinical and regulatory precedent provides a materially clearer commercial narrative and lower go-to-market risk.", "decisive_evidence": ["BRAF has Phase 3 clinical candidate in melanoma (H1 right_patient = 0.85, confidence 0.7); ATR has no clinical footprint (H14 right_patient = 0.35, confidence 0.4)", "BRAF tractability includes Approved Drug + Structure with Ligand + High-Quality Ligand (H1 tractability = 0.9); ATR tractability is Advanced Clinical + High-Quality Ligand only (H14 tractability = 0.6)", "BRAF association score (0.701) is notably higher than ATR (0.544), indicating stronger multi-modal validation and likely more established competitive landscape with clearer differentiation vectors", "BRAF safety liability is curated and specific (heart disease); ATR safety is broader (70 phenotypes, no specificity), making BRAF's on-target toxicity risk more targeted and potentially more addressable"], "missing_evidence": ["Explicit competitor count and market size for ATR vs. BRAF in melanoma (both synthetic approximations)", "Actual pricing power, IP landscape, and patent cliff exposure for both targets", "Resistance mechanism data and clinical unmet need magnitude in BRAF-resistant vs. ATR-na\u00efve populations", "Quantified commercial differentiation strategy (modality innovation, combination potential, indication expansion pathway) for each hypothesis", "Measured single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets (both unmeasured, cost tier 3)"]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "On tractability (feasibility of modulating the target with the proposed modality), Hypothesis B (BRAF) has a decisive advantage over Hypothesis A (ATR) due to direct clinical precedent and more mature ligand evidence. BRAF satisfies the highest-confidence tractability buckets: Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, and Druggable Family. This means the chemistry is de-risked, binding pockets are well-characterized, and multiple high-quality ligands exist\u2014including one already approved for clinical use. ATR, by contrast, satisfies only Advanced Clinical, High-Quality Ligand, and Druggable Family, which denotes a druggable family membership and some good ligands, but lacks approved-drug precedent and the fuller structural/ligand maturity package. For tractability specifically, an approved drug is the highest-grade evidence of modulation feasibility; it directly supersedes preclinical or early-stage clinical evidence. ATR's tractability is credible but fundamentally less de-risked because it has not yet reached the clinical proof-of-concept milestone that BRAF has already achieved. The modality-target fit is stronger for BRAF because the path from target to molecule is proven; for ATR, that path remains prospective.", "decisive_evidence": ["BRAF: Approved Drug status in Open Targets tractability buckets\u2014direct clinical evidence of successful small-molecule modulation.", "BRAF: Structure with Ligand + High-Quality Pocket\u2014mature structural and ligand knowledge base enabling rapid optimization.", "ATR: Advanced Clinical only (no Approved Drug)\u2014lacks the highest-confidence precedent for this modality.", "ATR: High-Quality Ligand present but without approved-drug backing\u2014chemical feasibility is plausible but not yet clinically validated.", "Both targets satisfy Druggable Family, but BRAF's additional buckets (Approved Drug, Structure with Ligand, High-Quality Pocket) compound the advantage."], "missing_evidence": ["Explicit binding-affinity and selectivity data for lead BRAF vs. ATR small molecules (would strengthen but not change the relation, given approved-drug precedent for BRAF).", "Assay robustness and screening hit rates for ATR (would refine tractability confidence but unlikely to overcome approved-drug advantage).", "Delivery-related feasibility metrics (both are small molecules, so delivery is not a differentiator on this axis)."]}}}, {"hypothesis_a": "H14", "hypothesis_b": "H3", "relation": "B_dominates_A", "dominator": "H3", "dominated": "H14", "comparison_summary": {"overall_relation": "B_dominates_A", "strictly_better_axes": ["right_target", "right_tissue", "right_safety", "right_patient", "right_commercial", "tractability"], "tied_axes": [], "worse_axes": [], "unresolved_axes": []}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses rest on curated, multi-modal disease-association evidence from Open Targets (genetic, somatic, pathway, and literature integration), making them materially grounded on the right_target axis. However, MAP2K2 (B) carries a higher overall association score (0.658 vs. 0.544) and crucially has clinical validation: an existing PHASE_3 programme in melanoma directly de-risks the causal link between target modulation and clinical benefit. ATR (A) lacks any clinical precedent and must establish causality in humans de novo. Both targets sit on relevant MAPK/DNA-damage pathways, but MAP2K2's clinical footprint represents a stronger form of mechanistic evidence\u2014one that has survived translation to human disease. The LOEUF constraint scores are similar (0.45 vs. 0.61, both tolerant), so neither is penalized for essential-gene toxicity at the population level. The deciding factor is that B's higher association score combined with real clinical precedent (Phase 3) provides stronger direct support for target relevance than A's association score alone.", "decisive_evidence": ["Open Targets associationScore: MAP2K2 0.658 vs. ATR 0.544 (multi-modal: genetic, somatic, literature, known-drug)", "Clinical precedent: MAP2K2 has a PHASE_3 programme in melanoma (Open Targets drugAndClinicalCandidates); ATR has none", "Pathway membership: both sit on well-characterized MAPK/DNA-damage pathways relevant to melanoma biology", "LOEUF constraint: both are in the tolerant range (0.61 and 0.45), ruling out major essential-gene burden"], "missing_evidence": ["Somatic mutation enrichment in melanoma tumors (which modality, frequency, and functional impact for each target)", "Perturbation experiments (CRISPR knockdown, pharmacological inhibition) in melanoma cell lines or patient-derived models", "Human genetics: GWAS or rare-variant burden in melanoma cases vs. controls (not summarized in the association scores)", "Mechanistic detail on the relative contribution of genetic vs. somatic vs. literature evidence to each association score"]}, "right_tissue": {"axis": "right_tissue", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses face identical measurement gaps: neither has direct single-cell tau specificity or malignant-vs-stromal fraction data from Open Targets. However, they differ materially in the strength and credibility of their synthetic priors. Hypothesis A explicitly states ATR is a 'broadly expressed / non-specific' housekeeping replication-stress kinase with 'no tumour restriction'\u2014a designed prior that actively penalizes tissue specificity (value: 0.26). Hypothesis B claims MAP2K2 has 'pathway-contextual specificity' as a MEK component of the MAPK pathway, which is known to be selectively hyperactivated in BRAF-mutant melanomas (the dominant driver mutation in ~50% of cutaneous melanoma)\u2014a more optimistic but mechanistically grounded prior (value: 0.58). Neither prior is experimentally measured, so both are synthetic; however, B's prior is anchored to known disease biology (MAPK pathway hyperactivation in malignant melanocytes) rather than A's generic housekeeping assumption. The MAPK pathway's selective enrichment in melanoma-malignant cells (versus normal skin or stromal compartments) is well-documented in the literature and spatial transcriptomics studies, making B's contextual specificity claim more credible than A's 'no tumour restriction' assumption. Both correctly identify that single-cell profiling is the highest-VoI next step, but B starts from a mechanistically defensible tissue-specificity prior while A starts from an unfavorable one.", "decisive_evidence": ["Hypothesis A: 'broadly expressed / non-specific' housekeeping kinase with 'no tumour restriction' (synthetic prior, low mechanistic grounding)", "Hypothesis B: MAP2K2 as MEK2 component of MAPK pathway, which is known to be hyperactivated in BRAF-mutant melanomas (synthetic prior, mechanistically grounded in disease biology)", "Both lack direct single-cell tissue specificity (tau) and malignant-vs-stromal fraction data", "MAPK pathway hyperactivation is a documented malignant-cell feature in cutaneous melanoma, supporting B's contextual specificity claim"], "missing_evidence": ["Single-cell RNA-seq tau (specificity index) for ATR and MAP2K2 in melanoma-relevant tissues (malignant melanocytes, normal melanocytes, keratinocytes, fibroblasts, immune cells)", "Malignant-vs-stromal cell-type fraction expression for both targets in primary melanoma and metastatic lesions", "Spatial transcriptomics or immunohistochemistry quantifying ATR and MAP2K2 protein in malignant versus normal skin compartments", "Direct single-cell disease-context evidence (e.g., patient-derived melanoma cells versus adjacent normal tissue) for both targets"]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "medium", "rationale": "MAP2K2 (Hypothesis B) demonstrates a materially safer expected profile than ATR (Hypothesis A) on the basis of direct knockout phenotype evidence and curated safety liabilities. ATR shows 70 distinct mouse-knockout phenotypes including severe developmental toxicity signals (decreased bone marrow cell number, decreased brain size, abnormal spinal cord morphology), indicating a broad, essential role in normal tissue homeostasis. This broad toxicity footprint directly implies a narrow therapeutic window and high on-target risk in dividing and neural tissues. MAP2K2, by contrast, shows only 4 mouse-knockout phenotypes with predominantly minimal or moderate effects ('no abnormal phenotype detected' as the primary entry), indicating a more restricted essential role. Neither target has curated safety liabilities on record, but the quantitative difference in knockout phenotype burden (70 vs. 4) is substantial and directionally decisive. Both targets carry inherent pathway toxicity risk (ATR as a housekeeping DNA damage checkpoint kinase; MAP2K2 as a MAPK pathway node), but ATR's broader developmental constraint and absence of clinical melanoma precedent make its safety de-risking more challenging. MAP2K2 has Phase 3 clinical experience in melanoma, which provides real-world tolerability data and reduces unknown safety surface. The modest difference in LOEUF scores (ATR 0.45 vs. MAP2K2 0.61, both tolerant) does not materially change this comparison, as knockout phenotype burden is more granular evidence than population constraint metrics alone.", "decisive_evidence": ["ATR: 70 distinct mouse-knockout phenotypes including severe developmental toxicity (decreased brain size, abnormal spinal cord morphology, decreased bone marrow cells) \u2014 signals broad essential role and narrow therapeutic window", "MAP2K2: 4 distinct mouse-knockout phenotypes with predominantly minimal effects ('no abnormal phenotype detected' dominant) \u2014 signals restricted essential role and wider therapeutic window", "MAP2K2: Phase 3 clinical precedent in melanoma provides real-world tolerability data; ATR has no clinical melanoma footprint", "Both: 0 curated safety liabilities each \u2014 tie on explicit curated liability signal"], "missing_evidence": ["Tissue-level safety biomarkers (tissue distribution, on-target expression in safety-critical tissues such as bone marrow, CNS, intestinal epithelium) for both targets \u2014 single-cell tau profiling would refine understanding of off-target vs. on-target toxicity risk", "Comparative kinase selectivity and off-target liability profiles (kinome-wide binding) \u2014 ATR and MAP2K2 may have different off-target engagement risks not captured by phenotype data", "Pharmacokinetic/pharmacodynamic data in normal tissue for either compound \u2014 in vivo dose-response for toxicity is not addressed", "Detailed clinical adverse event profiles from MAP2K2 Phase 3 trial (frequency, severity, reversibility of specific AEs)"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K2) demonstrates materially stronger evidence on the right_patient axis due to established clinical precedent and a de-risked patient population. B reports a Phase 3 clinical programme in melanoma with a defined, treatable patient population (value 0.85, confidence 0.7, supported by Open Targets drugAndClinicalCandidates). In contrast, A (ATR) explicitly states no melanoma clinical precedent and must establish patient enrichment biomarkers de novo, carrying first-in-class stratification risk (value 0.35, confidence 0.4). On the right_patient axis specifically, this difference is decisive: B's existing clinical footprint means the core patient-selection and endpoint-viability questions are substantially answered; A's blank slate means these risks remain open. Both hypotheses share synthetic biomarker-stratum components, but B's advantage lies in proven clinical traction that validates the existence and treatability of the target population.", "decisive_evidence": ["B reports Phase 3 clinical programme in melanoma (Open Targets drugAndClinicalCandidates); A reports no clinical precedent", "B's patient axis value (0.85) is supported by real clinical evidence, not synthetic assumption; A's value (0.35) is explicitly synthetic and unproven", "B interprets the patient axis as 'largely retired' stratification risk with only biomarker sub-population enrichment remaining open; A interprets it as first-in-class with both population definition and biomarker discovery ahead", "B's confidence on right_patient is 0.7 (grounded in clinical data); A's is 0.4 (synthetic prior)"], "missing_evidence": ["For both: specific biomarker definition and patient selection criteria (both acknowledge this is synthetic)", "For both: real-world patient-level response data or clinical outcome stratification from the Phase 3 programme (if B) or from preclinical models (if A)", "For A: any clinical-stage data or patient cohort data that could narrow the stratification risk", "For B: mechanistic clarity on why the Phase 3 programme exists and what patient enrichment strategy it employed (clinical data is reported but not mechanistic rationale)"]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses face a shared fundamental commercial headwind: they target well-trodden, crowded melanoma targets where differentiation must come from modality, payload, or indication niche rather than target novelty. However, Hypothesis B (MAP2K2) has a material advantage in de-risking the commercial path. B has proven clinical traction (Phase 3 precedent) and an approved small-molecule drug, establishing both patient stratification and chemistry feasibility. This substantially reduces execution risk and time-to-market uncertainty relative to A (ATR), which carries first-in-class stratification risk with no clinical footprint. In a crowded commercial space, proven clinical precedent and de-risked modality are meaningful whitespace translators: they compress go-to-market timelines and lower the barrier to partnering or positioning a differentiated asset. A would need to compensate via superior tissue specificity, modality innovation, or a narrower indication niche\u2014none of which are evident in the current evidence. Both score weakly on raw commercial axes (0.337 vs 0.3), but B's clinical precedent and tractability history make it the stronger commercial bet in an otherwise symmetric crowded-field scenario.", "decisive_evidence": ["MAP2K2 has Phase 3 clinical precedent in melanoma (right_patient = 0.85, confidence 0.7), de-risking patient stratification and indication definition.", "MAP2K2 has an approved small-molecule drug with high-quality ligand and pocket data (tractability 0.9), versus ATR's moderate tractability (0.6) with no clinical validation.", "ATR has 70 distinct mouse-knockout phenotypes indicating broad developmental role (safety liability headwind), versus MAP2K2's 4 phenotypes with no abnormal phenotype detected (safety window open).", "Both targets exhibit high Open Targets association scores (0.658 vs 0.544) and face crowded competitive space; differentiation must come from modality/niche, not target novelty."], "missing_evidence": ["Explicit competitor count and whitespace quantification for both targets (currently synthesised).", "Commercial landscape data: pricing, market size, reimbursement precedent, or partner appetite for ATR vs MAP2K2 in melanoma.", "Modality differentiation strategy: what novel payload, delivery, or dosing approach would ATR require to overcome tissue non-specificity and safety liabilities?", "Measured single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both (both marked unmeasured; tier-3 experiment proposed for both).", "Explicit analysis of indication-niche whitespace (e.g., BRAF/NRAS-mutant subpopulation saturation for MAP2K2, or HR-deficient subpopulation opportunity for ATR)."]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K2) demonstrates substantially higher tractability than Hypothesis A (ATR) on the axis of feasibility of modulating the target with small-molecule modality. B satisfies five Open Targets SM-tractability buckets including 'Approved Drug' and 'Structure with Ligand', while A satisfies only three buckets ('Advanced Clinical', 'High-Quality Ligand', 'Druggable Family'). Critically, B has direct clinical precedent with an approved small molecule already in the market, meaning chemistry feasibility, ligand quality, binding pocket validation, and developability are all de-risked by real-world precedent. A lacks this clinical validation\u2014it is 'tractable' by structural criteria but has never been successfully modulated by an approved small molecule in any indication. This gap is material: approved-drug precedent is the highest-confidence marker of modality-target fit and eliminates discovery-phase chemistry risk. Both targets have adequate assayability and structural handles, but B's proven small-molecule track record versus A's theoretical tractability creates a clear hierarchy.", "decisive_evidence": ["B has 'Approved Drug' bucket satisfied; A does not.", "B has 'Structure with Ligand' and 'High-Quality Pocket' both satisfied; A does not explicitly list these.", "B tractability score = 0.9 (strong); A tractability score = 0.6 (moderate), both high confidence (0.9).", "A's tractability is marked 'Advanced Clinical'\u2014a development stage, not a proof of modulation; B's is marked 'Approved Drug'\u2014proof of successful clinical modulation.", "Both have 'High-Quality Ligand' and 'Druggable Family' support, but B's five-bucket set vs. A's three-bucket set indicates broader de-risking."], "missing_evidence": ["Specific chemical series or compound properties (potency, selectivity, developability metrics) for either target\u2014comparison is at the bucket level, not molecule level.", "Delivery feasibility details (BBB penetration, oral bioavailability, PK profile) for either modality.", "Off-target or selectivity liabilities that might complicate development of small molecules against either kinase.", "Assay throughput or hit-to-lead timelines specific to ATR vs. MAP2K2."]}}}, {"hypothesis_a": "H15", "hypothesis_b": "H1", "relation": "B_dominates_A", "dominator": "H1", "dominated": "H15", "comparison_summary": {"overall_relation": "B_dominates_A", "strictly_better_axes": ["right_target", "right_tissue", "right_safety", "right_patient", "right_commercial"], "tied_axes": ["tractability"], "worse_axes": [], "unresolved_axes": []}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "On the right_target axis, BRAF (Hypothesis B) demonstrates materially stronger causal and mechanistic support than FGFR1 (Hypothesis A) for cutaneous melanoma. Both targets have strong multi-modal evidence from Open Targets (genetic, somatic, literature, and known-drug data), but BRAF's association score (0.701) substantially exceeds FGFR1's (0.544)\u2014a 29% difference. More importantly, BRAF carries canonical somatic evidence: activating BRAF mutations (predominantly V600E) are the definitional oncogenic driver in ~50% of cutaneous melanoma cases, making it a direct mechanistic link to disease initiation. FGFR1, while implicated in growth-factor signaling pathways (PI3K/AKT, PLC-mediated cascades), lacks equivalent somatic mutation precedent as a primary melanoma driver. Both genes show LoF constraint (LOEUF 0.18 vs 0.15, similar), but constraint alone does not resolve the directional difference: BRAF's somatic gain-of-function causality is more direct and experimentally grounded than FGFR1's pathway-level association. The evidence is curated from Open Targets and reflects standard disease-target association methodology; neither relies on synthetic assumptions or literature inflation.", "decisive_evidence": ["BRAF association score (0.701) vs FGFR1 (0.544): 29% higher, reflecting stronger aggregated genetic, somatic, and drug evidence", "BRAF carries canonical activating somatic mutations (V600E and others) as the definitional melanoma driver (~50% of cases); somatic mutation evidence is the gold standard for target causality", "FGFR1 lacks equivalent somatic driver precedent in melanoma; evidence is pathway-level and association-derived rather than mutation-driven", "Both targets have LoF constraint in constrained tail (LOEUF 0.15\u20130.18), so constraint does not differentiate", "Both targets have approved small-molecule drugs and known-drug evidence, but BRAF's clinical precedent (Phase 3 in melanoma per right_patient axis) reinforces somatic relevance"], "missing_evidence": ["Quantitative comparison of somatic mutation frequency or clonal dominance for FGFR1 in melanoma cohorts (e.g., TCGA, SKCM); current evidence is pathway-level inference rather than direct somatic data", "Functional perturbation data (e.g., CRISPR dependency, RNAi) specifically in melanoma cell lines for FGFR1 to complement pathway membership", "Mechanistic clarity on whether FGFR1 is a driver or a passenger in the context of BRAF-mutant melanoma (epistasis or co-occurrence patterns)"]}, "right_tissue": {"axis": "right_tissue", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses lack direct single-cell or spatial tissue-specificity evidence (tau, malignant-vs-stromal fractions), and both rely on synthetic priors rated at low confidence (0.4). However, Hypothesis B benefits from a qualitatively stronger disease-context prior: BRAF mutations are the *definitional driver* of cutaneous melanoma (present in ~50% of cases), meaning BRAF activity is intrinsically enriched in malignant melanoma cells relative to stromal or normal tissue. This makes the synthetic prior more grounded in biology. Hypothesis A's FGFR1 prior ('moderately specific') lacks equivalent disease-context anchoring\u2014FGFR1 is involved in melanoma via indirect pathway activation and fibroblast interactions, not as a primary driver mutation. Neither hypothesis provides measured evidence (single-cell profiling, malignant-cell fraction quantification, or spatial transcriptomics), so both remain unmeasured on this axis. The edge to B is modest because both are synthetic and both recommend the same tier-3 experiment to resolve the axis.", "decisive_evidence": ["Hypothesis B: BRAF mutations are the definitional, primary driver of melanoma (50% of cases), creating strong implicit enrichment in malignant cells.", "Hypothesis A: FGFR1 involvement is indirect (pathway-mediated, fibroblast-stromal), lacking a driver-mutation anchor.", "Both: No measured single-cell tau, spatial transcriptomics, or malignant-vs-stromal fractionation data provided."], "missing_evidence": ["Single-cell RNA-seq tau (specificity) scores for FGFR1 and BRAF in melanoma tissue.", "Malignant-cell vs. stromal-cell fraction quantification for each target in primary/metastatic melanoma.", "Spatial transcriptomics or immunohistochemistry localizing target expression to melanoma cells vs. tumor microenvironment.", "Disease-state comparison: target expression in melanoma vs. benign nevi or normal skin.", "Comparison of target expression across melanoma molecular subtypes (BRAF-mutant, NRAS-mutant, NF1-mutant, WT)."]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "medium", "rationale": "Hypothesis B (BRAF) presents a materially better safety profile than Hypothesis A (FGFR1) on the grounds of knockout phenotype breadth and curated liability signal count. BRAF shows 77 distinct mouse-knockout phenotypes and 1 curated safety liability, whereas FGFR1 shows 202 distinct mouse-knockout phenotypes and 14 curated safety liabilities. The 2.6-fold difference in knockout phenotypes and the 14-fold difference in curated liabilities both point to a narrower scope of developmental/essential function for BRAF relative to FGFR1. Both hypotheses acknowledge that systemic inhibition carries on-target toxicity risk owing to their constrained loss-of-function profiles (LOEUF 0.15 vs 0.18), and both note that a therapeutic window must be recovered through tumour-selective delivery or dosing. However, the magnitude of the safety liability signal is substantially lower for BRAF, indicating fewer known safety failure modes and a less pleiotropic mechanism. Neither hypothesis provides direct human safety data, clinical tolerability margins, or tissue-level on-target toxicity measurements, which limits confidence; however, the preclinical signal from mouse genetics is direct, curated, and favours B.", "decisive_evidence": ["FGFR1: 14 curated safety liabilities vs BRAF: 1 curated safety liability (14-fold difference)", "FGFR1: 202 distinct mouse-knockout phenotypes vs BRAF: 77 distinct mouse-knockout phenotypes (2.6-fold difference)", "Both targets show loss-of-function constraint (LOEUF 0.18 and 0.15 respectively), confirming essentiality, but BRAF's phenotypic footprint is substantially narrower"], "missing_evidence": ["Human clinical safety data or tolerability margins for either target in melanoma or other indications", "Tissue-level on-target toxicity profiles (single-cell specificity tau and malignant-vs-stromal fraction both marked UNMEASURED and proposed for tier-3 experiments)", "Quantitative therapeutic window estimates or dose-response safety thresholds", "Head-to-head in vivo toxicology or pharmacokinetic/pharmacodynamic studies comparing systemic FGFR1 vs BRAF inhibition", "Off-target kinase promiscuity profiles for the specific small-molecule inhibitors under consideration"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (BRAF) demonstrates a substantially stronger right_patient profile than Hypothesis A (FGFR1) on the basis of direct clinical evidence and established patient stratification. BRAF has a real Phase 3 clinical programme in melanoma with an approved small-molecule drug already in the field (confidence 0.7, data_origin opentargets). This means the treatable patient po ction of melanoma patients carry actionable BRAF mutations? (This is known in literature but not explicitly stated in the report.)", "Unmet need quantification: neither report specifies the size of the unmet need in BRAF-mutant vs. FGFR1-dependent melanoma populations, though BRAF's clinical footprint implies significant prevalence.", "Resistance and progression patterns: BRAF clinical data likely includes acquired resistance data; FGFR1 has none."]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses operate in crowded fields with limited whitespace differentiation at the target level. However, Hypothesis B (BRAF) holds a materially stronger commercial position due to established clinical precedent and a defined patient population with Phase 3 drug data. This translates to lower stratification and biomarker risk, which de-risks commercial execution and reduces the need for expensive post-hoc indication definition. Hypothesis A (FGFR1) must establish both the patient population and biomarker enrichment de novo, creating higher commercial friction and longer go-to-market timelines. Both lack explicit competitor counts and whitespace quantification, but BRAF's proven clinical footprint provides a clearer, lower-risk commercial pathway despite equal tractability and target-crowding constraints.", "decisive_evidence": ["BRAF has Phase 3 clinical precedent in melanoma (right_patient = 0.85, confidence 0.7), establishing a defined treatable population and retiring stratification risk.", "FGFR1 has no melanoma clinical precedent and must establish biomarker and patient population de novo (right_patient = 0.35, confidence 0.4), imposing first-in-class execution risk.", "Both targets are in crowded fields with limited target-level differentiation; commercial advantage must come from modality or niche, not novelty.", "Both have identical tractability scores (0.9) and modality (small molecule), so moda "disease": "cutaneous melanoma", "modality": "small_molecule"}}, "run_metadata": {"num_input_hypotheses": 15, "num_removed_by_red_flags": 1, "num_surviving_hypotheses": 14, "num_front_hypotheses": 3, "num_domination_edges": 11, "num_tradeoff_comparisons": 7, "num_comparisons_total": 18, "algorithm_note": "Incremental Pareto construction is input-order sensitive in this first version because dominated non-front hypotheses are not compared against future candidates.", "tie_break_note": "pareto_front is ordered by tie_break_score (confidence-weighted axis-win tally over front-vs-front comparisons); it is a presentational tie-break, not a dominance claim -- front members remain mutually non-dominated. See tie_break_ranking for the per-axis breakdown and voi_recommendations for which axis is most worth resolving next."}, "pareto_front": [{"hypothesis_id": "H2", "target": "MAP2K1", "disease": "cutaneous melanoma", "modality": "small_molecule", "front_status": "non_dominated", "tie_break_score": 0.5}, {"hypothesis_id": "H3", "target": "MAP2K2", "disease": "cutaneous melanoma", "modality": "small_molecule", "front_status": "non_dominated", "tie_break_score": 0.5}, {"hypothesis_id": "H1", "target": "BRAF", "disease": "cutaneous melanoma", "modality": "small_molecule", "front_status": "non_dominated", "tie_break_score": -1.0}], "tie_break_ranking": [{"hypothesis_id": "H2", "tie_break_score": 0.5, "axis_breakdown": {"right_target": {"wins": 1, "losses": 1, "net_weighted": 0.0}, "right_safety": {"wins": 1, "losses": 1, "net_weighted": 0.5}}}, {"hypothesis_id": "H3", "tie_break_score": 0.5, "axis_breakdown": {"right_target": {"wins": 0, "losses": 2, "net_weighted": -1.0}, "right_safety": {"wins": 2, "losses": 0, "net_weighted": 1.5}}}, {"hypothesis_id": "H1", "tie_break_score": -1.0, "axis_breakdown": {"right_target": {"wins": 2, "losses": 0, "net_weighted": 1.0}, "right_safety": {"wins": 0, "losses": 2, "net_weighted": -2.0}}}], "voi_recommendations": [], "rank_by_id": {"H2": {"rank": 1, "tie_break_score": 0.5, "axis_breakdown": {"right_target": {"wins": 1, "losses": 1, "net_weighted": 0.0}, "right_safety": {"wins": 1, "losses": 1, "net_weighted": 0.5}}}, "H3": {"rank": 2, "tie_break_score": 0.5, "axis_breakdown": {"right_target": {"wins": 0, "losses": 2, "net_weighted": -1.0}, "right_safety": {"wins": 2, "losses": 0, "net_weighted": 1.5}}}, "H1": {"rank": 3, "tie_break_score": -1.0, "axis_breakdown": {"right_target": {"wins": 2, "losses": 0, "net_weighted": 1.0}, "right_safety": {"wins": 0, "losses": 2, "net_weighted": -2.0}}}}, "bbox": {"min_x": 0.0, "max_x": 1060.0, "min_y": 0, "max_y": 740}}</script>
<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const NODE_R = 24;

const svgNS = "http://www.w3.org/2000/svg";
const svg = document.getElementById('graph');
const nodesG = document.getElementById('nodes');
const edgesG = document.getElementById('edges');
const panel = document.getElementById('panel');
const meta = document.getElementById('meta');

const md = DATA.run_metadata || {};
meta.textContent = `${md.num_input_hypotheses ?? '?'} hypotheses -> ${md.num_surviving_hypotheses ?? '?'} survived red flags -> ${md.num_front_hypotheses ?? '?'} on front (${md.num_domination_edges ?? '?'} domination, ${md.num_tradeoff_comparisons ?? '?'} tradeoff comparisons)`;

function posOf(id) { return DATA.positions[id]; }

function labelFor(id) {
  const l = DATA.labels[id];
  if (!l) return { sub: '', full: id };
  const full = [l.target, l.disease, l.modality].filter(Boolean).join(' \u2022 ');
  let sub = l.target || '';
  if (sub.length > 16) sub = sub.slice(0, 15) + '\u2026';
  return { sub, full: full || id };
}

function formatAxis(axis) {
  return String(axis || '').replace(/_/g, ' ');
}

function formatScore(value) {
  if (value === undefined || value === null) return 'n/a';
  return Number(value).toLocaleString(undefined, { maximumFractionDigits: 3 });
}

function elWithAttrs(tag, attrs) {
  const el = document.createElementNS(svgNS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// --- edges (drawn first, under nodes) ---
// Curved as a gentle quadratic bow, alternating sides by index, so edges that
// fan out from/converge on the same hub node separate instead of overlapping
// in a single straight bundle (which is both illegible and hard to click).
const edgeEls = [];
const incidentEdges = {}; // node id -> [edge indices]

DATA.edges.forEach((edge, i) => {
  const isDominance = !!(edge.dominator && edge.dominated);
  const fromId = isDominance ? edge.dominator : edge.hypothesis_a;
  const toId = isDominance ? edge.dominated : edge.hypothesis_b;
  const from = posOf(fromId), to = posOf(toId);
  if (!from || !to) return;

  (incidentEdges[fromId] ||= []).push(i);
  (incidentEdges[toId] ||= []).push(i);

  const dx = to.x - from.x, dy = to.y - from.y;
  const dist = Math.hypot(dx, dy) || 1;
  const ux = dx / dist, uy = dy / dist;
  const px = -uy, py = ux;
  const endPad = isDominance ? 8 : 2;
  const x1 = from.x + ux * (NODE_R + 2), y1 = from.y + uy * (NODE_R + 2);
  const x2 = to.x - ux * (NODE_R + endPad), y2 = to.y - uy * (NODE_R + endPad);
  const bow = Math.min(28, dist * 0.16) * (i % 2 === 0 ? 1 : -1);
  const mx = (x1 + x2) / 2 + px * bow, my = (y1 + y2) / 2 + py * bow;
  const d = `M${x1},${y1} Q${mx},${my} ${x2},${y2}`;

  const kind = isDominance ? 'dominance' : 'tradeoff';
  const g = elWithAttrs('g', { class: `edge ${kind}`, 'data-idx': i });
  // Wide invisible stroke so the clickable area is much bigger than the
  // visible 2px line - the line itself stays thin and elegant.
  const hit = elWithAttrs('path', { class: 'edge-hit', d });
  const lineAttrs = { class: 'edge-line', d };
  if (isDominance) lineAttrs['marker-end'] = 'url(#arrow)';
  const line = elWithAttrs('path', lineAttrs);
  g.appendChild(hit);
  g.appendChild(line);
  g.addEventListener('click', () => selectEdge(i, g));
  if (isDominance) {
    g.addEventListener('mouseenter', () => line.setAttribute('marker-end', 'url(#arrow-accent)'));
    g.addEventListener('mouseleave', () => {
      if (!g.classList.contains('selected')) line.setAttribute('marker-end', 'url(#arrow)');
    });
  }
  edgesG.appendChild(g);
  edgeEls.push(g);
});

// --- nodes ---
DATA.nodes.forEach(n => {
  const p = posOf(n.hypothesis_id);
  if (!p) return;
  const g = elWithAttrs('g', { class: 'node', transform: `translate(${p.x},${p.y})` });
  const circle = elWithAttrs('circle', { r: NODE_R, class: `status-${n.status}` });
  const text = elWithAttrs('text', { y: 4 });
  text.textContent = n.hypothesis_id;
  g.appendChild(circle);
  g.appendChild(text);

  const rank = DATA.rank_by_id[n.hypothesis_id];
  if (rank) {
    const badge = elWithAttrs('circle', { class: 'rank-badge', cx: NODE_R - 3, cy: -NODE_R + 3, r: 10 });
    const rankText = elWithAttrs('text', { class: 'rank-text', x: NODE_R - 3, y: -NODE_R + 6 });
    rankText.textContent = rank.rank;
    g.appendChild(badge);
    g.appendChild(rankText);
  }

  const lbl = labelFor(n.hypothesis_id);
  const title = elWithAttrs('title', {});
  title.textContent = rank ? `${lbl.full} | rank #${rank.rank}, score ${formatScore(rank.tie_break_score)}` : lbl.full;
  g.appendChild(title);

  if (lbl.sub) {
    // A translucent backing plate keeps the sublabel legible where a curved
    // edge happens to pass underneath it.
    const bg = elWithAttrs('rect', {
      class: 'sublabel-bg', x: -34, y: NODE_R + 5, width: 68, height: 14, rx: 4,
    });
    const sub = elWithAttrs('text', { class: 'sublabel', y: NODE_R + 15 });
    sub.textContent = lbl.sub;
    g.appendChild(bg);
    g.appendChild(sub);
  }

  g.addEventListener('click', () => selectNode(n));
  g.addEventListener('mouseenter', () => highlightIncident(n.hypothesis_id));
  g.addEventListener('mouseleave', clearIncidentHighlight);
  nodesG.appendChild(g);
});

function highlightIncident(hypothesisId) {
  const incident = new Set(incidentEdges[hypothesisId] || []);
  edgeEls.forEach((g, i) => {
    g.classList.toggle('incident', incident.has(i));
    g.classList.toggle('dimmed', !incident.has(i));
  });
}
function clearIncidentHighlight() {
  edgeEls.forEach(g => { g.classList.remove('incident'); g.classList.remove('dimmed'); });
}

let selectedEdgeEl = null;

function clearSelection() {
  if (selectedEdgeEl) {
    selectedEdgeEl.classList.remove('selected');
    const prevLine = selectedEdgeEl.querySelector('.edge-line');
    if (selectedEdgeEl.classList.contains('dominance')) prevLine.setAttribute('marker-end', 'url(#arrow)');
  }
  selectedEdgeEl = null;
}

function axisTagText(rel, edge) {
  if (rel === 'A_better') return `${edge.hypothesis_a} better`;
  if (rel === 'B_better') return `${edge.hypothesis_b} better`;
  return { tie: 'tie', incomparable: 'incomparable',
            insufficient_evidence: 'insufficient evidence' }[rel] || rel;
}

function renderEvidence(title, items) {
  if (!items || !items.length) return '';
  return `<div class="rationale"><strong>${title}:</strong><ul class="ev-list">${
    items.map(x => `<li>${escapeHtml(x)}</li>`).join('')
  }</ul></div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderRankingRows() {
  const rows = DATA.tie_break_ranking || [];
  if (!rows.length) return '<p class="empty-hint">No front tie-break ranking was included in this result.</p>';
  return `<div class="rank-list">${
    rows.map((r, i) => {
      const lbl = labelFor(r.hypothesis_id);
      return `<div class="rank-row">
        <div class="rank-num">#${i + 1}</div>
        <div>
          <div class="rank-id">${escapeHtml(r.hypothesis_id)}</div>
          <div class="rank-sub">${escapeHtml(lbl.full === r.hypothesis_id ? '' : lbl.full)}</div>
        </div>
        <div class="rank-score">${formatScore(r.tie_break_score)}</div>
      </div>`;
    }).join('')
  }</div>`;
}

function renderVoiCards(limit = 3) {
  const recs = DATA.voi_recommendations || [];
  if (!recs.length) return '<p class="empty-hint">No swing-axis VOI recommendation was produced.</p>';
  return recs.slice(0, limit).map((r, i) => `
    <div class="voi-card">
      <div class="axis-head">
        <span class="axis-name">${escapeHtml(formatAxis(r.axis))}</span>
        <span class="axis-tag ${i === 0 ? 'A_better' : 'tie'}">VoI ${formatScore(r.voi_score)}</span>
      </div>
      <div class="axis-metric"><span>swing pairs</span><span>${formatScore(r.swing_pairs)}</span></div>
      <div class="axis-metric"><span>average cost tier</span><span>${formatScore(r.avg_cost)}</span></div>
    </div>
  `).join('');
}

function renderAxisBreakdown(axisBreakdown) {
  const entries = Object.entries(axisBreakdown || {})
    .sort((a, b) => Math.abs(b[1].net_weighted || 0) - Math.abs(a[1].net_weighted || 0));
  if (!entries.length) return '<p class="empty-hint">No per-axis tie-break contributions were recorded.</p>';
  return entries.map(([axis, counts]) => `
    <div class="axis-block">
      <div class="axis-head">
        <span class="axis-name">${escapeHtml(formatAxis(axis))}</span>
        <span class="axis-tag ${(counts.net_weighted || 0) >= 0 ? 'A_better' : 'incomparable'}">${formatScore(counts.net_weighted)}</span>
      </div>
      <div class="axis-metric"><span>wins</span><span>${counts.wins || 0}</span></div>
      <div class="axis-metric"><span>losses</span><span>${counts.losses || 0}</span></div>
    </div>
  `).join('');
}

function renderOverview() {
  const note = md.tie_break_note ? `<p class="empty-hint">${escapeHtml(md.tie_break_note)}</p>` : '';
  panel.innerHTML = `
    <h2>Pareto front tie-break</h2>
    <div class="rel">Front rank is a confidence-weighted axis-win tally, not a dominance claim.</div>
    <div class="panel-section">
      <h3>Ranked front</h3>
      ${renderRankingRows()}
    </div>
    <div class="panel-section">
      <h3>VOI recommendation</h3>
      ${renderVoiCards()}
    </div>
    ${note}
  `;
}

function selectEdge(i, g) {
  clearSelection();
  g.classList.add('selected');
  selectedEdgeEl = g;
  if (g.classList.contains('dominance')) {
    g.querySelector('.edge-line').setAttribute('marker-end', 'url(#arrow-accent)');
  }

  const edge = DATA.edges[i];
  const summary = edge.comparison_summary || {};
  const isDominance = !!(edge.dominator && edge.dominated);

  let title, chips;
  if (isDominance) {
    title = `${edge.dominator} dominates ${edge.dominated}`;
    chips = (summary.strictly_better_axes || [])
      .map(a => `<span class="chip">${a} \u2192 dominator</span>`).join('');
  } else {
    title = `${edge.hypothesis_a} vs ${edge.hypothesis_b} \u2014 tradeoff / unresolved`;
    const forA = (summary.strictly_better_axes_for_A || [])
      .map(a => `<span class="chip">${a} \u2192 ${edge.hypothesis_a}</span>`).join('');
    const forB = (summary.strictly_better_axes_for_B || [])
      .map(a => `<span class="chip">${a} \u2192 ${edge.hypothesis_b}</span>`).join('');
    chips = forA + forB;
  }

  const axisOrder = ['right_target','right_tissue','right_safety','right_patient','right_commercial','tractability'];
  const axisHtml = axisOrder.filter(a => edge.axis_comparisons[a]).map(a => {
    const c = edge.axis_comparisons[a];
    return `<div class="axis-block">
      <div class="axis-head">
        <span class="axis-name">${formatAxis(a)}</span>
        <span class="axis-tag ${c.relation}">${axisTagText(c.relation, edge)}</span>
      </div>
      <div class="confidence">confidence: ${c.confidence}</div>
      <div class="rationale">${escapeHtml(c.rationale)}</div>
      ${renderEvidence('Decisive evidence', c.decisive_evidence)}
      ${renderEvidence('Missing evidence', c.missing_evidence)}
    </div>`;
  }).join('');

  panel.innerHTML = `
    <h2>${title}</h2>
    <div class="rel">${summary.overall_relation || ''}${!isDominance && summary.reason ? ' \u2014 ' + summary.reason : ''}</div>
    <div class="summary-row">${chips}</div>
    ${axisHtml}
  `;
}

const SEVERITY_TAG_CLASS = { critical: 'incomparable', major: 'B_better', minor: 'tie' };

function renderRedFlagDetail(detail) {
  if (!detail) return '';
  const flagBlocks = (detail.red_flags || []).map(f => `
    <div class="axis-block">
      <div class="axis-head">
        <span class="axis-name">${escapeHtml(f.category).replace(/_/g, ' ')}</span>
        <span class="axis-tag ${SEVERITY_TAG_CLASS[f.severity] || 'tie'}">${f.severity}</span>
      </div>
      <div class="rationale">${escapeHtml(f.reason)}</div>
    </div>
  `).join('');
  return `
    <div class="rationale"><strong>Why removed:</strong> ${escapeHtml(detail.rationale)}</div>
    ${flagBlocks}
  `;
}

function selectNode(n) {
  clearSelection();
  const lbl = DATA.labels[n.hypothesis_id] || {};
  const rank = DATA.rank_by_id[n.hypothesis_id];
  const chips = `
      ${lbl.target ? `<span class="chip">target: ${escapeHtml(lbl.target)}</span>` : ''}
      ${lbl.disease ? `<span class="chip">disease: ${escapeHtml(lbl.disease)}</span>` : ''}
      ${lbl.modality ? `<span class="chip">modality: ${escapeHtml(lbl.modality)}</span>` : ''}
      ${rank ? `<span class="chip">front rank: #${rank.rank}</span><span class="chip">tie-break score: ${formatScore(rank.tie_break_score)}</span>` : ''}
  `;

  if (n.status === 'red_flagged') {
    panel.innerHTML = `
      <h2>${n.hypothesis_id}</h2>
      <div class="rel">status: red-flagged (removed before Pareto analysis)</div>
      <div class="summary-row">${chips}</div>
      ${renderRedFlagDetail(n.red_flag_detail)}
    `;
    return;
  }

  panel.innerHTML = `
    <h2>${n.hypothesis_id}</h2>
    <div class="rel">status: ${n.status}</div>
    <div class="summary-row">${chips}</div>
    ${rank ? `<div class="panel-section"><h3>Tie-break breakdown</h3>${renderAxisBreakdown(rank.axis_breakdown)}</div>` : ''}
    <p class="empty-hint">Click an edge touching this node to see the comparison behind it.</p>
  `;
}

renderOverview();

// --- zoom / pan (SVG viewBox-based) ---
const bbox = DATA.bbox;
const contentBox = {
  x: bbox.min_x, y: bbox.min_y,
  w: bbox.max_x - bbox.min_x, h: bbox.max_y - bbox.min_y,
};

// Pad contentBox to match the container's aspect ratio so the initial view
// fills the panel instead of letterboxing (preserveAspectRatio="meet" would
// otherwise leave dead space on whichever axis doesn't constrain the fit).
function fitToContainer(box) {
  const rect = svg.getBoundingClientRect();
  const containerAspect = rect.width / rect.height;
  const contentAspect = box.w / box.h;
  let w = box.w, h = box.h;
  if (contentAspect > containerAspect) {
    h = w / containerAspect;
  } else {
    w = h * containerAspect;
  }
  const cx = box.x + box.w / 2, cy = box.y + box.h / 2;
  return { x: cx - w / 2, y: cy - h / 2, w, h };
}

const fit = fitToContainer(contentBox);
let viewBox = { ...fit };

function applyViewBox() {
  svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
}
applyViewBox();

const MIN_ZOOM_W = fit.w * 0.08;
const MAX_ZOOM_W = fit.w * 4;

function zoomAt(clientX, clientY, factor) {
  const rect = svg.getBoundingClientRect();
  const mx = viewBox.x + (clientX - rect.left) / rect.width * viewBox.w;
  const my = viewBox.y + (clientY - rect.top) / rect.height * viewBox.h;
  let newW = viewBox.w * factor;
  if (newW < MIN_ZOOM_W || newW > MAX_ZOOM_W) return;
  const newH = viewBox.h * factor;
  viewBox = {
    x: mx - (mx - viewBox.x) * factor,
    y: my - (my - viewBox.y) * factor,
    w: newW, h: newH,
  };
  applyViewBox();
}

svg.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = Math.pow(1.0015, e.deltaY);
  zoomAt(e.clientX, e.clientY, factor);
}, { passive: false });

let isPanning = false;
let panStart = null;

svg.addEventListener('pointerdown', (e) => {
  if (e.target.closest('.node') || e.target.closest('.edge')) return;
  isPanning = true;
  svg.classList.add('panning');
  panStart = { x: e.clientX, y: e.clientY, vb: { ...viewBox } };
  svg.setPointerCapture(e.pointerId);
});
svg.addEventListener('pointermove', (e) => {
  if (!isPanning) return;
  const rect = svg.getBoundingClientRect();
  const dx = (e.clientX - panStart.x) * panStart.vb.w / rect.width;
  const dy = (e.clientY - panStart.y) * panStart.vb.h / rect.height;
  viewBox = { ...panStart.vb, x: panStart.vb.x - dx, y: panStart.vb.y - dy };
  applyViewBox();
});
function endPan() { isPanning = false; svg.classList.remove('panning'); }
svg.addEventListener('pointerup', endPan);
svg.addEventListener('pointerleave', endPan);

document.getElementById('zoom-in').addEventListener('click', () => {
  const rect = svg.getBoundingClientRect();
  zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, 0.8);
});
document.getElementById('zoom-out').addEventListener('click', () => {
  const rect = svg.getBoundingClientRect();
  zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, 1.25);
});
document.getElementById('zoom-fit').addEventListener('click', () => {
  viewBox = { ...fit };
  applyViewBox();
});
</script>
</body>
