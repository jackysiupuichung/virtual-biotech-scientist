<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Pareto domination graph</title>
<style>
  :root {
    --bg: #fcfcfb; --fg: #0b0b0b; --panel-bg: #f7f7f5; --border: rgba(11,11,11,0.10);
    --muted: #6b7178; --accent: #2e6dd4;
    --status-front: #0ca30c; --status-dominated: #767b86; --status-critical: #d03b3b;
    --edge-dominance: #757c8c; --edge-tradeoff: #b5730d;
    --shadow-sm: 0 1px 2px rgba(11,11,11,0.14), 0 1px 1px rgba(11,11,11,0.08);
    --shadow-md: 0 4px 14px rgba(11,11,11,0.12), 0 1px 3px rgba(11,11,11,0.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16181c; --fg: #e8e9eb; --panel-bg: #1c1f24; --border: rgba(255,255,255,0.10);
      --muted: #9aa0a8; --accent: #6fa1ff;
      --status-front: #16c157; --status-dominated: #8a90a0; --status-critical: #e2635f;
      --edge-dominance: #8891a3; --edge-tradeoff: #e0a53e;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.45), 0 1px 1px rgba(0,0,0,0.3);
      --shadow-md: 0 6px 20px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.35);
    }
  }
  :root[data-theme="dark"] {
    --bg: #16181c; --fg: #e8e9eb; --panel-bg: #1c1f24; --border: rgba(255,255,255,0.10);
    --muted: #9aa0a8; --accent: #6fa1ff;
    --status-front: #16c157; --status-dominated: #8a90a0; --status-critical: #e2635f;
    --edge-dominance: #8891a3; --edge-tradeoff: #e0a53e;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.45), 0 1px 1px rgba(0,0,0,0.3);
    --shadow-md: 0 6px 20px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.35);
  }
  :root[data-theme="light"] {
    --bg: #fcfcfb; --fg: #0b0b0b; --panel-bg: #f7f7f5; --border: rgba(11,11,11,0.10);
    --muted: #6b7178; --accent: #2e6dd4;
    --status-front: #0ca30c; --status-dominated: #767b86; --status-critical: #d03b3b;
    --edge-dominance: #757c8c; --edge-tradeoff: #b5730d;
    --shadow-sm: 0 1px 2px rgba(11,11,11,0.14), 0 1px 1px rgba(11,11,11,0.08);
    --shadow-md: 0 4px 14px rgba(11,11,11,0.12), 0 1px 3px rgba(11,11,11,0.10);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column;
  }
  h1 { font-size: 16px; margin: 0; letter-spacing: -0.01em; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px; border-bottom: 1px solid var(--border);
    flex-wrap: wrap; gap: 10px; flex: 0 0 auto;
    box-shadow: var(--shadow-sm); position: relative; z-index: 3;
  }
  .meta { color: var(--muted); font-size: 12.5px; }
  .legend { display: flex; gap: 16px; font-size: 12.5px; color: var(--muted); flex-wrap: wrap; }
  .legend-group { display: flex; gap: 16px; align-items: center; }
  .legend-sep { width: 1px; height: 14px; background: var(--border); }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .edge-swatch { width: 20px; height: 0; border-top-width: 2px; border-top-style: solid; display: inline-block; }
  .edge-swatch.tradeoff { border-top-style: dashed; }

  .layout { display: flex; flex: 1 1 auto; min-height: 0; }
  .graph-wrap { flex: 1 1 auto; position: relative; min-width: 0; background: var(--bg); }
  svg { display: block; width: 100%; height: 100%; touch-action: none; cursor: grab; }
  svg.panning { cursor: grabbing; }

  .zoom-controls {
    position: absolute; right: 14px; bottom: 14px; display: flex; flex-direction: column;
    gap: 6px; z-index: 2;
  }
  .zoom-controls button {
    width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--panel-bg); color: var(--fg); font-size: 15px; cursor: pointer;
    box-shadow: var(--shadow-sm); transition: filter .12s ease, transform .12s ease;
  }
  .zoom-controls button:hover { filter: brightness(1.12); transform: translateY(-1px); }
  .zoom-controls button:active { transform: translateY(0); }
  .zoom-hint {
    position: absolute; left: 14px; bottom: 14px; color: var(--muted); font-size: 11.5px;
    z-index: 2; background: var(--panel-bg); padding: 4px 9px; border-radius: 999px;
    border: 1px solid var(--border); box-shadow: var(--shadow-sm);
  }

  .node circle {
    stroke: var(--bg); stroke-width: 3px; cursor: pointer;
    filter: drop-shadow(0 1px 3px rgba(11,11,11,0.22));
    transition: filter .15s ease, transform .15s ease;
  }
  .node .status-front { fill: var(--status-front); }
  .node .status-dominated { fill: var(--status-dominated); }
  .node .status-red_flagged { fill: var(--status-critical); }
  .node text { fill: #fff; font-size: 11px; font-weight: 600; text-anchor: middle; pointer-events: none; }
  .node .sublabel-bg { fill: var(--bg); opacity: 0.82; pointer-events: none; }
  .node .sublabel { fill: var(--muted); font-size: 10.5px; font-weight: 500; text-anchor: middle; pointer-events: none; }
  .node .rank-badge {
    fill: var(--accent); stroke: var(--bg); stroke-width: 2px; pointer-events: none;
    filter: drop-shadow(0 1px 2px rgba(11,11,11,0.22));
  }
  .node .rank-text { fill: #fff; font-size: 9.5px; font-weight: 700; pointer-events: none; }
  .node:hover circle {
    filter: drop-shadow(0 3px 8px rgba(11,11,11,0.32)) brightness(1.1);
    transform: scale(1.08); transform-origin: center; transform-box: fill-box;
  }

  .edge-hit { stroke: transparent; stroke-width: 16px; fill: none; cursor: pointer; }
  .edge-line {
    stroke-width: 2px; fill: none; pointer-events: none;
    transition: stroke-width .15s ease, opacity .15s ease, stroke .15s ease;
  }
  .edge.dominance .edge-line { stroke: var(--edge-dominance); }
  .edge.tradeoff .edge-line { stroke: var(--edge-tradeoff); stroke-dasharray: 5 4; }
  .edge:hover .edge-line { stroke: var(--accent); stroke-width: 3px; }
  .edge.selected .edge-line { stroke: var(--accent); stroke-width: 3.2px; }
  .edge.incident .edge-line { stroke-width: 3px; }
  .edge.dimmed .edge-line { opacity: 0.22; }
  #arrow path { fill: var(--edge-dominance); }
  #arrow-accent path { fill: var(--accent); }

  .panel {
    width: 420px; flex: 0 0 auto; border-left: 1px solid var(--border);
    padding: 20px 22px; overflow-y: auto; background: var(--panel-bg);
    box-shadow: -6px 0 16px -12px rgba(11,11,11,0.25);
  }
  .panel h2 { font-size: 15px; margin: 0 0 4px; letter-spacing: -0.01em; }
  .panel .rel { color: var(--muted); margin-bottom: 14px; }
  .empty-hint { color: var(--muted); }

  .axis-block {
    border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px;
    margin-bottom: 10px; background: var(--bg); box-shadow: var(--shadow-sm);
    transition: box-shadow .15s ease;
  }
  .axis-block:hover { box-shadow: var(--shadow-md); }
  .axis-block .axis-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .axis-name { font-weight: 600; text-transform: capitalize; }
  .axis-tag {
    font-size: 11px; padding: 1px 7px; border-radius: 999px; border: 1px solid var(--border);
  }
  .axis-tag.A_better, .axis-tag.B_better { color: var(--status-front); border-color: var(--status-front); }
  .axis-tag.tie { color: var(--muted); }
  .axis-tag.incomparable, .axis-tag.insufficient_evidence { color: var(--status-critical); border-color: var(--status-critical); }
  .confidence { font-size: 11px; color: var(--muted); }
  .rationale { margin: 6px 0; }
  .ev-list { margin: 4px 0 0; padding-left: 18px; color: var(--muted); font-size: 12.5px; }
  .summary-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .chip {
    font-size: 11.5px; padding: 2px 9px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--bg);
  }
  .panel-section { margin: 0 0 18px; }
  .panel-section h3 {
    font-size: 12px; margin: 0 0 8px; color: var(--muted); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .rank-list { display: grid; gap: 8px; }
  .rank-row {
    display: grid; grid-template-columns: 34px 1fr auto; align-items: center; gap: 9px;
    padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); box-shadow: var(--shadow-sm);
  }
  .rank-num { color: var(--accent); font-weight: 800; font-size: 12px; }
  .rank-id { font-weight: 650; }
  .rank-sub { color: var(--muted); font-size: 11.5px; margin-top: 1px; }
  .rank-score { font-variant-numeric: tabular-nums; font-weight: 700; }
  .axis-metric {
    display: grid; grid-template-columns: 1fr auto; gap: 6px; margin-top: 6px;
    font-size: 12.5px;
  }
  .axis-metric span:last-child { font-variant-numeric: tabular-nums; color: var(--muted); }
  .voi-card {
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    background: var(--bg); box-shadow: var(--shadow-sm);
  }
</style>
</head>
<body>
<header>
  <h1>Pareto domination graph</h1>
  <div class="legend">
    <span class="legend-group"><span class="legend-item"><span class="dot" style="background:var(--status-front)"></span>Pareto front</span><span class="legend-item"><span class="dot" style="background:var(--status-dominated)"></span>Dominated</span><span class="legend-item"><span class="dot" style="background:var(--status-critical)"></span>Red-flagged (removed pre-Pareto)</span></span>
    <span class="legend-sep"></span>
    <span class="legend-group"><span class="legend-item"><span class="edge-swatch dominance" style="border-color:var(--edge-dominance)"></span>Domination</span><span class="legend-item"><span class="edge-swatch tradeoff" style="border-color:var(--edge-tradeoff)"></span>Tradeoff / unresolved</span></span>
  </div>
  <div class="meta" id="meta"></div>
</header>
<div class="layout">
  <div class="graph-wrap">
    <svg id="graph">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z"></path>
        </marker>
        <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z"></path>
        </marker>
      </defs>
      <g id="edges"></g>
      <g id="nodes"></g>
    </svg>
    <div class="zoom-hint">Scroll to zoom &middot; drag to pan</div>
    <div class="zoom-controls">
      <button id="zoom-in" title="Zoom in">+</button>
      <button id="zoom-out" title="Zoom out">&minus;</button>
      <button id="zoom-fit" title="Fit to view">&#9633;</button>
    </div>
  </div>
  <div class="panel" id="panel">
    <p class="empty-hint">Click an edge to see the comparison that produced it. Click a node to see the hypothesis.</p>
  </div>
</div>

her mechanistic essentiality", "BRAF Open Targets association score 0.701 vs MAP2K1 0.683 \u2014 marginally higher aggregate causal score", "BRAF is the direct activating kinase of MAP2K1 \u2014 upstream position in the canonical MAPK cascade suggests primary causal role", "Both have somatic mutation evidence (BRAF V600E is the prototypical melanoma driver) and clinical Phase 3 precedent"], "missing_evidence": ["Tissue-specific expression in malignant vs. stromal fractions (both flagged as unmeasured; single-cell profiling would resolve)", "Comparative on-target toxicity risk in normal melanocyte or skin tissue (BRAF's broader mouse-KO phenotype footprint (77) vs MAP2K1 (24) is noted but causality in human skin biology is unclear)", "Quantitative epistasis or redundancy analysis \u2014 degree to which MAP2K1 inhibition is buffered by alternative kinases vs. BRAF inhibition"]}, "right_tissue": {"axis": "right_tissue", "relation": "tie", "confidence": "low", "rationale": "Both Hypothesis A (MAP2K1) and Hypothesis B (BRAF) report identical right_tissue evidence structures: synthetic, unmeasured, designed priors with no empirical single-cell, spatial, disease-tissue, or malignant-vs-stromal data. Both assign confidence=0.4 (weak) and acknowledge that single-cell tau and malignant-fraction profiling are not available from Open Targets. Both propose identical tier-3 experiments to resolve this axis. The only numerical difference is the prior value (A=0.6 vs B=0.72), but both narratives explicitly state these are 'designed priors' and 'hypotheses, not evidence'\u2014rendering the numerical gap irrelevant on an axis strictly evaluating tissue-specificity evidence. Neither hypothesis has measured, curated, or disease-context-specific evidence to warrant differentiation. The language framing differs slightly ('downstream of BRAF; specificity inherited from pathway context' vs 'mutant-BRAF melanoma is the definitional driver context'), but this is interpretive narrative, not empirical tissue evidence. Both remain unmeasured on the axis.", "decisive_evidence": ["Hypothesis A: 'Single-cell tissue specificity (tau) and malignant-vs-stromal fraction are NOT available from Open Targets. Value shown is a designed prior.'", "Hypothesis B: 'Single-cell tissue specificity (tau) and malignant-vs-stromal fraction are NOT available from Open Targets. Value shown is a designed prior.'", "Both report confidence=0.4 on right_tissue, explicitly noting unmeasured status.", "Both identify single-cell profiling as the highest-VoI experiment to resolve this axis."], "missing_evidence": ["Single-cell RNA-seq or spatial transcriptomics tau (cell-type specificity) for MAP2K1 or BRAF in melanoma tissue.", "Measured malignant-vs-stromal fraction for either target in patient-derived melanoma samples.", "Disease-context-specific expression (mutant-BRAF tumours vs wild-type, or stage-stratified).", "Direct comparison of target activity/expression in malignant melanoma cells vs normal cutaneous cells (primary keratinocytes, fibroblasts, endothelium).", "Evidence distinguishing whether the prior (A='downstream BRAF', B='mutant-BRAF driver') translates to differential tissue compartment restriction."]}, "right_safety": {"axis": "right_safety", "relation": "A_better", "confidence": "high", "rationale": "Hypothesis A (MAP2K1) demonstrates a substantially safer expected profile than Hypothesis B (BRAF) on the right_safety axis. The comparison is grounded in direct, curated safety evidence: A reports 0 curated safety liabilities and 24 distinct mouse-knockout phenotypes, while B reports 1 curated safety liability (heart disease) and 77 distinct mouse-knockout phenotypes\u2014more than 3\u00d7 the knockout footprint. The breadth of phenotypic consequences in B (abnormal parietal bone, decreased white adipose tissue, abnormal vascular endothelium) suggests a wider developmental and systemic role, indicating greater on-target toxicity risk. A's modest knockout phenotypes (abnormal trophoblast, cranium length, astrocyte number) are more confined. Both targets are under high genetic constraint (LOEUF <0.33), raising mechanistic causality but also on-target-toxicity flags; however, B's constraint is more severe (0.15 vs 0.32), further suggesting essential function and narrow therapeutic window. The safety axis assessment values reflect this directly: A = 0.9 (plausibly open safety window), B = 0.512 (narrow therapeutic window, must be bought back with selective delivery or dosing). The explicit safety narrative for B acknowledges systemic inhibition risks; A's narrative characterizes safety as a relative strength.", "decisive_evidence": ["BRAF has 77 mouse-knockout phenotypes vs MAP2K1's 24 \u2014 a 3.2\u00d7 difference indicating broader developmental/essential role", "BRAF has 1 curated safety liability (heart disease) vs MAP2K1's 0 curated liabilities", "BRAF LOEUF (0.15) is more constrained than MAP2K1 LOEUF (0.32), suggesting greater essentiality and narrower therapeutic window", "B's representative KO phenotypes span bone morphology, adipose tissue, and vascular endothelium (systemic breadth); A's are more confined (placental, cranial, neural)", "B's safety interpretation explicitly flags 'systemic inhibition risks on-target toxicity in normal tissue' and 'narrow therapeutic window'; A's interpretation characterizes safety as 'a relative strength'"], "missing_evidence": ["On-target toxicity data from human clinical trials (both have Phase 3 precedent but safety profile details are not provided)", "Tissue-specific distribution and expression in critical organs (heart, kidney, immune system) \u2014 would quantify clinical toxicity risk", "Dose-response safety curves and maximum tolerated dose comparisons from preclinical or clinical studies", "Long-term tolerability data and off-target liability profiles of the specific inhibitor chemotypes being considered", "Patient population stratification by genotype or biomarker that might mitig tic, literature, and drug evidence; (2) BRAF carries somatic gain-of-function mutations that are definitional drivers of melanoma pathogenesis\u2014BRAF V600E occurs in ~50% of cutaneous melanomas and is a well-established oncogenic driver. This represents direct somatic genetic evidence of causal relevance. In contrast, AKT1 lacks comparable somatic genetic evidence (no recurrent activating mutations in melanoma) and relies instead on pathway contextualization and indirect mechanistic inference. Both targets are LoF-constrained (LOEUF 0.15 vs 0.33), but BRAF's tighter constraint and fewer curated liabilities (1 vs 4) provide additional support. While AKT1 sits on relevant pathways (PI3K/AKT signaling), pathway presence alone is weaker evidence than somatic driver mutations.", "decisive_evidence": ["BRAF disease association score 0.701 vs AKT1 0.566 (Open Targets aggregated evidence)", "BRAF V600E recurrent somatic mutations are definitional drivers of ~50% of cutaneous melanomas (somatic genetic evidence)", "BRAF LOEUF 0.15 (more constrained) vs AKT1 0.33, indicating stronger mechanistic essentiality signal", "BRAF has 1 curated safety liability vs AKT1 4, suggesting more specific mechanistic role", "BRAF occupies gain-of-function pathways (MRAS RAF activation) vs AKT1 broader PI3K pathway participation"], "missing_evidence": ["Functional perturbation studies (e.g., CRISPR/RNAi knockdown) specifically in melanoma cell lines to compare on-target dependency", "Quantitative comparison of AKT1 vs BRAF phosphorylation or activation status in malignant vs stromal fractions of primary melanomas", "Frequency of AKT1 somatic mutations or copy number alterations in melanoma cohorts (to determine if AKT1 has unrecognized driver role)", "Mechanistic pathway specificity: whether AKT1 effects in melanoma are primarily through mTOR/metabolism vs survival vs proliferation vs other branches"]}, "right_tissue": {"axis": "right_tissue", "relation": "B_better", "confidence": "medium", tioning or malignant-cell enrichment data. B's pathway inheritance (BRAF\u2192MAP2K1) is more mechanistically plausible for melanoma tissue selectivity than A's assumption of a clean ADC window. Both explicitly flag single-cell profiling as the highest-value experiment, but B starts from a stronger conceptual tissue anchor. Neither has measured tau, malignant-fraction, or stromal-contamination data, so both carry equal experimental debt; the difference is in the quality of the *prior* that bridges that gap.", "decisive_evidence": ["Hypothesis A assigns right_tissue = 0.8 but acknowledges it is a 'designed prior' with 'sharply tumour-restricted' HER2-high sub-population assumption\u2014no pathway or melanoma-context evidence provided.", "Hypothesis B assigns right_tissue = 0.6 but grounds it explicitly in 'downstream of BRAF; specificity inherited from pathway context'\u2014this is a mechanistic anchor within the known melanoma oncogenic pathway.", "Both flagged 'single-cell tissue specificity (tau) and malignant-vs-stromal fraction are NOT available from Open Targets' and both proposed tier-3 single-cell experiments to resolve this.", "Neither hypothesis provides single-cell data, spatial transcriptomics, disease-tissue biopsy enrichment, or malignant-vs-stromal cell fraction measurements."], "missing_evidence": ["Single-cell tau (tissue specificity metric) for ERBB2 or MAP2K1 in cutaneous melanoma", "Malignant-cell vs. stromal-cell fraction data for either target in melanoma tissue", "Spatial transcriptomics or immunohistochemistry validation of target expression in melanoma tumours vs. normal skin", "Patient-derived xenograft (PDX) or clinical biopsy RNA-seq stratified by malignancy and cell type", "Evidence that HER2 (ERBB2) is enriched in melanoma malignant cells (not just assumed); known HER2 expression pattern is breast/gastric carcinoma, not melanoma", "Evidence for MAP2K1 enrichment in BRAF-mutant melanoma subtype specifically"]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "medium", "rationale": "Hypothesis B (MAP2K1) demonstrates a materially superior safety profile on the right_safety axis compared to Hypothesis A (ERBB2). The decisive evidence is quantitative and qualitative: B reports 0 curated safety liabilities versus A's 3 explicit liabilities (cardiotoxicity, heart disease, trastuzumab sensitivity), and B's knockout phenotype footprint (24 distinct phenotypes) is substantially smaller than A's (52 phenotypes). Critically, A's knockout phenotypes include embryonic lethality with complete penetrance and neurological effects (abnormal phrenic nerve morphology, decreased Schwann cell precursor number), which signal a broad developmental/essential role and narrow therapeutic window. B's representative knockout phenotypes (abnormal trophoblast morphology, increased cranium length, increased astrocyte number) are less severe and do not flag embryonic lethality or essential developmental functions. Both hypotheses acknowledge unmeasured single-cell tissue specificity, but the narrower knockout footprint and absence of curated liabilities in B indicate a more permissive safety margin. The ADC modality (A) theoretically offers better tumour selectivity than the small-molecule modality (B), but this does not fully compensate for the underlying target's broader toxicity liability. Confidence is medium rather than high because both targets lack direct human safety data, knockout phenotypes are incomplete proxies for human on-target toxicity, and tissue-selective delivery (A's ADC) could mitigate the inherent safety disadvantage if tumour specificity is proven.", "decisive_evidence": ["A: 3 curated safety liabilities (cardiotoxicity, heart disease, trastuzumab sensitivity) vs. B: 0 curated liabilities", "A: 52 distinct mouse-knockout phenotypes (including embryonic lethality with complete penetrance, abnormal phrenic nerve morphology) vs. B: 24 distinct phenotypes (trophoblast, cranium, astrocyte effects\u2014less severe)", "A's interpretation explicitly states 'Safety is a headwind' and notes 'narrow therapeutic window' requiring tumour-selective delivery; B's interpretation states 'no dominant safety liability surfaced' and 'safety window is plausibly open'", "A's LOEUF (o/e)=0.42 (loss-of-function tolerated, suggesting non-essential role) vs. B's LOEUF (o/e)=0.32 (loss-of-function constrained, intolerant)\u2014paradoxically, B's constraint signals causality but does not contradict its lower phenotypic burden and absence of liabilities"], "missing_evidence": ["Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets\u2014both flagged as highest-VoI experiments but not yet measured", "Direct human safety data, including on-target toxicity signals from early clinical trials or translational studies", "Tissue distribution and expression levels in critical normal tissues (cardiac, neurological, hematopoietic) for both targets", "Comparative ADC-specific toxicity liabilities for A (e.g., linker stability, payload bystander effect) not addressed in the narrative", "Quantitative assessment of therapeutic window (maximum tolerated dose vs. efficacious dose) for either target in melanoma models"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K1) has a decisive clinical-precedent advantage on the right_patient axis. B reports a real Phase 3 programme in melanoma with an established patient population, whereas A (ERBB2) explicitly states 'No melanoma clinical precedent' and must establish both population and biomarker 'de novo'. B's Phase 3 status de-risks patient stratification and endpoint definition; the remaining work is biomarker refinement within a proven arena. A carries first-in-class stratification risk with no clinical footprint to anchor patient selection or meaningful endpoints. Both report synthetic biomarker components, but B's synthetic layer sits atop real clinical validation, while A's sits on a blank slate. B rates 0.85 (strong, confidence 0.7); A rates 0.35 (weak, confidence 0.4). The gap is material and grounded in direct evidence of clinical precedent.", "decisive_evidence": ["B has real Phase 3 clinical candidate in melanoma (Open Targets drugAndClinicalCandidates); A has zero melanoma clinical precedent", "B's patient population is already defined by Phase 3 trial; A must establish population de novo", "B's confidence on right_patient is 0.7 vs A's 0.4, reflecting evidence depth disparity", "B's narrative explicitly states 'stratification and endpoint risk is largely retired'; A states 'first-in-class stratification risk'"], "missing_evidence": ["Specific biomarker enrichment criteria for B's Phase 3 programme (both hypotheses treat this as synthetic placeholder)", "Comparative unmet-need magnitude in HER2-low vs BRAF-mutant melanoma subpopulations", "Real-world patient-access or reimbursement landscape for either target in melanoma"]}, "right_commercial": {"axis": "right_commercial", "relation": "tie", "confidence": "medium", "rationale": "Both hypotheses face materially similar commercial headwinds on the right_commercial axis. Both targets (ERBB2 and MAP2K1) are explicitly characterized as 'well-trodden' in crowded fields, with commercial differentiation requiring novel modality, payload, or indication niche rather than target novelty. Both are assigned weak commercial scores (0.326 vs 0.3) with moderate confidence (0.5). The key differentiator would be modality novelty: Hypothesis A proposes an ADC (approved for ERBB2 already, so precedent exists but crowded), while Hypothesis B proposes small-molecule (approved for MAP2K1, similarly precedented and crowded). Neither modality offers clear whitespace advantage over the other in melanoma\u2014both are established approaches. The competitive position and indication niche risk are symmetric: ERBB2 in melanoma and MAP2K1 in melanoma are both high-association targets in a saturated indication. Without explicit competitor counts, market sizing, or differentiation data, the commercial attractiveness cannot be reliably ordered between them.", "decisive_evidence": ["Hypothesis A: 'Crowded field: ERBB2 is a well-trodden target, so commercial differentiation must come from a novel modality, payload, or indication niche rather than the target itself.'", "Hypothesis B: 'Crowded field: MAP2K1 is a well-trodden target, so commercial differentiation must come from a novel modality, payload, or indication niche rather than the target itself.'", "Both assigned right_commercial value in the 0.3 range with 0.5 confidence and weak strength", "Both use synthetic data for competitor_count and whitespace assessment"], "missing_evidence": ["Explicit competitor counts for ERBB2 ADCs vs MAP2K1 small-molecules in melanoma", "Current market penetration and pricing/revenue data for approved comparators", "Clinical phase distribution (A: established ERBB2 ADCs; B: PHASE_3 MAP2K1 exists\u2014does this create differentiation opportunity or entrench crowding?)", "Payload or formulation novelty that would create commercial whitespace for either modality", "Unmet need quantification in HER2-high melanoma vs MAPK-driven melanoma subpopulations", "Regulatory pathway clarity and exclusivity levers for each modality in this indication"]}, "tractability": {"axis": "tractability", "relation": "tie", "confidence": "high", "rationale": "Both hypotheses satisfy the tractability axis with equal strength and precedent. Hypothesis A (ERBB2 + ADC) and Hypothesis B (MAP2K1 + small molecule) each report a tractability value of 0.9 with 0.9 confidence, both grounded in approved drugs and satisfied modality-specific buckets. ERBB2 has approved ADC precedent (trastuzumab-deruxtecan), meeting AB-modality criteria; MAP2K1 has approved small-molecule precedent (trametinib), meeting SM-modality criteria. Both modalities are well-established, both targets have solved structural/ligand problems, and both drugs are on-market, indicating mature chemistry, assay infrastructure, and manufacturability. The modality-target fit is appropriate in both cases: ERBB2 as a cell-surface receptor is well-suited to ADC delivery and payload mechanisms; MAP2K1 as an intracellular kinase is well-suited to small-molecule inhibition. Neither hypothesis presents a modality novelty burden or structural discovery risk. The evidence is direct (approved drugs, Open Targets tractability buckets) rather than synthetic.", "decisive_evidence": ["ERBB2 has an approved ADC drug (trastuzumab-deruxtecan), satisfying all AB-modality tractability buckets.", "MAP2K1 has an approved small-molecule drug (trametinib), satisfying all SM-modality tractability buckets.", "Both report tractability = 0.9 with confidence = 0.9, indicating high-confidence, well-precedented modality choices.", "Both modality-target pairings are mechanistically standard: cell-surface receptor + ADC, intracellular kinase + small molecule.", "Neither hypothesis faces structural discovery, assay, or delivery risk; both start from existing, approved precedent."], "missing_evidence": ["ADC-specific payload selectivity and linker robustness for ERBB2 (addressed by precedent but not detailed).", "Resistance mechanisms and kinase selectivity for MAP2K1 trametinib (addressed by precedent but not detailed).", "Relative manufacturability or scale-up burden between ADC vs. small-molecule modalities in this specific context (not material to tie)."]}}}, {"hypothesis_a": "H7", "hypothesis_b": "H2", "relation": "B_dominates_A", "dominator": "H2", "dominated": "H7", "comparison_summary": {"overall_relation": "B_dominates_A", "strictly_better_axes": ["right_target", "right_patient", "right_commercial", "tractability"], "tied_axes": ["right_tissue", "right_safety"], "worse_axes": [], "unresolved_axes": []}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "Both hypotheses present strong, multi-modal causal support for their respective targets in cutaneous melanoma, grounded in Open Targets aggregated evidence (genetics, somatic mutations, literature, and known drugs). However, MAP2K1 (B) demonstrates materially stronger target causality on this axis through two decisive mechanistic and genetic indicators: (1) MAP2K1 has a higher overall disease association score (0.683 vs 0.555), reflecting stronger aggregated causal evidence; (2) MAP2K1's LOEUF (o/e) = 0.32 places it in the constrained tail, indicating loss-of-function intolerance\u2014a signature of essential genes and a strong mechanistic causality prior. TERT's LOEUF = 0.46 (tolerant range) is weaker on this metric, as tolerance to LoF weakly argues against essential-gene causality. Both targets sit on relevant pathways (TERT: telomere extension and MITF regulation; MAP2K1: MAPK/ERK signaling), but MAP2K1's position downstream of BRAF in a canonically dysregulated melanoma pathway (BRAF-MEK-ERK axis) provides sharper disease-biology grounding. The clinical precedent of a Phase 3 MAP2K1 inhibitor further validates that the target mechanism translates to human disease, though this is secondary context for the right_target axis itself. Both lack measured single-cell tissue specificity, so neither gains advantage there.", "decisive_evidence": ["MAP2K1 Open Targets association score 0.683 vs TERT 0.555\u2014higher aggregate causal signal", "MAP2K1 LOEUF (o/e) = 0.32 (constrained, LoF-intolerant) vs TERT 0.46 (tolerant)\u2014stronger mechanistic causality prior from constraint", "MAP2K1 sits on BRAF-MEK-ERK signaling axis, a canonically dysregulated pathway in melanoma; TERT on telomere extension and MITF regulation\u2014both relevant but MEK's pathway is more directly implicated in melanoma somatic driver mutations", "No curated safety liabilities for either; both have modest mouse KO footprints, so safety does not discriminate on right_target proper"], "missing_evidence": ["Somatic mutation frequency and allele frequency in melanoma cohorts for each target (would strengthen causal ranking)", "CRISPR essentiality scores in melanoma cell lines (would refine LoF-constraint interpretation)", "Quantitative pathway perturbation data (e.g., phosphoproteomics showing on-target MEK vs telomerase pathway engagement in melanoma models)", "Human genetics: whether MAP2K1 variants show stronger GWAS/exome-seq association with melanoma risk than TERT variants (would clarify germline causality)"]}, "right_tissue": {"axis": "right_tissue", "relation": "tie", "confidence": "high", "rationale": "Both hypotheses report identical evidence status on the right_tissue axis: neither has measured single-cell tissue specificity (tau) or malignant-vs-stromal fraction from direct experimental data. Both rely on synthetic designed priors with low confidence (0.4). Hypothesis A uses 'no designed prior; weak association-derived placeholder' while Hypothesis B uses 'downstream of BRAF; specificity inherited from pathway context.' While B's rationale is slightly more mechanistically grounded (pathway inheritance from a well-known melanoma driver), both remain unmeasured and both correctly flag single-cell profiling as the highest-value experiment to resolve this axis. The reported values (A: 0.638, B: 0.6) reflect confidence levels identical in structure and both explicitly acknowledge these are hypotheses awaiting measurement, not evidence. Neither hypothesis provides direct tissue, cellular, or disease-context-specific data (single-cell, spatial, malignant-vs-stromal, or disease-state enrichment).", "decisive_evidence": ["Both A and B lack direct single-cell tissue specificity data", "Both rely on synthetic designed priors with confidence=0.4", "Both identify tier-3 single-cell profiling as the critical missing experiment", "Neither provides malignant-vs-stromal fraction evidence", "Neither provides spatial transcriptomics or disease-tissue-enrichment data"], "missing_evidence": ["Single-cell tau specificity measurements for TERT in melanoma tissue", "Single-cell tau specificity measurements for MAP2K1 in melanoma tissue", "Malignant cell fraction enrichment for both targets", "Spatial transcriptomics or immunohistochemistry showing target expression in tumor vs. stroma", "Patient-derived xenograft (PDX) or primary melanoma tissue validation", "Disease-state-specific expression (primary vs. metastatic vs. recurrent melanoma)", "Comparison of target activity in melanoma-initiating cells vs. differentiated melanoma cells"]}, "right_safety": {"axis": "right_safety", "relation": "tie", "confidence": "medium", "rationale": "Both hypotheses report zero curated safety liabilities and modest mouse-knockout phenotype footprints (33 for TERT, 24 for MAP2K1), with no dominant safety liability surfaced in either case. However, a critical constraint difference exists: MAP2K1 carries a LOEUF (o/e) of 0.32, placing it in the constrained/intolerant tail for loss-of-function, which raises an on-target toxicity flag. TERT, by contrast, has a LOEUF of 0.46, in the tolerant range, weakly arguing against essential-gene toxicity. This genetic constraint differential suggests MAP2K1 may face a narrower therapeutic window due to essentiality, offsetting its slightly higher safety axis value (0.9 vs 0.863). The knockout phenotypes for MAP2K1 (abnormal trophoblast, increased cranium length, increased astrocyte number) hint at developmental/neural sensitivity, whereas TERT's phenotypes (decreased litter size, decreased testis weight) are less suggestive of broad tissue toxicity. However, both lack curated safety liabilities and both remain unmeasured on tissue specificity\u2014a high-value gap. The moderate confidence reflects incomplete data on tissue distribution and the lack of clinical safety data for either TERT (first-in-class) or a novel MAP2K1 modality; only the clinical precedent for MAP2K1 would provide real-world safety signal, which is absent from the right_safety axis proper.", "decisive_evidence": ["TERT LOEUF = 0.46 (tolerant range) vs MAP2K1 LOEUF = 0.32 (constrained tail) \u2014 suggests MAP2K1 faces on-target essentiality toxicity risk", "Both report 0 curated safety liabilities", "TERT: 33 mouse-KO phenotypes (modest); MAP2K1: 24 mouse-KO phenotypes (modest) \u2014 similar scale", "MAP2K1 knockout phenotypes include abnormal trophoblast/increased astrocytes \u2014 hint at developmental/neural sensitivity", "TERT knockout phenotypes include decreased litter size/testis weight \u2014 less broadly tissue-specific signal"], "missing_evidence": ["Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets \u2014 unmeasured, high-VoI gap", "Clinical safety data from real patients: TERT is first-in-class (no clinical safety footprint); MAP2K1 has PHASE_3 precedent but right_safety axis does not extract adverse event data", "Tissue distribution in normal somatic cells (TERT is stated 'inactive or very low' in somatic cells, but quantitative tau not available)", "Pathway-level toxicity risk: MAPK pathway essentiality vs telomere extension essentiality \u2014 mechanistic comparison incomplete", "On-target vs off-target pharmacology risk for proposed small-molecule modality in each case"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K1) has established clinical precedent with a Phase 3 programme in melanoma, meaning a treatable patient population is already defined and the stratification/endpoint risk is substantially retired. Hypothesis A (TERT) has zero clinical footprint and would require de novo patient population definition and biomarker discovery, carrying first-in-class stratification risk. B's confidence score (0.7) is also nearly double A's (0.4), reflecting the material difference in evidence maturity. Both have synthetic biomarker components, but B's foundation rests on real clinical data, whereas A's entire patient axis is synthetic and unproven.", "decisive_evidence": ["B has documented Phase 3 clinical programme for MAP2K1 in melanoma (from Open Targets drugAndClinicalCandidates); A has no clinical precedent for TERT in melanoma", "B's right_patient confidence is 0.7 (supported by real clinical data); A's confidence is 0.4 (hybrid/synthetic, explicitly described as 'unproven')", "B explicitly states 'a treatable patient population is already defined' and 'stratification and endpoint risk is largely retired'; A states 'both the patient population and its enrichment biomarker would have to be established de novo'", "B's interpretation: open question is only 'which biomarker sub-population to enrich'; A's interpretation: question is 'whether one exists' (fundamental uncertainty)"], "missing_evidence": ["Specific biomarker stratification strategy for B (noted as synthetic placeholder)", "Unmet medical need magnitude and patient population size for each hypothesis", "Real-world clinical trial endpoints and patient retention/meaningful benefit data for B's Phase 3 programme", "Depth of biomarker validation or companion diagnostic maturity in B's existing programme"]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses target crowded fields with high-association targets (TERT: 0.555, MAP2K1: 0.683 on right_target), which limits differentiation by target novelty alone. However, MAP2K1 (H2) has a material commercial advantage: it has existing clinical precedent (PHASE_3 programme in melanoma), an approved small-molecule drug, and proven chemistry. This de-risks the commercial pathway and establishes proof of mechanism and patient stratification in the indication. TERT (H1) carries first-in-class stratification and clinical validation risk, requiring novel modality, payload, or niche positioning to differentiate commercially\u2014a higher bar. Both are synthetic on whitespace and competitor count, so the differentiation hinges on clinical and commercial precedent rather than target uniqueness.", "decisive_evidence": ["MAP2K1 has PHASE_3 clinical precedent in melanoma (from drugAndClinicalCandidates), establishing a proven patient population and stratification pathway", "MAP2K1 has an approved small-molecule drug, de-risking modality and chemistry feasibility", "TERT has no melanoma clinical precedent, requiring first-in-class stratification and biomarker validation", "Both targets are high-association, crowded fields; commercial differentiation must come from modality, payload, or niche\u2014not the target itself", "MAP2K1's approved-drug status lowers commercial and clinical execution risk versus TERT's de novo approach"], "missing_evidence": ["Explicit competitor count and market saturation data for both TERT and MAP2K1 in melanoma", "Pricing, reimbursement, and market-size data for each indication niche", "Details of competing TERT programmes (if any) and their status", "Commercial whitespace analysis for alternative indication niches (e.g., non-melanoma malignancies)", "Modality and payload differentiation strategies for each hypothesis (both are generic 'small_molecule')"]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "Both hypotheses propose small-molecule modality for their respective targets in melanoma. Hypothesis B (MAP2K1) demonstrates substantially higher tractability due to direct clinical precedent: an approved small-molecule drug already exists, providing proven chemistry, assayability, developable molecules, and modality-target fit. Hypothesis A (TERT) is tractable in principle (High-Quality Ligand, Druggable Family buckets) but lacks the de-risking advantage of an approved drug. The tractability axis explicitly prioritizes 'approved drugs' and 'direct modality precedent'\u2014B satisfies both; A satisfies neither. B's tractability score (0.9) reflects five satisfied Open Targets buckets (Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, Druggable Family) versus A's two (High-Quality Ligand, Druggable Family). Both share identical confidence (0.9) and cost (1), ensuring the comparison is not confounded by uncertainty or resource burden.", "decisive_evidence": ["B has an approved small-molecule drug targeting MAP2K1 in melanoma (PHASE_3 clinical evidence); A has no clinical drug precedent for TERT in any indication.", "B satisfies five Open Targets SM-tractability buckets (Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, Druggable Family); A satisfies two (High-Quality Ligand, Druggable Family).", "B's tractability finding explicitly states 'De-risked modality' with chemistry/biologics feasibility proven; A's finding states modality is 'credible though not yet clinically validated for this target'.", "Both targets carry identical LOEUF constraint and knockout phenotype burden, so safety-related tractability liabilities do not differentiate them."], "missing_evidence": ["Comparative potency, selectivity, or ADME/PK profile of high-quality ligands against TERT vs. MAP2K1 (would refine small-molecule suitability).", "Identity and stage of competing MAP2K1 programmes (would contextualize whether the approved drug blocks access or enables differentiation).", "Active TERT inhibitor scaffolds or clinical trial landscape (would clarify whether TERT tractability is genuinely novel or dormant for pragmatic reasons)."]}}}, {"hypothesis_a": "H8", "hypothesis_b": "H3", "relation": "B_dominates_A", "dominator": "H3", "dominated": "H8", "comparison_summary": {"overall_relation": "B_dominates_A", "strictly_better_axes": ["right_target", "right_safety", "right_patient", "right_commercial", "tractability"], "tied_axes": ["right_tissue"], "worse_axes": [], "unresolved_axes": []}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "On the right_target axis, Hypothesis B (MAP2K2) demonstrates stronger causal and mechanistic support for melanoma relevance than Hypothesis A (SETD2). The decisive factors are: (1) Open Targets disease association score is materially higher for MAP2K2 (0.658 vs 0.554), reflecting multi-modal evidence aggregation; (2) MAP2K2's LOEUF constraint (0.61, tolerant range) is more favorable than SETD2's (0.13, constrained tail), reducing on-target toxicity risk and strengthening the mechanistic signal; (3) MAP2K2 sits on five well-characterized MAPK pathway nodes (Signaling by MAP2K mutants, Negative feedback regulation, RAF fusions, RAF1 mutants, Frs2-mediated activation) with direct somatic mutation precedent in melanoma, whereas SETD2 sits on a single broad histone methylation pathway with less direct disease causality; (4) MAP2K2's clinical validation (Phase 3 drug in melanoma) provides real-world perturbation evidence that the target engagement model works in patients, whereas SETD2 has no clinical precedent. Both hypotheses rely on the same Open Targets infrastructure and have equal confidence in the aggregation process (0.9), but the underlying evidence\u2014genetic constraint, pathway specificity, somatic mutation load, and clinical validation\u2014favors MAP2K2 more strongly on mechanistic grounds.", "decisive_evidence": ["MAP2K2 Open Targets associationScore 0.658 vs SETD2 0.554 (18.8% higher, multi-modal aggregation)", "MAP2K2 LOEUF 0.61 (tolerant, lower on-target toxicity risk) vs SETD2 LOEUF 0.13 (constrained, higher toxicity flag)", "MAP2K2 embedded in five MAPK pathway nodes with direct somatic mutation precedent in melanoma", "SETD2 sits on single broad histone methylation pathway with less direct disease causality signal", "MAP2K2 has Phase 3 clinical validation in melanoma (real perturbation evidence); SETD2 has zero clinical precedent"], "missing_evidence": ["Detailed somatic mutation frequency and recurrence data for ic placeholders rather than measured evidence.", "Both A and B assign confidence 0.4 to the right_tissue axis, indicating weak empirical grounding.", "Both A and B propose identical tier-3 single-cell profiling experiments to resolve this axis.", "Neither A nor B presents direct single-cell, spatial, disease-tissue, or malignant-vs-stromal evidence."], "missing_evidence": ["Single-cell RNA-seq or protein profiling of melanoma tissue (malignant vs. stromal compartments) for either target.", "Spatial transcriptomics or in situ hybridization data showing SETD2 or MAP2K2 localization in melanoma lesions.", "Quantified tissue-specificity metric (tau) derived from disease-relevant single-cell cohorts.", "Comparison of target expression in melanoma cells vs. immune, fibroblast, or endothelial populations.", "Disease-state specificity: expression in primary, metastatic, or treatment-resistant melanoma.", "Patient-stratified profiling (BRAF-mutant, NRAS-mutant, WT backgrounds) for either target."]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses report 0 curated safety liabilities and modest knockout phenotype footprints, placing them in a similar baseline safety posture. However, MAP2K2 (B) shows a meaningful safety advantage on two grounds: (1) genetic constraint: MAP2K2 has LOEUF=0.61 (tolerant range), indicating loss-of-function is well tolerated in population data and arguing against essential-gene on-target toxicity. SETD2 has LOEUF=0.13 (constrained tail), meaning it is intolerant to LoF and raises an on-target-toxicity flag. (2) Knockout phenotype burden: MAP2K2 has 4 distinct mouse-KO phenotypes (including 'no abnormal phenotype detected'); SETD2 has 22 distinct mouse-KO phenotypes (including open neural tube, short tibia, decreased prepulse inhibition). The larger phenotypic footprint for SETD2 suggests broader pleiotropy and developmental/neurological vulnerability. (3) Clinical validation: MA reducing chemistry/modality execution risk relative to SETD2 (0.6)."], "missing_evidence": ["Explicit competitive landscape and whitespace quantification for both targets (both use synthetic approximation).", "Modality novelty or payload differentiation strategy for either hypothesis (would clarify how to escape target-level crowding).", "Commercial indication niche or patient population characteristics for SETD2 (required to assess first-in-class risk).", "Biomarker enrichment strategy or commercial segment focus for MAP2K2 (needed to evaluate refinement-play positioning).", "Pricing, reimbursement, or market-access intelligence for either target."]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K2) demonstrates superior tractability on this axis due to direct clinical precedent and a higher quality of structural and ligand evidence. MAP2K2 satisfies five tractability buckets including 'Approved Drug'\u2014meaning a small-molecule inhibitor has already reached market, proving both the druggability of the target and the developability of molecules against it. This constitutes the gold standard for modality-target fit and directly de-risks chemistry, assayability, and delivery feasibility. Hypothesis A (SETD2) satisfies only two tractability buckets ('Structure with Ligand' and 'High-Quality Ligand') and lacks any approved-drug precedent, meaning the modality remains credible but unvalidated for this specific target. Both targets are histone methyltransferases (SETD2) or kinases (MAP2K2) in druggable protein families, but only MAP2K2 has a clinically-proven small-molecule modality track record. The presence of an approved drug and multiple high-quality ligands in the MAP2K2 space substantially reduces discovery and development risk compared to SETD2's reliance on structural pockets and high-quality ligands without clinical validation.", "decisive_evidence": ["MAP2K2 tractability score = 0.9 with 'Approved Drug' bucket satisfied (high confidence 0.9); SETD2 tractability score = 0.6 with only 'Structure with Ligand' and 'High-Quality Ligand' buckets satisfied.", "MAP2K2 has a Phase 3 clinical programme in melanoma (from drugAndClinicalCandidates), demonstrating in-vivo efficacy, safety, and formulation validation in the disease context.", "MAP2K2 satisfies five distinct tractability buckets (Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, Druggable Family); SETD2 satisfies two.", "Open Targets documentation explicitly states MAP2K2 has 'Approved Drug' precedent, indicating de-risked modality; SETD2 is described as 'credible though not yet clinically validated for this target'."], "missing_evidence": ["Specific ligand affinity, selectivity, and off-target profiles for candidate molecules against either target.", "Detailed structure-activity relationship (SAR) maturity or chemical-series tractability for SETD2, beyond existence of high-quality ligands.", "Bioavailability, PK/PD, or formulation challenges unique to each target's chemical series (both are assumed to inherit kinase or PKMT-class precedent)."]}}}, {"hypothesis_a": "H9", "hypothesis_b": "H1", "relation": "tradeoff_or_unresolved", "dominator": null, "dominated": null, "comparison_summary": {"overall_relation": "tradeoff_or_unresolved", "strictly_better_axes_for_A": ["right_safety"], "strictly_better_axes_for_B": ["right_target", "right_tissue", "right_patient", "right_commercial"], "tied_axes": ["tractability"], "unresolved_axes": [], "reason": "both_sides_have_advantages"}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "On the right_target axis, Hypothesis B (BRAF) demonstrates materially stronger causal and mechanistic support for melanoma than Hypothesis A (MTOR). The key differentiators are: (1) Open Targets disease association score is substantially higher for BRAF (0.701 vs 0.55), reflecting aggregated genetic, somatic, and evidence streams; (2) BRAF carries somatic genetic evidence of direct driver mutations in melanoma (V600E is the canonical melanoma-initiating lesion), whereas MTOR's role is indirect and metabolic; (3) BRAF sits on gain-of-function pathway causality (MRAS/RAF/MAPK), directly transducing oncogenic signals, while MTOR is a downstream metabolic integrator; (4) Both targets show similar LoF constraint (BRAF o/e=0.15 vs MTOR o/e=0.22), so neither has an advantage on that metric, but BRAF's constraint is tighter, consistent with a more direct oncogenic role. The MTOR association, while credible (0.55 is above noise), reflects pathway relevance rather than driver status. For target selection, somatic driver evidence and higher disease association scores are primary\u2014BRAF's V600E mutation is the textbook melanoma oncogene, whereas MTOR inhibition is a therapeutic strategy that works through metabolic stress and autophagy, not through correcting a primary genetic lesion.", "decisive_evidence": ["BRAF Open Targets association score 0.701 vs MTOR 0.55 (27% higher for B)", "BRAF carries canonical somatic driver mutations (V600E) in cutaneous melanoma; MTOR does not", "BRAF sits on Gain-of-function MRAS/RAF/MAPK pathway (direct oncogenic transduction); MTOR sits on metabolic/autophagy pathways (indirect consequence of oncogenic stress)", "Both show LoF constraint in constrained tail, but BRAF LOEUF o/e=0.15 is tighter than MTOR o/e=0.22, consistent with essential role in melanoma genesis", "Somatic genetics, not literature popularity, is the primary driver of the difference"], "missing_evidence": ["Comparative single-cell tau and malignant-fraction specificity (both hypotheses flag this as unmeasured; B has a more optimistic synthetic prior but neither is measured)", "Explicit mechanistic depth of MTOR in melanoma context (e.g., does MTOR inhibition specifically suppress V600E-BRAF-driven metabolism, or is it generic?)", "Quantitative contribution of somatic vs germline vs literature signals to the Open Targets scores (the 0.701 vs 0.55 difference is aggregated; breakdown would sharpen the comparison)"]}, "right_tissue": {"axis": "right_tissue", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses lack direct, measured evidence of tissue specificity (single-cell tau and malignant-vs-stromal fraction are unmeasured in both cases). However, they differ materially in their *prior* tissue-relevance assumptions. Hypothesis B grounds its prior in a disease-mechanistic fact: BRAF V600E mutations are the defining, recurrent somatic driver in ~50% of cutaneous melanomas, making mutant-BRAF melanoma a canonical oncogenic context with established malignant-cell enrichment. This is a curated, disease-context-specific prior\u2014not synthetic inference. Hypothesis A relies on MTOR as a ubiquitous essential kinase with no melanoma-specific driver mutation or known enrichment in malignant cells; its prior is purely synthetic and designed to reflect broad expression. Until both are measured via single-cell profiling (a tie-breaking experiment both acknowledge), the disease-mechanistic grounding of B's prior is materially stronger evidence of tissue relevance. B's prior is defensible; A's is a placeholder acknowledging poor specificity.", "decisive_evidence": ["BRAF mutational status in melanoma: V600E is the canonical somatic driver in ~50% of cutaneous melanomas (curated disease-context evidence), establishing malignant-cell enrichment a priori.", "MTOR tissue specificity: described as 'ubiquitous essential kinase' with no disease-specific driver mutation or malignant-enrichment anchor\u2014prior is synthetic and non-specific.", "Both hypotheses acknowledge single-cell profiling (tau + malignant fraction) is unmeasured and highest-VoI, placing them on equal footing for direct evidence.", "BRAF prior: moderately specific (mutant-BRAF melanoma is the definitional driver context).", "MTOR prior: broadly expressed / non-specific (designed prior reflecting poor tumour specificity)."], "missing_evidence": ["Single-cell RNA-seq or spatial transcriptomics tau (tissue-specificity coefficient) for BRAF in melanoma tissue vs. normal skin.", "Single-cell RNA-seq or spatial transcriptomics malignant-vs-stromal fraction for BRAF in melanoma tumours.", "Single-cell RNA-seq or spatial transcriptomics tau for MTOR in melanoma tissue vs. normal skin.", "Single-cell RNA-seq or spatial transcriptomics malignant-vs-stromal fraction for MTOR in melanoma tumours.", "Direct comparison of BRAF and MTOR expression in patient-derived melanoma samples (malignant cells) vs. stromal compartments.", "MTOR protein activity or phosphorylation in V600E-BRAF melanoma malignant cells to establish functional disease relevance independent of BRAF.", "Experimental validation of whether MTOR dependency is V600E-BRAF\u2013specific or pan-melanoma."]}, "right_safety": {"axis": "right_safety", "relation": "A_better", "confidence": "medium", "rationale": "Both hypotheses target kinases with curated safety liabilities (heart disease) and extensive knockout phenotypes, indicating broad developmental/essential roles. However, Hypothesis A (MTOR) reports 60 distinct mouse-knockout phenotypes with representative phenotypes focused on embryonic morphology and growth factor signaling, whereas Hypothesis B (BRAF) reports 77 distinct mouse-knockout phenotypes with broader tissue involvement (bone, adipose, vascular). The quantitative difference in phenotype breadth (60 vs 77) and the qualitative pattern in B's phenotypes (vascular endothelial involvement, adipose tissue effects) suggest a wider systemic footprint for BRAF, consistent with its role in a canonical mitogenic cascade (MAPK/ERK). Hypothesis A explicitly acknowledges 'no dominant safety liability surfaced' with a 'plausibly open' safety window, whereas Hypothesis B explicitly states 'Safety is a headwind' and notes the therapeutic window 'is narrow and must be bought back with tumour-selective delivery or dosing.' This is a direct acknowledgment by the hypotheses themselves of differential safety risk. Both carry equal heart disease liability and LoF constraint concerns (MTOR LOEUF=0.22, BRAF LOEUF=0.15), but the phenotypic breadth and explicit safety interpretation favor A.", "decisive_evidence": ["BRAF has 77 mouse-knockout phenotypes vs MTOR's 60, indicating broader essential role", "BRAF knockout phenotypes include abnormal vascular endothelial cell morphology, suggesting systemic vascular toxicity risk", "Hypothesis B explicitly interprets BRAF safety as 'a headwind' with 'narrow' therapeutic window requiring mitigation", "Hypothesis A explicitly interprets MTOR safety as a 'relative strength' with 'plausibly open' safety window", "Both share identical curated safety liability (heart disease) and similar LoF constraint flags, making phenotype breadth the differentiating factor"], "missing_evidence": ["Clinical safety data from approved BRAF inhibitors (e.g., vemurafenib) to ground the knockout phenotype interpretation in actual human toxicity patterns", "Tissue-specific knockout or conditional knockout studies for either target to distinguish on-target vs. off-target contributions", "Single-cell expression data (tau) and malignant vs. stromal fraction for both targets, which both hypotheses flag as unmeasured and high-value", "Quantitative comparison of therapeutic window (MTD/MED ratio) in preclinical models or clinical trials, if available", "Mechanistic depth on why MTOR's 60 phenotypes are less concerning than BRAF's 77 phenotypes\u2014phenotype count alone is a proxy"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (BRAF) demonstrates a materially stronger position on the right_patient axis due to established clinical precedent and a defined, biomarker-enriched patient population. BRAF has a Phase 3 clinical programme in drugs exist", "Both targets are serine/threonine kinases within a well-developed and tractable protein family"], "missing_evidence": ["Relative potency, selectivity, or binding affinity of current approved agents (not necessary to resolve tractability parity, but would inform optimization margin)", "Comparative pharmacokinetic properties of approved drugs against each target (not required for tractability axis comparison)"]}}}, {"hypothesis_a": "H9", "hypothesis_b": "H3", "relation": "B_dominates_A", "dominator": "H3", "dominated": "H9", "comparison_summary": {"overall_relation": "B_dominates_A", "strictly_better_axes": ["right_target", "right_tissue", "right_safety", "right_patient", "right_commercial"], "tied_axes": ["tractability"], "worse_axes": [], "unresolved_axes": []}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "On the right_target axis, Hypothesis B (MAP2K2) demonstrates materially stronger causal and mechanistic support than Hypothesis A (MTOR) for cutaneous melanoma. The comparison rests on three direct, curated evidence dimensions: (1) **Disease association strength**: B's Open Targets score is 0.658 vs A's 0.55\u2014a meaningful 20% gap driven by aggregated genetic, somatic, literature, and drug evidence. (2) **Genetic constraint and on-target toxicity risk**: B's LOEUF (o/e)=0.61 indicates LoF tolerance in the population, reducing the mechanistic causality prior for essential-gene toxicity. A's LOEUF=0.22 places it in the constrained tail, flagging intolerance to loss-of-function and raising on-target-everywhere toxicity risk\u2014a direct liability for target validity. (3) **Pathway specificity and disease mechanistic fit**: B sits on MAP2K/ERK pathway nodes (Signaling by MAP2K mutants, Negative feedback regulation of MAPK pathway), which are canonical melanoma drivers (particularly BRAF/NRAS-mutant tumors). A sits on autophagy and metabolic pathways (Macroautophagy, TP53 Regulates Metabolic Genes), which are less specifically implicated in melanoma etiology and are broader cellular functions. Both hypotheses lack measured single-cell tissue specificity and malignant-fraction data, but this gap is symmetric and does not distinguish them on right_target. Both are tractable (approved small molecules), but tractability is orthogonal to target mechanistic relevance.", "decisive_evidence": ["Open Targets associationScore: MAP2K2 = 0.658 vs MTOR = 0.55 (20% higher association with melanoma)", "LOEUF constraint: MAP2K2 = 0.61 (LoF-tolerant) vs MTOR = 0.22 (LoF-constrained; raises on-target toxicity flag)", "Pathway mechanistic specificity: MAP2K2 on canonical MAPK/ERK pathway (directly implicated in BRAF/NRAS melanoma drivers); MTOR on broad autophagy and metabolic pathways (less specific to melanoma etiology)", "Both targets have curated multi-modal evidence (genetic, somatic, literature, drug); neither is literature-only noise"], "missing_evidence": ["Single-cell tau specificity and malignant-vs-stromal fraction for both (symmetric gap; proposed tier-3 experiment for both)", "Detailed somatic mutation frequency in melanoma cohorts (implicit in associationScore but not separately reported)", "Functional perturbation studies (CRISPR/RNAi dependency) in melanoma cell lines for direct causal validation"]}, "right_tissue": {"axis": "right_tissue", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses lack direct single-cell or spatial tissue-specificity measurements (tau) and malignant-vs-stromal fractionation data. However, they differ materially in their synthetic prior assumptions about pathway-contextual specificity. Hypothesis A explicitly acknowledges MTOR as a 'ubiquitous essential kinase' with 'poor tumour specificity' and 'on-target-everywhere risk'\u2014a broader, less selective tissue liability. Hypothesis B characterizes MAP2K2 as having 'pathway-contextual specificity' via the MEK/ERK pathway, which is enriched in melanoma malignancy and more tissue/disease-context-restricted than mTOR's metabolic governance role. The synthetic priors differ in plausibility: a kinase operating within a narrow, oncogenic pathway (MAPK signaling in melanoma) is more likely to show selective activation in malignant cells than a central metabolic hub active across tissues. Neither hypothesis provides measured evidence, but B's contextual specificity prior is less synthetic and more aligned with known biology. The right_tissue values (A: 0.2 vs B: 0.58) reflect this difference appropriately, though both remain speculative pending single-cell profiling.", "decisive_evidence": ["Hypothesis A self-identifies MTOR as 'ubiquitous essential kinase' with designed prior of 'broadly expressed / non-specific'", "Hypothesis B characterizes MAP2K2 as having 'pathway-contextual specificity' via MEK/ERK signaling", "MAPK pathway (MAP2K2 substrate) is enriched in melanoma malignancy and BRAF/NRAS-driven oncogenic context", "MTOR's role in systemic metabolism suggests broader, non-selective tissue activation profile", "Both acknowledge lack of single-cell tau and malignant-fraction data; both propose identical tier-3 experiment to resolve"], "missing_evidence": ["Single-cell RNA-seq or spatial transcriptomics (tau) for MTOR in melanoma malignant vs. stromal cells", "Single-cell RNA-seq or spatial transcriptomics (tau) for MAP2K2 in melanoma malignant vs. stromal cells", "Protein-level immunohistochemistry or flow cytometry quantifying MTOR and MAP2K2 in primary/metastatic melanoma tissue", "Disease-state specificity: MTOR and MAP2K2 activity in normal skin vs. melanoma lesions", "Phospho-protein profiling (pERK, pmTOR) in malignant vs. stromal compartments of patient samples", "Preclinical xenograft or PDX pharmacodynamic profiling isolating on-target effect in melanoma cells vs. host toxicity"]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "medium", "rationale": "MAP2K2 (B) demonstrates a superior safety profile compared to MTOR (A) on several direct measures. B reports zero curated safety liabilities versus A's one (heart disease), and B's mouse-knockout phenotype footprint is markedly smaller (4 phenotypes vs. 60). Critically, B's LOEUF constraint metric (0.61) falls in the loss-of-function tolerant range, indicating the gene is well tolerated in population data and arguing against essential-gene toxicity. A's LOEUF (0.22) is in the constrained tail, signaling intolerance to loss-of-function and raising an on-target-toxicity flag. Both hypotheses note broad/unmeasured tissue specificity, but A's ubiquitous expression of an essential kinase creates a higher on-target-everywhere risk. B's pathway-contextual specificity (MEK2 in the MAPK cascade) is a modest advantage for de-risked off-target toxicity. Both have modest confidence (0.6) on the safety axis because tissue-level mechanistic detail remains unmeasured, but the genetic constraint and phenotypic evidence directionally favors B.", "decisive_evidence": ["B reports 0 curated safety liabilities vs. A's 1 (heart disease)", "B has 4 mouse-knockout phenotypes vs. A's 60, indicating a much smaller toxicity footprint", "B's LOEUF (0.61) is in the loss-of-function tolerant range; A's LOEUF (0.22) is in the constrained tail, flagging essential-gene toxicity risk", "A is described as a 'ubiquitous essential kinase' with 'poor tumour specificity, on-target-everywhere risk'; B has 'pathway-contextual specificity'", "Both have equivalent tractability and precedent (approved small-molecule drugs exist for both)"], "missing_evidence": ["Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both hypotheses (flagged as unmeasured in both)", "In vivo safety window data (e.g., maximum tolerated dose, dose-limiting toxicity profiles from preclinical or clinical studies)", "Mechanism of action-specific toxicity: whether MEK2 inhibition carries any pathway-level toxicity that a kinase-independent mTOR modality might avoid (or vice versa)", "Off-target liability profiling for small-molecule inhibitors against either target", "Tissue distribution data beyond knockout phenotypes (e.g., RNA-seq, protein atlases)"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K2) demonstrates a materially stronger position on the right_patient axis due to established clinical precedent. B reports a Phase 3 clinical programme for MAP2K2 in cutaneous melanoma, which directly de-risks the patient stratification and clinical endpoint questions. This means a treatable patient population is already defined and validated in human trials. Hypothesis A (MTOR) explicitly states 'No melanoma clinical precedent' and carries 'first-in-class stratification risk.' While both hypotheses acknowledge that specific biomarker substrata require refinement (both use synthetic placeholders), B's advantage is decisive: it operates within an existing validated clinical framework with an established patient population, whereas A must establish both the population and biomarker enrichment de novo. On the right_patient axis\u2014which prioritizes defined patient populations, biomarkers, clinical precedent, and meaningful endpoints\u2014B's Phase 3 footprint is direct, grounded evidence that A lacks entirely.", "decisive_evidence": ["B reports Phase 3 clinical programme for MAP2K2 in melanoma (Open Targets drugAndClinicalCandidates); A reports zero clinical precedent", "B's right_patient score is 0.85 (confidence 0.7, direction supports); A's is 0.35 (confidence 0.4, direction neutral)", "B's finding explicitly states 'a drug against MAP2K2 has reached PHASE_3 in melanoma' and 'a treatable patient population is already defined'", "A's interpretation states 'Patient axis is unproven' and carries 'first-in-class stratification risk'; B's interpretation states 'stratification and endpoint risk is largely retired'"], "missing_evidence": ["Specific biomarker definition for B's Phase 3 programme (acknowledged as synthetic placeholder in both)", "Comparative patient enrichment strategy or endpoint sensitivity/specificity for either hypothesis", "Unmet need magnitude in defined patient subpopulations for either target", "Real-world efficacy or endpoint durability data from B's Phase 3 trial (not provided, only registration status)"]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses acknowledge crowded competitive fields on their respective targets (MTOR and MAP2K2 as well-trodden melanoma targets). However, Hypothesis B carries a material commercial advantage: it has a real Phase 3 clinical precedent (drugAndClinicalCandidates field), which de-risks the patient stratification and endpoint definition. This precedent means the commercial path is partly validated\u2014a biomarker stratum already exists in clinical practice. Hypothesis A has zero clinical footprint in melanoma, forcing it to establish both the patient population and its biomarker from scratch (first-in-class stratification risk). In a crowded field where differentiation must come from modality, payload, or indication niche rather than the target itself, a programme with existing clinical validation and a defined treatable population has stronger commercial positioning than one starting entirely de novo. The commercial value lies not in escaping the crowd, but in having a clearer, lower-risk path to market and patient access.", "decisive_evidence": ["Hypothesis B: 'a drug against MAP2K2 has reached PHASE_3 in melanoma' (drugAndClinicalCandidates); stratification risk 'largely retired'", "Hypothesis A: 'No melanoma clinical precedent for MTOR in Open Targets'; patient population and biomarker must be 'established de novo'; carries 'first-in-class stratification risk'", "Both: explicit acknowledgment that commercial differentiation must come from modality/payload/niche, not the target itself (crowded field)"], "missing_evidence": ["Explicit competitor count and active development programs for each target in melanoma", "Market size and reimbursement landscape for MAP2K2 vs MTOR inhibitors in melanoma", "Intellectual property freedom-to-operate and patent landscape for novel modalities on each target", "Real-world clinical outcomes and response rates from the MAP2K2 Phase 3 programme (to confirm commercial viability of the precedent)", "Indication niche opportunities or combination therapy angles for either target"]}, "tractability": {"axis": "tractability", "relation": "tie", "confidence": "high", "rationale": "Both hypotheses demonstrate equivalent tractability on the small-molecule modality axis. Hypothesis A (MTOR) and Hypothesis B (MAP2K2) each satisfy the same core Open Targets small-molecule tractability criteria: both have approved drugs, structures with ligands, high-quality ligands, and belong to druggable kinase families. Both score 0.9 confidence with 'strong' supporting direction. The modest difference in tractability bucket coverage (MTOR: 4 buckets; MAP2K2: 5 buckets, including 'High-Quality Pocket') is negligible for practical modality feasibility\u2014both start from proven chemistry precedent rather than discovery risk. Neither hypothesis reports delivery barriers, assayability problems, or developability liabilities specific to tractability. The kinase target class is well-established for small-molecule modulation in both cases.", "decisive_evidence": ["MTOR: Open Targets tractability score 0.9, Approved Drug + Structure with Ligand + High-Quality Ligand + Druggable Family satisfied", "MAP2K2: Open Targets tractability score 0.9, Approved Drug + Structure with Ligand + High-Quality Ligand + High-Quality Pocket + Druggable Family satisfied", "Both targets are serine/threonine kinases with mature small-molecule ligand portfolios and clinical precedent", "Neither hypothesis reports chemistry, delivery, or assayability barriers"], "missing_evidence": ["Ligand potency/selectivity distributions or SAR maturity comparisons between MTOR and MAP2K2 series", "Specific approved drug names and their physicochemical/ADMET properties", "In vitro assay throughput or hit-rate data", "Any modality-specific manufacturing or stability constraints"]}}}, {"hypothesis_a": "H10", "hypothesis_b": "H1", "relation": "tradeoff_or_unresolved", "dominator": null, "dominated": null, "comparison_summary": {"overall_relation": "tradeoff_or_unresolved", "strictly_better_axes_for_A": ["right_safety"], "strictly_better_axes_for_B": ["right_target", "right_patient", "right_commercial", "tractability"], "tied_axes": ["right_tissue"], "unresolved_axes": [], "reason": "both_sides_have_advantages"}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "On the right_target axis, Hypothesis B (BRAF) demonstrates materially stronger causal and mechanistic support for cutaneous melanoma than Hypothesis A (SMARCA4). The decisive evidence is: (1) BRAF has a higher Open Targets disease association score (0.701 vs 0.547), reflecting aggregated genetic, somatic, literature, and known-drug evidence; (2) BRAF carries somatic gain-of-function mutations that are definitional drivers of melanoma pathogenesis (mutant-BRAF is the founding oncogenic event in ~50% of cutaneous melanomas), whereas SMARCA4's role is as a chromatin remodeler with indirect pathway involvement; (3) BRAF sits on gain-of-function RAF signaling pathways with direct transduction to MAPK, a canonical melanoma driver cascade, whereas SMARCA4's pathways (BAF complex formation, IL-7 signaling, Th2 differentiation) are developmental and immune-related rather than tumor cell intrinsic; (4) both genes are LoF-constrained (similar LOEUF), but BRAF's constraint reflects its essential developmental role, whereas this is less well-established for SMARCA4 in melanoma context. The interpretation is unambiguous: BRAF is a proven driver oncogene with somatic mutations in melanoma, while SMARCA4 is a more distant chromatin-regulatory target with weaker direct mechanistic coupling to melanoma pathogenesis.", "decisive_evidence": ["BRAF Open Targets association score (0.701) is 28% higher than SMARCA4 (0.547), reflecting stronger multi-modal causal support", "BRAF carries recurrent somatic activating mutations (V600E and others) that are oncogenic drivers in ~50% of cutaneous melanomas\u2014definitional causality", "BRAF pathways are gain-of-function RAF/MAPK signaling (canonical melanoma driver), whereas SMARCA4 pathways are developmental/immune BAF complex formation (indirect, non-tumor-intrinsic)", "BRAF has a known-drug precedent (PHASE_3 programme on record), providing clinical validation of target-disease causality", "Both genes are LoF-constrained, but BRAF's constraint and knockout phenotypes (77 phenotypes) reflect broad developmental essentiality, establishing mechanistic relevance across tissues including melanoma"], "missing_evidence": ["Somatic mutation burden in SMARCA4 in melanoma cohorts (would strengthen or weaken SMARCA4's position)", "Functional perturbation studies (CRISPR or RNAi) comparing SMARCA4 vs BRAF knockdown in melanoma cell lines and patient-derived models", "Pathway-level mechanistic data: whether SMARCA4 loss/gain causally drives MAPK pathway activation or survival in melanoma (currently inferred only through BAF complex membership)", "Enrichment analysis: whether SMARCA4 mutations co-occur with BRAF mutations or define a distinct melanoma subtype (would indicate independent mechanistic relevance)"]}, "right_tissue": {"axis": "right_tissue", "relation": "tie", "confidence": "low", "rationale": "Both hypotheses are materially identical on the right_tissue axis: (1) Neither provides experimentally measured single-cell tissue specificity (tau) or malignant-vs-stromal fraction data; (2) Both rely on synthetic desig
