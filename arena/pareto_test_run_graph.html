<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Pareto domination graph</title>
<style>
  :root {
    --bg: #fcfcfb; --fg: #0b0b0b; --panel-bg: #f7f7f5; --border: rgba(11,11,11,0.10);
    --muted: #6b7178; --accent: #2e6dd4;
    --status-front: #0ca30c; --status-dominated: #767b86; --status-critical: #d03b3b;
    --edge-dominance: #757c8c; --edge-tradeoff: #b5730d;
    --shadow-sm: 0 1px 2px rgba(11,11,11,0.14), 0 1px 1px rgba(11,11,11,0.08);
    --shadow-md: 0 4px 14px rgba(11,11,11,0.12), 0 1px 3px rgba(11,11,11,0.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16181c; --fg: #e8e9eb; --panel-bg: #1c1f24; --border: rgba(255,255,255,0.10);
      --muted: #9aa0a8; --accent: #6fa1ff;
      --status-front: #16c157; --status-dominated: #8a90a0; --status-critical: #e2635f;
      --edge-dominance: #8891a3; --edge-tradeoff: #e0a53e;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.45), 0 1px 1px rgba(0,0,0,0.3);
      --shadow-md: 0 6px 20px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.35);
    }
  }
  :root[data-theme="dark"] {
    --bg: #16181c; --fg: #e8e9eb; --panel-bg: #1c1f24; --border: rgba(255,255,255,0.10);
    --muted: #9aa0a8; --accent: #6fa1ff;
    --status-front: #16c157; --status-dominated: #8a90a0; --status-critical: #e2635f;
    --edge-dominance: #8891a3; --edge-tradeoff: #e0a53e;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.45), 0 1px 1px rgba(0,0,0,0.3);
    --shadow-md: 0 6px 20px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.35);
  }
  :root[data-theme="light"] {
    --bg: #fcfcfb; --fg: #0b0b0b; --panel-bg: #f7f7f5; --border: rgba(11,11,11,0.10);
    --muted: #6b7178; --accent: #2e6dd4;
    --status-front: #0ca30c; --status-dominated: #767b86; --status-critical: #d03b3b;
    --edge-dominance: #757c8c; --edge-tradeoff: #b5730d;
    --shadow-sm: 0 1px 2px rgba(11,11,11,0.14), 0 1px 1px rgba(11,11,11,0.08);
    --shadow-md: 0 4px 14px rgba(11,11,11,0.12), 0 1px 3px rgba(11,11,11,0.10);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column;
  }
  h1 { font-size: 16px; margin: 0; letter-spacing: -0.01em; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px; border-bottom: 1px solid var(--border);
    flex-wrap: wrap; gap: 10px; flex: 0 0 auto;
    box-shadow: var(--shadow-sm); position: relative; z-index: 3;
  }
  .meta { color: var(--muted); font-size: 12.5px; }
  .legend { display: flex; gap: 16px; font-size: 12.5px; color: var(--muted); flex-wrap: wrap; }
  .legend-group { display: flex; gap: 16px; align-items: center; }
  .legend-sep { width: 1px; height: 14px; background: var(--border); }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .edge-swatch { width: 20px; height: 0; border-top-width: 2px; border-top-style: solid; display: inline-block; }
  .edge-swatch.tradeoff { border-top-style: dashed; }

  .layout { display: flex; flex: 1 1 auto; min-height: 0; }
  .graph-wrap { flex: 1 1 auto; position: relative; min-width: 0; background: var(--bg); }
  svg { display: block; width: 100%; height: 100%; touch-action: none; cursor: grab; }
  svg.panning { cursor: grabbing; }

  .zoom-controls {
    position: absolute; right: 14px; bottom: 14px; display: flex; flex-direction: column;
    gap: 6px; z-index: 2;
  }
  .zoom-controls button {
    width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--panel-bg); color: var(--fg); font-size: 15px; cursor: pointer;
    box-shadow: var(--shadow-sm); transition: filter .12s ease, transform .12s ease;
  }
  .zoom-controls button:hover { filter: brightness(1.12); transform: translateY(-1px); }
  .zoom-controls button:active { transform: translateY(0); }
  .zoom-hint {
    position: absolute; left: 14px; bottom: 14px; color: var(--muted); font-size: 11.5px;
    z-index: 2; background: var(--panel-bg); padding: 4px 9px; border-radius: 999px;
    border: 1px solid var(--border); box-shadow: var(--shadow-sm);
  }

  .node circle {
    stroke: var(--bg); stroke-width: 3px; cursor: pointer;
    filter: drop-shadow(0 1px 3px rgba(11,11,11,0.22));
    transition: filter .15s ease, transform .15s ease;
  }
  .node .status-front { fill: var(--status-front); }
  .node .status-dominated { fill: var(--status-dominated); }
  .node .status-red_flagged { fill: var(--status-critical); }
  .node text { fill: #fff; font-size: 11px; font-weight: 600; text-anchor: middle; pointer-events: none; }
  .node .sublabel-bg { fill: var(--bg); opacity: 0.82; pointer-events: none; }
  .node .sublabel { fill: var(--muted); font-size: 10.5px; font-weight: 500; text-anchor: middle; pointer-events: none; }
  .node:hover circle {
    filter: drop-shadow(0 3px 8px rgba(11,11,11,0.32)) brightness(1.1);
    transform: scale(1.08); transform-origin: center; transform-box: fill-box;
  }

  .edge-hit { stroke: transparent; stroke-width: 16px; fill: none; cursor: pointer; }
  .edge-line {
    stroke-width: 2px; fill: none; pointer-events: none;
    transition: stroke-width .15s ease, opacity .15s ease, stroke .15s ease;
  }
  .edge.dominance .edge-line { stroke: var(--edge-dominance); }
  .edge.tradeoff .edge-line { stroke: var(--edge-tradeoff); stroke-dasharray: 5 4; }
  .edge:hover .edge-line { stroke: var(--accent); stroke-width: 3px; }
  .edge.selected .edge-line { stroke: var(--accent); stroke-width: 3.2px; }
  .edge.incident .edge-line { stroke-width: 3px; }
  .edge.dimmed .edge-line { opacity: 0.22; }
  #arrow path { fill: var(--edge-dominance); }
  #arrow-accent path { fill: var(--accent); }

  .panel {
    width: 420px; flex: 0 0 auto; border-left: 1px solid var(--border);
    padding: 20px 22px; overflow-y: auto; background: var(--panel-bg);
    box-shadow: -6px 0 16px -12px rgba(11,11,11,0.25);
  }
  .panel h2 { font-size: 15px; margin: 0 0 4px; letter-spacing: -0.01em; }
  .panel .rel { color: var(--muted); margin-bottom: 14px; }
  .empty-hint { color: var(--muted); }

  .axis-block {
    border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px;
    margin-bottom: 10px; background: var(--bg); box-shadow: var(--shadow-sm);
    transition: box-shadow .15s ease;
  }
  .axis-block:hover { box-shadow: var(--shadow-md); }
  .axis-block .axis-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .axis-name { font-weight: 600; text-transform: capitalize; }
  .axis-tag {
    font-size: 11px; padding: 1px 7px; border-radius: 999px; border: 1px solid var(--border);
  }
  .axis-tag.A_better, .axis-tag.B_better { color: var(--status-front); border-color: var(--status-front); }
  .axis-tag.tie { color: var(--muted); }
  .axis-tag.incomparable, .axis-tag.insufficient_evidence { color: var(--status-critical); border-color: var(--status-critical); }
  .confidence { font-size: 11px; color: var(--muted); }
  .rationale { margin: 6px 0; }
  .ev-list { margin: 4px 0 0; padding-left: 18px; color: var(--muted); font-size: 12.5px; }
  .summary-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .chip {
    font-size: 11.5px; padding: 2px 9px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--bg);
  }
</style>
</head>
<body>
<header>
  <h1>Pareto domination graph</h1>
  <div class="legend">
    <span class="legend-group"><span class="legend-item"><span class="dot" style="background:var(--status-front)"></span>Pareto front</span><span class="legend-item"><span class="dot" style="background:var(--status-dominated)"></span>Dominated</span><span class="legend-item"><span class="dot" style="background:var(--status-critical)"></span>Red-flagged (removed pre-Pareto)</span></span>
    <span class="legend-sep"></span>
    <span class="legend-group"><span class="legend-item"><span class="edge-swatch dominance" style="border-color:var(--edge-dominance)"></span>Domination</span><span class="legend-item"><span class="edge-swatch tradeoff" style="border-color:var(--edge-tradeoff)"></span>Tradeoff / unresolved</span></span>
  </div>
  <div class="meta" id="meta"></div>
</header>
<div class="layout">
  <div class="graph-wrap">
    <svg id="graph">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z"></path>
        </marker>
        <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z"></path>
        </marker>
      </defs>
      <g id="edges"></g>
      <g id="nodes"></g>
    </svg>
    <div class="zoom-hint">Scroll to zoom &middot; drag to pan</div>
    <div class="zoom-controls">
      <button id="zoom-in" title="Zoom in">+</button>
      <button id="zoom-out" title="Zoom out">&minus;</button>
      <button id="zoom-fit" title="Fit to view">&#9633;</button>
    </div>
  </div>
  <div class="panel" id="panel">
    <p class="empty-hint">Click an edge to see the comparison that produced it. Click a node to see the hypothesis.</p>
  </div>
</div>

<script type="application/json" id="data">{"nodes": [{"hypothesis_id": "H1", "status": "front"}, {"hypothesis_id": "H2", "status": "front"}, {"hypothesis_id": "H3", "status": "front"}, {"hypothesis_id": "H4", "status": "dominated"}, {"hypothesis_id": "H5", "status": "dominated"}, {"hypothesis_id": "H6", "status": "dominated"}, {"hypothesis_id": "H7", "status": "dominated"}, {"hypothesis_id": "H8", "status": "dominated"}, {"hypothesis_id": "H9", "status": "dominated"}, {"hypothesis_id": "H10", "status": "dominated"}, {"hypothesis_id": "H11", "status": "front"}, {"hypothesis_id": "H12", "status": "front"}, {"hypothesis_id": "H13", "status": "red_flagged", "red_flag_detail": {"decision": "remove", "rationale": "H13 proposes systemic small-molecule inhibition of GRIN2A (a neuronal NMDA receptor subunit) to treat cutaneous melanoma. This hypothesis fails at multiple critical gates: (1) No plausible biological mechanism connects GRIN2A dysfunction to melanoma pathogenesis; (2) GRIN2A is neuronal-restricted, not expressed in melanoma cells at meaningful levels\u2014the report's own acknowledgement of 'weak melanoma tractability' and reliance on a synthetic, unmeasured prior (right_tissue) disqualifies tissue appropriateness; (3) GRIN2A is loss-of-function constrained with 20 knockout phenotypes and 17 safety liabilities spanning convulsions and cognitive impairment, creating an unacceptable on-target toxicity window with no concrete de-risking strategy; (4) Evidence is almost entirely synthetic (designed priors, aggregated association scores) with no measured single-cell specificity, no melanoma cell data, no patient clinical footprint, and no causal mechanistic narrative. The hypothesis is too incoherent and under-evidenced for prioritisation analysis. It should be rejected before resource allocation.", "red_flags": [{"severity": "critical", "category": "biology", "reason": "GRIN2A is a neuronal glutamate receptor with no established biological rationale for melanoma causation. The target is part of the NMDA receptor complex critical for synaptic transmission and neuronal function. No mechanistic link between NMDA receptor dysfunction and cutaneous melanoma pathogenesis is articulated\u2014only that GRIN2A has a statistical association score (0.545) in Open Targets. This is insufficient causal grounding for a systemic ion-channel target in a non-neuronal cancer."}, {"severity": "critical", "category": "tissue", "reason": "The report explicitly acknowledges that GRIN2A is 'neuronal-restricted' with 'weak melanoma tractability.' The right_tissue axis assigns a synthetic prior (0.78 confidence 0.4) labelled as 'UNMEASURED' and 'designed prior' \u2014 not measured data. Single-cell profiling of melanoma tumours and stroma is needed to establish whether GRIN2A is expressed in malignant melanoma cells at therapeutically targetable levels. Proposing systemic small-molecule inhibition of a neuronal-restricted receptor to treat a cutaneous non-neuronal cancer is a profound tissue mismatch without measured validation."}, {"severity": "critical", "category": "safety", "reason": "GRIN2A is under strong loss-of-function constraint (LOEUF o/e = 0.18), indicating intolerance to disruption. The report documents 17 curated safety liabilities (convulsions, dizziness, pain) and 20 distinct mouse-knockout phenotypes (abnormal spatial working memory, altered nociception, increased startle). Systemic NMDA receptor antagonism is known to cause psychotomimetic effects, neurotoxicity, and cognitive impairment. The report acknowledges 'narrow therapeutic window' and need for tumour-selective delivery, but proposes no concrete mechanism to achieve this for a small molecule targeting a ubiquitous ion channel. This is an unacceptable on-target safety liability without a de-risked delivery solution."}, {"severity": "major", "category": "evidence_quality", "reason": "The core evidence is synthetic or aggregated statistical association rather than measured mechanistic or clinical evidence. The Open Targets association (0.545) is described as 'multi-modal' but appears to be a literature + genetic + somatic aggregate without disclosure of the specific melanoma-GRIN2A links. The right_tissue axis is explicitly a 'designed prior' with no measured single-cell data. No melanoma cell line data, patient mutation data, or in vivo efficacy model is cited. This falls below the evidentiary threshold for Pareto-front analysis."}, {"severity": "major", "category": "patient", "reason": "No melanoma clinical precedent for GRIN2A inhibition exists. The report admits the patient population and biomarker would 'have to be established de novo' with 'first-in-class stratification risk' and low confidence (0.35). There is no path to patient enrichment or response prediction without foundational de novo work."}, {"severity": "major", "category": "biology", "reason": "The listed pathways (MECP2 regulates neuronal receptors, NMDA unblocking, synaptic adhesion) are neuronal/developmental biology pathways with no transparent link to melanoma oncogenesis, mutation, immune checkpoint, metabolic rewiring, or known melanoma driver pathways (BRAF, NRAS, CDKN2A, etc.). The hypothesis lacks causal narrative."}]}}, {"hypothesis_id": "H14", "status": "dominated"}, {"hypothesis_id": "H15", "status": "dominated"}], "edges": [{"hypothesis_a": "H2", "hypothesis_b": "H1", "relation": "tradeoff_or_unresolved", "dominator": null, "dominated": null, "comparison_summary": {"overall_relation": "tradeoff_or_unresolved", "strictly_better_axes_for_A": ["right_safety"], "strictly_better_axes_for_B": ["right_target"], "tied_axes": ["right_tissue", "right_patient", "right_commercial", "tractability"], "unresolved_axes": [], "reason": "both_sides_have_advantages"}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses show strong, multi-modal causal support for melanoma via Open Targets disea t (single-cell profiling) as highest-VoI action to resolve this axis", "Hypothesis B: claims 'definitional driver context' (mutant-BRAF melanoma), lending narrative weight but no measured tissue specificity", "Hypothesis A: claims specificity 'inherited from pathway context' (downstream of BRAF), equally synthetic"], "missing_evidence": ["Single-cell RNA-seq or spatial transcriptomics quantifying MAP2K1 and BRAF expression in malignant vs. normal tissue in primary/metastatic melanoma", "Malignant-cell fraction or tau (tissue specificity index) for either target in melanoma", "Stromal vs. tumour-cell expression ratios in patient-derived melanoma tissue", "Disease-state-specific evidence: differential expression in BRAF-mutant vs. BRAF-wild-type or NRAS-mutant melanomas", "Single-cell RNA-seq in matched normal skin and melanoma samples"]}, "right_safety": {"axis": "right_safety", "relation": "A_better", "confidence": "high", "rationale": "Hypothesis A (MAP2K1) demonstrates a materially better safety margin than Hypothesis B (BRAF) on multiple direct, experimentally grounded measures. A reports 0 curated safety liabilities and 24 distinct mouse-knockout phenotypes, with a safety value of 0.9. B reports 1 curated safety liability (heart disease) and 77 distinct mouse-knockout phenotypes, with a safety value of 0.512. The 3-fold difference in knockout phenotype burden is a quantitative proxy for essentiality and developmental role breadth. B's explicit curated cardiac liability is a specific on-target toxicity signal absent in A. Both targets sit on constrained genes (LOEUF o/e: MAP2K1=0.32, BRAF=0.15), but BRAF's lower LOEUF (more constrained) combined with its broader knockout footprint suggests greater systemic essentiality and narrower therapeutic window. B's own interpretation acknowledges this: 'the breadth of knockout phenotypes (77) and the curated liability signal point to a broad developmental/essential role, so systemic inhibition risks on-target toxicity.' A's modest phenotype count and absence of curated liabilities suggest a more favorable toxicity profile, even accounting for the possibility that MAP2K1's essentiality is masked by redundancy or that BRAF's phenotypes reflect pleiotropic rather than direct on-target effects. The cardiac liability in B is a concrete differentiator not present in A.", "decisive_evidence": ["B reports 1 curated safety liability (heart disease); A reports 0 curated liabilities", "B has 77 mouse-knockout phenotypes vs. A's 24 \u2014 a 3.2-fold gap in essentiality footprint", "BRAF LOEUF o/e = 0.15 (more constrained) vs. MAP2K1 LOEUF o/e = 0.32 (less constrained), suggesting greater systemic role for BRAF", "B's interpretation explicitly flags 'narrow therapeutic window' and 'broad developmental/essential role'; A does not"], "missing_evidence": ["Human clinical safety data (adverse event rates, dose-limiting toxicities) from approved BRAF and MAP2K1 inhibitors \u2014 would directly calibrate the mouse-derived phenotype burden", "Tissue-specific expression and essentiality profiles in normal adult vs. developmental tissues \u2014 would clarify which phenotypes are developmentally driven vs. systemically relevant at therapeutic doses", "Selectivity profiling and off-target kinase liability for candidate small molecules \u2014 would address modality-specific toxicity risk independent of target choice", "Patient pharmacokinetics and exposure margins in Phase 3 trials \u2014 would contextualize whether the broader knockout footprint in BRAF translates to clinically observed toxicity"]}, "right_patient": {"axis": "right_patient", "relation": "tie", "confidence": "high", "rationale": "Both Hypothesis A (MAP2K1) and Hypothesis B (BRAF) demonstrate materially equivalent patient-axis strength. Each has: (1) a defined, real patient population proven by Phase 3 clinical precedent in cutaneous melanoma; (2) established clinical endpoints and stratification already de-risked by ongoing trials; (3) high t and landscape analysis for each target (both synthetic)", "Evidence of biomarker-driven patient stratification that would differentiate commercial niche", "Indication expansion or combination therapy opportunities unique to either target", "Modality or formulation differentiation claims beyond the target itself", "Market size, reimbursement pathway, or commercial partner landscape data", "Patient preference or clinical unmet-need data that would favor one target over the other in practice"]}, "tractability": {"axis": "tractability", "relation": "tie", "confidence": "high", "rationale": "Both Hypothesis A (MAP2K2) and Hypothesis B (MAP2K1) satisfy identical tractability criteria for small-molecule modality. Each target has: (1) an approved small-molecule drug precedent, (2) solved crystal structures with ligands, (3) high-quality ligands in literature, (4) druggable pockets, and (5) membership in a druggable kinase family. Both report tractability scores of 0.9 with confidence 0.9, derived from the same Open Targets SM-modality buckets. The existence of PHASE_3 clinical programmes for both targets further validates that chemical matter, assayability, and developability are proven. Neither target presents a modality-fit problem or a delivery barrier that would differentiate them on feasibility grounds.", "decisive_evidence": ["Both targets satisfy all Open Targets SM-modality tractability buckets: Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, Druggable Family", "Both have approved small-molecule drugs in clinical use, providing direct precedent for feasibility", "Both have PHASE_3 clinical candidates, demonstrating that chemistry and development are de-risked", "Both are kinase targets within a well-validated druggable family with extensive medicinal chemistry precedent"], "missing_evidence": ["Comparative ligand binding kinetics (kon/koff, residence time) between MAP2K1 and MAP2K2 selective chemotypes", "Relative permeability, solubility, or metabolic stability profiles of lead compounds for each target", "Off-target kinase selectivity profiles and potential for isoform cross-reactivity (though both are in the same MAPK2K subfamily)", "Manufacturing complexity or synthetic accessibility differences between clinical candidates"]}}}, {"hypothesis_a": "H4", "hypothesis_b": "H1", "relation": "B_dominates_A", "dominator": "H1", "dominated": "H4", "comparison_summary": {"overall_relation": "B_dominates_A", "strictly_better_axes": ["right_target", "right_tissue", "right_safety", "right_patient", "right_commercial", "tractability"], "tied_axes": [], "worse_axes": [], "unresolved_axes": []}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "Both hypotheses show strong multi-modal causal support for their respective targets in melanoma, but BRAF (Hypothesis B) has a materially stronger evidence foundation on the right_target axis. BRAF's Open Targets association score (0.701) is higher than ATM's (0.617), reflecting aggregated genetic, somatic, literature, and known-drug evidence. More critically, BRAF carries a LOEUF (o/e) of 0.15\u2014in the constrained tail\u2014indicating strong loss-of-function intolerance, which raises both mechanistic causality and disease relevance. ATM's LOEUF of 0.77 is in the tolerant range, which weakly argues *against* essential-gene involvement in the disease. Additionally, BRAF is the *definitional driver* of mutant-BRAF melanoma (somatic gain-of-function is the canonical melanoma genotype in ~50% of cases), whereas ATM operates as a general DNA damage sensor without melanoma-specific somatic hotspots. Both targets sit on relevant pathways, but BRAF's pathway involvement (Gain-of-function MRAS complexes activate RAF signaling, MAPK pathway) is more direct to oncogenic transformation. The presence of an approved small-molecule drug against BRAF further validates target tractability and real-world causal relevance, though this is secondary to the core genetic and mechanistic evidence.", "decisive_evidence": ["BRAF Open Targets association score 0.701 vs. ATM 0.617 (multi-modal evidence aggregation)", "BRAF LOEUF 0.15 (constrained, intolerant to LoF) vs. ATM LOEUF 0.77 (tolerant), supporting stronger disease causality for BRAF", "BRAF is the canonical somatic driver in ~50% of melanomas (mutant-BRAF); ATM has no melanoma-specific somatic hotspots", "BRAF sits on direct oncogenic pathway (MAPK/RAF signaling); ATM is a housekeeping DNA damage sensor", "BRAF has approved small-molecule drug precedent (tractability de-risked); ATM lacks clinical precedent"], "missing_evidence": ["Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets (unmeasured; flagged for tier-3 experiment)", "Quantitative somatic mutation frequency and enrichment analysis in melanoma cohorts (would further strengthen BRAF's driver status)", "ATM perturbation studies in melanoma cell lines or patient-derived models (would clarify non-sensor mechanistic roles, if any)"]}, "right_tissue": {"axis": "right_tissue", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses lack direct single-cell, spatial, or disease-tissue evidence on the right_tissue axis\u2014both values are synthetic priors with low confidence (0.4). However, Hypothesis B's prior is anchored to a stronger mechanistic and clinical context that indirectly supports tissue relevance. BRAF mutations are the *definitional driver* of cutaneous melanoma (50\u201370% of cases carry activating BRAF V600E), making the malignant-cell enrichment assumption more credible even without measured data. The prior that BRAF is 'moderately specific' to the disease context is justified by this oncogenic dependency. In contrast, Hypothesis A treats ATM as a 'broadly expressed / non-specific' housekeeping DNA-damage sensor, which is mechanistically accurate but provides no tissue or malignant-cell specificity signal. ATM's role is pan-cancer DNA repair, not melanoma-selective; its presence in normal tissues (cerebellar, immune, reproductive) is expected and unmitigated by disease context. The synthetic prior for A (0.28) and B (0.72) reflect this asymmetry: B's moderate specificity prior is more defensible than A's non-specific prior, even though neither is measured. Until both undergo tier-3 single-cell profiling, B's context-specific mechanistic grounding gives it a modest advantage on the right_tissue axis.", "decisive_evidence": ["BRAF V600E is the canonical driver mutation in ~50\u201370% of cutaneous melanomas, making the malignant-cell enrichment assumption mechanistically justified.", "ATM is a housekeeping DNA-damage sensor broadly expressed across tissues, with no melanoma-specific enrichment signal; normal tissues (cerebellar, immune, reproductive) are expected to express it at high levels.", "Hypothesis B's designed prior (moderately specific: 0.72) reflects BRAF's role as an oncogenic driver; Hypothesis A's prior (broadly expressed / non-specific: 0.28) reflects ATM's role as a pan-cancer guardian."], "missing_evidence": ["Single-cell RNA-seq or spatial transcriptomics in melanoma tumour vs. normal skin, stratified by malignant vs. stromal cells for both ATM and BRAF.", "Quantified tau (tissue specificity index) for ATM and BRAF in melanoma tissue specifically.", "Malignant-cell fraction (tumour vs. microenvironment) expression data for both targets.", "Disease-state specificity: whether ATM or BRAF expression or activity differs between melanoma and benign nevi or normal skin.", "Single-cell profiling of immune and endothelial stromal cells to assess off-target activity in the tumour microenvironment."]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses target genes with known safety liabilities and broad knockout phenotypes, indicating on-target toxicity risk in normal tissue. However, Hypothesis B (BRAF) shows a materially better safety profile on quantitative grounds: (1) BRAF has 1 curated safety liability vs. ATM's 10, a tenfold difference in documented hazard signals; (2) BRAF has 77 distinct mouse-knockout phenotypes vs. ATM's 132, suggesting a narrower developmental/essential footprint; (3) BRAF's knockout phenotypes (abnormal bone morphology, adipose changes, vascular changes) cluster around developmental tissues, whereas ATM's include immunological (decreased IgG), neurological (cerebellar), and fertility effects, indicating broader system involvement. The genetic constraint data (BRAF LOEUF=0.15 vs. ATM LOEUF=0.77) creates a secondary safety signal for ATM: although ATM's higher LOEUF superficially suggests better population tolerance, ATM's broad essentiality combined with its 10-fold higher curated liability burden suggests that the tolerant LOEUF may reflect incomplete annotation rather than true safety advantage. Both require tumour-selective delivery to manage therapeutic window, but BRAF enters with fewer known on-target hazards and a simpler safety footprint.", "decisive_evidence": ["BRAF: 1 curated safety liability vs. ATM: 10 curated safety liabilities (tenfold difference in documented signals)", "BRAF: 77 mouse-knockout phenotypes vs. ATM: 132 mouse-knockout phenotypes (narrower essential footprint)", "ATM phenotypes span immunology, neurology, and fertility (systemic), whereas BRAF phenotypes cluster in developmental/structural tissues", "Both carry on-target toxicity risk requiring selective delivery, but BRAF has fewer known hazard domains to manage"], "missing_evidence": ["Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets (both explicitly unmeasured; tier-3 experiments planned)", "Actual clinical safety data from BRAF Phase 3 programme to validate whether known phenotypes translate to clinical tolerability in melanoma patients", "Dose-response and selectivity window data for inhibitors of each target in normal tissue models", "Comparative on-target toxicity in skin, haematopoietic, and immunological compartments (particularly relevant given ATM's role in DNA damage and immune phenotypes)"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (BRAF) has direct clinical precedent\u2014a Phase 3 programme already exists in melanoma\u2014which means the patient population is defined, stratifiable, and endpoints are validated. This retires stratification and clinical-feasibility risk. Hypothesis A (ATM) carries first-in-class risk: no clinical footprint, no biomarker precedent, and no established patient population. Both hypotheses acknowledge that the specific biomarker stratum is synthetic; the difference is that B starts with a proven clinical context and B must build one from scratch. For the right_patient axis\u2014which prioritizes defined patient populations, clinical precedent, and plausible therapeutic benefit\u2014B's existing Phase 3 programme is materially stronger evidence than A's de novo stratification requirement.", "decisive_evidence": ["B reports Phase 3 clinical candidacy in melanoma (from Open Targets drugAndClinicalCandidates); A reports no clinical precedent.", "B's right_patient confidence is 0.7 and direction 'supports'; A's is 0.4 and direction 'neutral'.", "B's right_patient interpretation explicitly states 'stratification and endpoint risk is largely retired'; A states 'ATM carries first-in-class stratification risk'.", "Both acknowledge biomarker stratum is synthetic, but B anchors to an existing patient cohort; A must establish one de novo."], "missing_evidence": ["Neither hypothesis specifies the exact biomarker (e.g., BRAF V600E mutation prevalence, enrichment strategy for ATM-driven melanomas if they exist).", "Unmet-need magnitude and patient numbers for the respective strata are not quantified.", "Real-world clinical outcomes or response rates from B's Phase 3 programme are not cited; only stage is stated.", "A does not explore whether ATM-driven or ATM-dependent melanoma sub-populations have been characterized clinically or preclinically."]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses target the same crowded field (cutaneous melanoma, small-molecule kinase inhibitors) and both arrive at a synthesised commercial value of 0.3, indicating weak whitespace. However, B has a material advantage: BRAF already has an approved drug precedent and a Phase 3 clinical programme in melanoma. This de-risks the commercial narrative by anchoring to an existing market, established patient population, and validated dosing/safety profile. A (ATM) is first-in-class for melanoma with no clinical footprint, forcing the programme to establish both the patient stratum and the therapeutic window from scratch\u2014a higher commercial execution risk and longer path to differentiation. Neither hypothesis demonstrates genuine whitespace or differentiation (both note that differentiation must come from modality/payload/niche, not the target itself), but B's existing clinical precedent materially improves the commercial risk profile and market-entry clarity, even in a crowded space.", "decisive_evidence": ["B has Phase 3 clinical precedent for BRAF in melanoma (from Open Targets drugAndClinicalCandidates); A has none for ATM", "B's right_patient score (0.85, high confidence) reflects existing patient stratification de-risking; A's right_patient score (0.35, low confidence) reflects first-in-class stratification risk", "B has an approved drug precedent, reducing chemistry/modality execution risk; A requires de novo small-molecule development validation", "Both targets are described as crowded (high-association targets), but B's existing market presence provides clearer entry point"], "missing_evidence": ["Explicit competitor count and active programme landscape for ATM vs. BRAF in melanoma (both synthesised)", "Whether B's existing BRAF programme has actually saturated the market or whether whitespace exists for a novel modality/payload on top of BRAF", "Patent/exclusivity landscape and remaining commercial runway for each target", "Actual unmet medical need in BRAF-mutant melanoma that a new modality could address (vs. incremental improvement)"]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "Both hypotheses satisfy small-molecule modality tractability via druggable pockets and high-quality ligands. However, Hypothesis B (BRAF) has an approved drug precedent in melanoma, which directly de-risks modality feasibility and chemistry development. Hypothesis A (ATM) meets the structural and ligand criteria but lacks clinical validation of small-molecule modulation for this target and disease. The presence of an approved drug is the strongest tractability signal\u2014it demonstrates assayability, developable molecules, delivery feasibility, and modality-target fit in a real-world context. ATM's tractability is credible but unproven in clinical practice.", "decisive_evidence": ["BRAF tractability: 'Approved Drug' bucket satisfied (Open Targets SM-modality); ATM tractability: only 'Structure with Ligand, High-Quality Ligand, Druggable Family' buckets satisfied.", "BRAF has PHASE_3 clinical candidate in melanoma, confirming small-molecule modulation is feasible and dose/delivery is workable in patients.", "ATM lacks any clinical footprint for small-molecule modulation in melanoma; precedent is absent."], "missing_evidence": ["ATM: in vitro potency, selectivity, and pharmacokinetic data for lead compounds (if they exist) against ATM kinase domain.", "BRAF: whether the approved drug's chemistry scaffold is optimal for melanoma or whether new chemistry could offer advantages (though this does not diminish the precedent signal).", "Off-target liability profiles and ADME optimization maturity for novel ATM inhibitors vs. BRAF inhibitors."]}}}, {"hypothesis_a": "H5", "hypothesis_b": "H1", "relation": "B_dominates_A", "dominator": "H1", "dominated": "H5", "comparison_summary": {"overall_relation": "B_dominates_A", "strictly_better_axes": ["right_target", "right_tissue", "right_safety", "right_patient", "right_commercial", "tractability"], "tied_axes": [], "worse_axes": [], "unresolved_axes": []}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "Both hypotheses show strong multi-modal causal support for their respective targets in cutaneous melanoma, but BRAF (B) has materially stronger evidence on the right_target axis. The comparison is grounded in three direct, curated data points: (1) Open Targets disease association score: BRAF 0.701 vs AKT1 0.566 \u2014 a 24% difference reflecting aggregated genetic, somatic, literature, and known-drug evidence; (2) Somatic genetics specificity: BRAF is a canonical gain-of-function driver in melanoma (~50% of cases carry BRAF V600E mutations), whereas AKT1 lacks comparable somatic prevalence or driver status; (3) Genetic constraint (LOEUF): BRAF o/e=0.15 vs AKT1 o/e=0.33 \u2014 BRAF is more constrained, indicating stronger selective pressure and narrower functional redundancy, which supports mechanistic essentiality in the disease context. The pathway evidence for BRAF (MAPK/ERK cascade, MRAS activation, negative feedback regulation) is tightly mechanistically linked to the mutant-BRAF driver oncogene. AKT1 sits on broader metabolic/survival pathways with less disease-specific mechanistic grounding. Neither score is literature-only noise, but BRAF's association is anchored in somatic driver mutations and clinical drug validation, whereas AKT1's association relies more on pathway membership and broad cell-survival biology.", "decisive_evidence": ["Open Targets melanoma association score: BRAF 0.701 vs AKT1 0.566 (24% difference, high confidence)", "Somatic genetics: BRAF V600E is a canonical melanoma driver (>50% prevalence); AKT1 lacks comparable driver mutation frequency or specificity", "Genetic constraint (LOEUF): BRAF o/e=0.15 vs AKT1 o/e=0.33 \u2014 BRAF shows stronger selective pressure and mechanistic essentiality", "Pathway mechanistic grounding: BRAF sits on mutant-BRAF-activating pathways (MAPK/ERK, MRAS complexes); AKT1 sits on pan-survival pathways (PI3K/AKT, estrogen signaling, FLT3) with weaker disease specificity", "Clinical precedent: BRAF has Phase 3 approved/clinical validation; AKT1 has no melanoma clinical footprint"], "missing_evidence": ["Single-cell tau (tissue specificity) for both targets \u2014 both explicitly flag this as unmeasured; BRAF has a moderately-specific prior (mutant-BRAF driver context), AKT1 has a broad prior", "Malignant-vs-stromal fraction for both targets \u2014 unmeasured but necessary to assess cell-type selectivity within melanoma tissue", "Direct comparison of AKT1 somatic mutation frequency and functional role in melanoma populations (e.g., TCGA, SKCM cohort analysis)"]}, "right_tissue": {"axis": "right_tissue", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses lack direct single-cell or spatial tissue-specificity data (tau, malignant-vs-stromal fraction), and both flag this as an unmeasured axis requiring tier-3 experiments. However, they differ materially in the strength of their *disease-context-specific* prior. Hypothesis B grounds its tissue assessment in a well-established biological context: BRAF V600E mutation is the canonical driver oncogene in ~50% of cutaneous melanomas, making mutant-BRAF inherently enriched in malignant melanoma cells. This disease-context specificity justifies B's moderate prior (0.72) on the right_tissue axis. Hypothesis A, by contrast, describes AKT1 as 'broadly expressed / non-specific' with a correspondingly weak prior (0.25). While AKT1 is mechanistically relevant to melanoma (via PI3K/AKT pathway), it lacks the tumour-driver enrichment that BRAF enjoys. B's moderate specificity prior is therefore more defensible from disease biology, even though neither hypothesis has measured the actual single-cell tissue distribution. B is not decisively better because both priors remain synthetic and unvalidated by experiment; however, B's prior is anchored in established melanoma oncogenetics, whereas A's prior is a generic 'broadly expressed' assumption.", "decisive_evidence": ["BRAF V600E is the definitional melanoma driver mutation (~50% of cutaneous melanomas), creating inherent malignant-cell enrichment and disease-context specificity.", "Hypothesis B explicitly states 'mutant-BRAF melanoma is the definitional driver context,' grounding the tissue assessment in established oncology.", "Hypothesis A describes AKT1 as 'broadly expressed / non-specific' with no tumour-driver enrichment claim, relying on pathway membership rather than driver status.", "Both hypotheses lack measured single-cell tau or malignant-vs-stromal fraction data, but B's prior is disease-biologically justified while A's is a generic synthetic assumption."], "missing_evidence": ["Single-cell RNA-seq tau (tissue specificity index) for AKT1 and BRAF in cutaneous melanoma tissue.", "Malignant vs. stromal cell-type fraction for AKT1 and BRAF expression in primary melanomas and cell lines.", "Spatial transcriptomics or immunohistochemistry validating AKT1 and BRAF protein localization in melanoma vs. normal skin.", "Comparison of AKT1 expression levels in BRAF V600E-mutant vs. BRAF-wildtype melanomas to assess mutual pathway specificity.", "Patient-derived xenograft (PDX) or tumour organoid data showing relative AKT1 and BRAF dependence in melanoma-specific contexts."]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses face significant safety headwinds due to broad developmental/essential roles and curated safety liabilities. However, Hypothesis B (BRAF) shows a marginally better safety profile on measured criteria: (1) BRAF carries 1 curated safety liability vs. AKT1's 4, a 4-fold difference in documented toxicity signals; (2) BRAF has 77 mouse-knockout phenotypes vs. AKT1's 60, but the marginal additional phenotypes are tissue-specific (bone, adipose, vascular) rather than systemic; (3) AKT1 explicitly lists apoptotic cell death in cancer cells as a liability\u2014a direct on-target mechanism that narrows therapeutic window\u2014whereas BRAF's liabilities are more tissue-restricted; (4) AKT1's genetic constraint (LOEUF o/e=0.33) is less severe than BRAF's (0.15), suggesting BRAF may tolerate partial inhibition better. Both require tumour-selective delivery or dosing to manage therapeutic window, but BRAF enters with fewer documented toxicity flags and a narrower range of developmental consequences. The clinical precedent (PHASE_3 BRAF drug) also provides real-world tolerability data that de-risks the safety axis further, though this is ancillary to the direct safety comparison.", "decisive_evidence": ["BRAF: 1 curated safety liability vs. AKT1: 4 curated safety liabilities (4\u00d7 difference in toxicity signals)", "AKT1 lists 'apoptotic cell death in cancer cells' as a liability\u2014direct on-target mechanism narrowing window; BRAF liabilities are tissue-restricted", "BRAF LOEUF o/e=0.15 vs. AKT1 LOEUF o/e=0.33 (BRAF less constrained, may tolerate partial inhibition)", "BRAF has clinical precedent (PHASE_3 drug) providing real-world tolerability reassurance; AKT1 is first-in-class for melanoma"], "missing_evidence": ["Single-cell tau specificity and malignant-vs-stromal fraction for both targets (both flagged as unmeasured; AKT1's broad expression would worsen safety, BRAF's moderate specificity would neutral ise it)", "Quantitative pharmacodynamic and dose\u2013response data in melanoma models for AKT1 vs. BRAF", "Comparative on-target toxicity in normal skin, immune, or metabolic tissues from in vivo models", "Cardiac safety data depth for BRAF (heart disease listed for both; BRAF precedent may have unpublished cardiotoxicity monitoring)"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (BRAF) demonstrates substantially stronger patient-axis credentials than Hypothesis A (AKT1) on multiple direct, evidence-based dimensions. B has achieved Phase 3 clinical status in melanoma, establishing a defined, treatable patient population with clinically validated stratification and endpoints. A has zero clinical precedent and must establish patient population and biomarker enrichment de novo, carrying first-in-class stratification risk. While both hypotheses carry unmeasured tissue-specificity data, B's synthetic prior is 'moderately specific' (0.72) reflecting the known BRAF-mutant driver context in melanoma, whereas A's prior is 'broadly expressed / non-specific' (0.25), a material disadvantage for patient selectivity. The unmet-need signal is also stronger for B: existing clinical activity suggests a real but incompletely addressed patient population, whereas A lacks even preliminary clinical traction to ground patient selection.", "decisive_evidence": ["B has PHASE_3 clinical precedent for BRAF in melanoma (from Open Targets drugAndClinicalCandidates); A has no clinical footprint.", "B's tissue-specificity prior (0.72, moderately specific) reflects known BRAF-mutant driver biology in melanoma; A's prior (0.25, broadly expressed) suggests poor selectivity without mechanistic enrichment.", "B explicitly notes that 'stratification and endpoint risk is largely retired' because a treatable population is already defined; A must establish both de novo.", "B carries 1 curated safety liability vs. A's 4, reducing on-target toxicity risk and improving therapeutic window feasibility for patient populations."], "missing_evidence": ["Biomarker specificity for both hypotheses remains synthetic; neither has measured single-cell tau + malignant-fraction profiling.", "Explicit clinical response rates or endpoint definitions for BRAF Phase 3 programme are not provided.", "Frequency and severity of BRAF-mutant enrichment in the broader melanoma population (what fraction are BRAF-mutant vs. wildtype).", "Comparative unmet-need quantification: exact size and clinical severity gaps for AKT1-driven vs. BRAF-driven melanoma subsets."]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses target well-established melanoma targets in a crowded field, so neither enjoys strong whitespace. However, B (BRAF) has measurable commercial advantages over A (AKT1): (1) BRAF has clinical precedent\u2014a Phase 3 programme already exists, meaning the patient population, biomarker, and indication are pre-validated. This de-risks stratification and endpoint definition for a follow-on programme, improving time-to-market and investor confidence. (2) BRAF has an approved small-molecule drug, proving the modality and chemistry are feasible; A has only tractability-bucket support. (3) Both face competitive crowding, but BRAF's existing clinical footprint creates an opportunity to differentiate via a novel modality, payload, or patient sub-segment (e.g., resistant or relapsed populations) rather than starting de novo. A must establish the target's clinical utility from scratch, which carries higher development risk and longer pathway to differentiation. The commercial value of B's clinical precedent and de-risked modality outweighs the similar crowding burden both face.", "decisive_evidence": ["B has Phase 3 clinical precedent in melanoma (right_patient = 0.85, confidence 0.7); A has none (right_patient = 0.35, confidence 0.4).", "B has an approved small-molecule drug, proving modality feasibility; A has only tractability-bucket support (right_tractability: B = 0.9 'Approved Drug', A = 0.6 'Advanced Clinical').", "B's clinical precedent pre-validates the patient population and biomarker, reducing stratification and endpoint risk for a follow-on programme; A must validate both de novo.", "Both targets score similarly weak on right_commercial (A = 0.323, B = 0.3) due to competitive crowding, but B's proven clinical pathway provides a clearer route to commercial differentiation than A's untested biology."], "missing_evidence": ["Explicit competitor count and market share data for AKT1 vs BRAF small-molecule programmes in melanoma.", "Pricing power or market size data for BRAF-resistant or relapsed melanoma populations vs. untreated AKT1-driven populations.", "Regulatory pathway clarity: whether BRAF follow-on programmes face accelerated approval pathways (e.g., breakthrough designation) vs. AKT1 de novo programmes.", "Patent landscape and freedom-to-operate status for novel BRAF payloads vs. AKT1 chemical scaffolds."]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "Both hypotheses satisfy small-molecule tractability fundamentals (druggable pocket, structure with ligand, high-quality ligand, druggable family). However, Hypothesis B (BRAF) includes Approved Drug precedent, while Hypothesis A (AKT1) reaches only Advanced Clinical. Approved drug status directly de-risks chemistry, developability, delivery, and modality-target fit; it provides direct, real-world validation of ligand quality, manufacturing feasibility, and clinical pharmacology. AKT1's Advanced Clinical status is strong but subordinate to approved precedent. Both face similar broad-tissue expression liabilities and safety headwinds, but BRAF's approved-drug footprint materially reduces tractability risk in the modality dimension.", "decisive_evidence": ["BRAF tractability includes 'Approved Drug' bucket (Open Targets); AKT1 includes only 'Advanced Clinical'.", "BRAF has Phase 3 clinical precedent in melanoma with defined patient population; AKT1 has no melanoma clinical footprint.", "Approved drug status provides direct evidence of: ligand developability, structural pocket validation, synthesis scale-up, formulation feasibility, and on-target pharmacology in human tissue."], "missing_evidence": ["Relative binding affinity, selectivity profiles, or kinetic parameters for AKT1 vs BRAF small-molecule series (would not materially change the relation given approved-drug precedent for BRAF).", "Specific chemical series or clinical candidate identity for either hypothesis (both are treated generically).", "Comparative PK/PD properties or oral bioavailability data (would refine confidence within the relation but not reverse it)."]}}}, {"hypothesis_a": "H6", "hypothesis_b": "H1", "relation": "B_dominates_A", "dominator": "H1", "dominated": "H6", "comparison_summary": {"overall_relation": "B_dominates_A", "strictly_better_axes": ["right_target", "right_tissue", "right_safety", "right_patient", "right_commercial"], "tied_axes": ["tractability"], "worse_axes": [], "unresolved_axes": []}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "On the right_target axis alone, Hypothesis B (BRAF) demonstrates stronger causal and mechanistic support for melanoma than Hypothesis A (ERBB2). The decisive differences are: (1) BRAF's Open Targets disease association score is 0.701 vs ERBB2's 0.562\u2014a material 25% gap rooted in somatic, genetic, and drug evidence; (2) BRAF carries a LOEUF constraint signal (o/e=0.15, constrained tail), which strengthens the mechanistic causality prior by indicating the gene is intolerant to loss-of-function and thus likely essential to disease pathways; (3) BRAF is the definitional driver mutation in melanoma (V600E activating mutations are present in ~50% of cutaneous melanomas), making it a somatic-genetic gold standard; (4) ERBB2's LOEUF (o/e=0.42, tolerant range) actually weakens causal support by suggesting loss-of-function is well-tolerated, undermining the mechanistic necessity argument. Both targets sit on credible pathways and have approved precedents, but BRAF's combination of higher aggregated association score, somatic mutation prevalence, and genetic constraint signal provides stronger direct evidence of target-disease causality. The axis comparison is on causality and mechanistic evidence, not on clinical readiness, safety, or commercial factors\u2014on which other axes would adjudicate.", "decisive_evidence": ["BRAF Open Targets association score 0.701 vs ERBB2 0.562 (25% advantage, multi-modal evidence)", "BRAF LOEUF o/e=0.15 (constrained, supports mechanistic causality) vs ERBB2 o/e=0.42 (tolerant, weakens necessity)", "BRAF V600E activating somatic mutations are driver events in ~50% of cutaneous melanomas (definitional causality)", "Both targets on credible MAPK/PI3K pathway evidence, but BRAF's pathway activation is more directly linked to melanoma driver mutations"], "missing_evidence": ["ERBB2 somatic mutation frequency and driver status in melanoma (is it a passenger or secondary co-driver?)", "Quantitative comparison of BRAF vs ERBB2 in melanoma cell line dependency screens or CRISPR essentiality studies", "Detailed perturbation evidence (gain/loss-of-function) specific to melanoma malignant cells for both targets"]}, "right_tissue": {"axis": "right_tissue", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses have unmeasured single-cell tissue specificity and malignant-vs-stromal fractions, placing them on equal footing in terms of direct evidence gaps. However, Hypothesis B (BRAF) has a materially stronger disease-context anchor: mutant-BRAF is the definitional driver oncogene in melanoma, with well-established genotype-phenotype association. This genetic linkage provides implicit evidence that BRAF activity is enriched in malignant cells bearing the activating mutation, even without single-cell data. Hypothesis A (ERBB2) relies on a 'sharply tumour-restricted' assumption that lacks this mutation-driven disease context specificity. While ERBB2 may be a valid melanoma target, the tissue relevance is stated as a designed prior without the same mechanistic grounding. Both carry equivalent synthetic assumptions, but B's connection to a driver mutation provides stronger implicit tissue localization logic.", "decisive_evidence": ["BRAF mutant-V600E is the canonical driver mutation in ~50% of cutaneous melanoma, creating a direct genotype-phenotype enrichment signal for malignant cells", "Hypothesis B explicitly frames 'mutant-BRAF melanoma is the definitional driver context,' embedding tissue/cell-type specificity into the disease model itself", "Hypothesis A's prior is described as 'sharply tumour-restricted' but without mutation-driven enrichment logic\u2014a more generic assumption"], "missing_evidence": ["Single-cell RNA-seq or spatial transcriptomics tau (tissue specificity metric) for ERBB2 in melanoma tissue vs. normal skin and other tissues", "Single-cell RNA-seq or spatial transcriptomics tau for BRAF in melanoma tissue vs. normal skin and other tissues", "Malignant-vs-stromal cell fraction expression for both targets in primary melanoma and metastases", "Direct comparison of ERBB2 expression in BRAF-mutant vs. BRAF-wildtype melanomas (context-specific activity)", "Validation that ERBB2 expression/activation is enriched in the same cell population as BRAF mutations, or orthogonal evidence of independent malignant enrichment"]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses face significant on-target safety liabilities due to essential developmental roles, but Hypothesis B (BRAF small-molecule) presents a measurably better safety profile than Hypothesis A (ERBB2 ADC) on three grounds: (1) BRAF has 1 curated safety liability vs. ERBB2's 3, including the specific cardiotoxicity signal that is particularly concerning for an ADC payload; (2) BRAF knockout phenotypes (77 total) are broader in count but appear more tissue-specific (adipose, bone, vascular morphology) and lack the embryonic lethality and neurological essentiality (phrenic nerve, Schwann cell precursor) seen in ERBB2 knockouts; (3) BRAF's LOEUF constraint (0.15) is tighter than ERBB2's (0.42), which paradoxically improves safety for a small-molecule inhibitor because BRAF's constraint likely reflects gain-of-function (oncogenic mutations) rather than loss-of-function lethality, whereas ERBB2's constraint reflects true developmental essentiality. For an ADC, ERBB2's narrow therapeutic window (requiring sharp tumor restriction to offset on-target toxicity) is compounded by pre-existing cardiotoxicity and neurological fragility. BRAF as a small-molecule has more clinical precedent (PHASE_3 program) to validate dosing and tolerability windows in real patients, whereas ERBB2 in melanoma carries de novo stratification risk.", "decisive_evidence": ["ERBB2 has 3 curated liabilities (heart disease, cardiotoxicity, trastuzumab sensitivity) vs. BRAF's 1 (heart disease only); cardiotoxicity is a critical liability for ADCs, which carry toxic payloads and exacerbate cardiac stress", "ERBB2 knockout phenotypes include embryonic lethality with complete penetrance and neurological essentiality (phrenic nerve, Schwann cell precursor deficiency), suggesting critical developmental role and narrow therapeutic window", "BRAF LOEUF (0.15) indicates constraint, but in the context of a kinase oncogene this reflects gain-of-function causality rather than loss-of-function essentiality, reducing on-target toxicity risk for an inhibitor", "ERBB2 LOEUF (0.42) in the tolerant range is misleading here because ERBB2's safety liabilities are curated and explicitly flagged, overriding the population-level LoF tolerance", "BRAF has real clinical precedent (PHASE_3 program) demonstrating a validated safety and dosing window in melanoma patients; ERBB2 in melanoma has no clinical footprint, requiring de novo safety learning"], "missing_evidence": ["Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets\u2014both hypotheses correctly identify this as the highest-VoI unmeasured axis, but until resolved, the ADC's dependence on tumor selectivity to offset broad on-target toxicity remains unvalidated", "Quantitative safety margin (IC50 or EC50 vs. therapeutic exposure) for BRAF small-molecule in melanoma\u2014clinical data exist but are not provided here", "Payload-specific toxicity for ERBB2 ADC (linker stability, off-target bystander effects, DAR distribution)\u2014the modality choice (ADC vs. small-molecule) carries its own safety burden not fully captured", "Tissue distribution and receptor density in heart, nerve, and other toxicity-prone tissues for ERBB2 in melanoma patients\u2014the broad KO phenotypes suggest broad normal-tissue expression, but single-cell profiling in patient samples is needed", "Comparative pharmacodynamic windows: does BRAF small-molecule achieve sufficient target engagement in tumor vs. normal tissue at tolerated doses?"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (BRAF) demonstrates established clinical precedent with a PHASE_3 programme in melanoma, meaning the patient population is defined, stratifiable, and the endpoint/enrichment risk is largely retired. The biomarker (BRAF V600E mutation) is well-characterised in the field and clinical feasibility is de-risked. Hypothesis A (ERBB2) explicitly has 'no melanoma clinical precedent' and would require establishing both the patient population and enrichment biomarker de novo, making it a first-in-class stratification play with higher patient-selection risk. Both hypotheses acknowledge the tissue-specificity axis is unmeasured (synthetic priors only), so the decisive difference is the presence vs. absence of real clinical footing. B's 0.85 confidence on right_patient (supported by PHASE_3 evidence) directly reflects a lower-risk, higher-certainty patient narrative compared to A's 0.35 confidence (neutral, synthetic biomarker).", "decisive_evidence": ["Hypothesis B: 'Real clinical precedent: a drug against BRAF has reached PHASE_3 in melanoma' with confidence 0.7, grounded in drugAndClinicalCandidates from Open Targets.", "Hypothesis A: 'No melanoma clinical precedent for ERBB2 in Open Targets, so both the patient population and its enrichment biomarker would have to be established de novo' with confidence 0.4, flagging first-in-class stratification risk.", "B's right_patient value (0.85) reflects strong support from clinical precedent; A's right_patient value (0.35) reflects weak support from absence of clinical footprint."], "missing_evidence": ["Neither hypothesis provides single-cell tissue specificity (tau) or malignant-vs-stromal fractions; both acknowledge this as unmeasured.", "Hypothesis A lacks data on HER2 expression prevalence or clinical response patterns in melanoma (would strengthen patient selection case).", "Hypothesis B does not detail whether the PHASE_3 drug is active against all melanoma subtypes or only BRAF-mutant tumours; the specificity of the treatable population is not fully articulated."]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses target well-established melanoma drivers in a crowded field, but BRAF (B) holds a material commercial advantage over ERBB2 (A) on whitespace and differentiation grounds. BRAF's existing PHASE_3 clinical precedent de-risks patient stratification and provides a clear market anchor\u2014any new BRAF programme enters a defined indication niche with proven demand and endpoint clarity. ERBB2, by contrast, carries first-in-class patient stratification risk in melanoma: no clinical footprint exists, meaning both the population and biomarker must be established de novo, adding regulatory and commercial uncertainty. On differentiation: both targets are high-association ('crowded') by Open Targets signals (0.562 vs 0.701), so neither enjoys whitespace from the target itself. However, A is an ADC in a growing modality class (some novelty potential), while B is a small molecule in a saturated BRAF-inhibitor space. This slight modality advantage for A is outweighed by B's clinical de-risking. The commercial window for B is clearer: an existing Phase 3 means competitor positioning is already mapped, payer thresholds are known, and indication enrichment (e.g., resistance-biomarker subsets) can be grafted onto an established population. For A, the commercial case rests entirely on unproven biomarker discovery and patient recruitment, which is a material commercialization drag in melanoma where BRAF/NRAS/KIT fast-followers already own real estate.", "decisive_evidence": ["BRAF has real PHASE_3 clinical precedent (Open Targets drugAndClinicalCandidates); ERBB2 has zero melanoma clinical footprint.", "BRAF: right_patient value 0.85 (high confidence 0.7) with existing stratified population; ERBB2: right_patient value 0.35 (low confidence 0.4) with synthetic biomarker.", "Both targets are high-association, crowded drivers; neither enjoys strong whitespace from the target itself (BRAF 0.701, ERBB2 0.562 on right_target, but both assessed as 'crowded field' on right_commercial).", "BRAF small-molecule modality is established in melanoma; ERBB2 ADC is novel modality but lacks clinical de-risking in indication."], "missing_evidence": ["Explicit competitor count and market-share data for BRAF inhibitors vs HER2-targeted melanoma ADCs\u2014would quantify crowding more directly.", "Regulatory pathway clarity: does ERBB2-ADC in melanoma qualify as 505(b)(2) or 505(b)(1)? Does BRAF follow-on program enjoy abbreviated pathway?", "Payer/HTA precedent: willingness-to-pay thresholds for BRAF-resistant subpopulations vs de novo HER2-high melanoma enrichment.", "Real market sizing for HER2-high melanoma prevalence and treatment-na\u00efve patient pool\u2014if materially smaller than BRAF-positive melanoma, commercial upside is capped.", "ADC payload/linker novelty for A: if it offers a truly differentiated safety/efficacy profile vs Kadcyla or other HER2-ADCs in solid tumors, that could shift the margin."]}, "tractability": {"axis": "tractability", "relation": "tie", "confidence": "high", "rationale": "Both Hypothesis A (ERBB2-ADC) and Hypothesis B (BRAF-small molecule) demonstrate equivalent tractability on direct, measurable criteria. Each target has an approved drug in its proposed modality class, satisfying the highest-evidence precedent standard. ERBB2 has demonstrated ADC feasibility (trastuzumab deruxtecan, T-DM1), while BRAF has demonstrated small-molecule feasibility (vemurafenib, dabrafenib). Both meet Open Targets tractability buckets for their respective modalities: ERBB2 satisfies AB-modality criteria (approved drug, UniProt localization, transmembrane/signal peptide evidence), and BRAF satisfies SM-modality criteria (approved drug, structure with ligand, high-quality ligand and pocket). Both start from proven chemistry/biologics rather than discovery risk. Neither hypothesis reveals a modality-target mismatch, assayability gap, delivery barrier, or developability red flag specific to tractability. The approved-drug precedent is the strongest evidence available on this axis, and both possess it. Differences in mouse knockout phenotype breadth (52 vs. 77) or LOEUF constraint do not directly impact tractability\u2014they are safety concerns, not feasibility-of-modulation concerns.", "decisive_evidence": ["ERBB2: Approved ADC drug exists (trastuzumab deruxtecan, T-DM1), confirming ADC modality is developable for this target.", "BRAF: Approved small-molecule drug exists (vemurafenib, dabrafenib), confirming SM modality is developable for this target.", "ERBB2: Open Targets confirms AB-modality tractability buckets satisfied (approved drug, UniProt localization high confidence, GO cellular component, transmembrane/signal peptide, Human Protein Atlas).", "BRAF: Open Targets confirms SM-modality tractability buckets satisfied (approved drug, structure with ligand, high-quality ligand, high-quality pocket, druggable family).", "Neither target exhibits modality-mismatch red flags, structural accessibility barriers, or assayability gaps documented in the narratives."], "missing_evidence": ["Head-to-head binding kinetics, selectivity profiles, or off-target liability data that might differentiate modulability within each modality class.", "Cell-based or biochemical assay robustness benchmarks for each target-modality pair.", "Specific ligand quality metrics (ligand efficiency, TPSA, CLogP) beyond categorical 'high-quality' labels.", "Payload delivery and conjugation feasibility specifics for ERBB2-ADC (e.g., DAR optimization, linker stability data)."]}}}, {"hypothesis_a": "H7", "hypothesis_b": "H1", "relation": "tradeoff_or_unresolved", "dominator": null, "dominated": null, "comparison_summary": {"overall_relation": "tradeoff_or_unresolved", "strictly_better_axes_for_A": ["right_safety"], "strictly_better_axes_for_B": ["right_target", "right_patient", "right_commercial", "tractability"], "tied_axes": ["right_tissue"], "unresolved_axes": [], "reason": "both_sides_have_advantages"}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "On the right_target axis alone, Hypothesis B (BRAF) demonstrates stronger causal and mechanistic support for melanoma than Hypothesis A (TERT). The key evidence: (1) BRAF has a higher Open Targets disease association score (0.701 vs 0.555), reflecting aggregated genetic, somatic, literature, and known-drug evidence. (2) BRAF shows a constrained LOEUF o/e ratio (0.15), indicating loss-of-function intolerance\u2014a direct mechanistic signal that the gene is causally relevant to the disease phenotype. TERT's LOEUF is 0.46 (tolerant range), which weakly argues against essential-gene involvement. (3) Both sit on relevant pathways, but BRAF's pathways (Gain-of-function MRAS complexes activate RAF signaling, MAPK pathway regulation) are more directly linked to the somatic genetic driver landscape of melanoma\u2014BRAF mutations are the canonical somatic driver in ~50% of cutaneous melanoma. (4) BRAF has direct clinical validation: an approved small-molecule drug in melanoma already exists, confirming target-disease causality has been clinically validated. TERT lacks this precedent. Neither candidate suffers from obvious literature-popularity-only inflation in the Open Targets association, and both have curated pathway and constraint data. The difference is not vast, but it is material and directional.", "decisive_evidence": ["BRAF Open Targets association score 0.701 vs TERT 0.555\u2014both strong, but BRAF higher.", "BRAF LOEUF o/e 0.15 (constrained, LoF intolerant) vs TERT 0.46 (tolerant)\u2014constraint is a causal signal.", "BRAF is the canonical somatic driver in ~50% of cutaneous melanoma; TERT activation is present but less frequent and often secondary.", "BRAF has clinical precedent (PHASE_3 drug on record in Open Targets); TERT has none, requiring de novo patient stratification.", "Both map to disease-relevant pathways; BRAF's (MAPK/RAF signaling) are the primary melanoma proliferation axis."], "missing_evidence": ["Quantified frequency of BRAF vs TERT somatic mutations in melanoma cohorts (would further calibrate driver strength).", "Perturbation studies (CRISPR, RNAi) directly comparing melanoma cell viability/phenotype dependence on BRAF vs TERT.", "Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets (both report this unmeasured)."]}, "right_tissue": {"axis": "right_tissue", "relation": "tie", "confidence": "low", "rationale": "Both hypotheses report identical structural limitations on the right_tissue axis: neither has measured single-cell tissue specificity (tau) or malignant-vs-stromal fraction data from Open Targets. Both rely on synthetic priors rather than direct, experimentally grounded evidence. Hypothesis A's prior (0.638, tau/malignant specificity unspecified) and Hypothesis B's prior (0.72, described as 'mutant-BRAF melanoma is the definitional driver context') are both synthetic constructs. While Hypothesis B's narrative invokes the biological rationale that mutant-BRAF is a driver in melanoma (a contextual clue), this remains a designed assumption, not measured tissue/cell-type specificity data. Neither hypothesis presents single-cell RNA-seq, spatial transcriptomics, flow cytometry, or immunohistochemistry evidence showing target presence and activity specifically in malignant melanoma cells versus stromal/normal cells. Both identify single-cell profiling as the highest-value experiment to resolve this axis. The synthetic_parts flags and unmeasured status place both on equivalent footing: they are hypotheses awaiting empirical validation, not differentiated by measured tissue evidence.", "decisive_evidence": ["Both H7 (TERT) and H1 (BRAF) lack measured single-cell tissue specificity (tau) and malignant-vs-stromal fraction from Open Targets.", "Both rely on designed priors rather than direct experimental data (single-cell RNA-seq, spatial transcriptomics, or disease-tissue immunohistochemistry).", "Both identify single-cell tau + malignant-fraction profiling (tier-3 cost) as the highest-VoI action to resolve this axis.", "H1's narrative contextual note ('mutant-BRAF melanoma is the definitional driver context') is a mechanistic plausibility statement, not tissue-specificity measurement."], "missing_evidence": ["Single-cell RNA-seq profiling of melanoma tumours (malignant vs. stromal compartments) for both TERT and BRAF expression and activity.", "Spatial transcriptomics or multiplexed immunohistochemistry in melanoma tissue showing target localization to malignant vs. normal/stromal cells.", "Quantified tau (tissue-specificity score) from curated single-cell atlases.", "Disease-state-specific expression evidence (melanoma lesions vs. normal skin) for both targets.", "Evidence of target activity or functional relevance in the malignant compartment specifically (e.g., phospho-substrate levels, telomerase activity quantification in melanoma cells)."]}, "right_safety": {"axis": "right_safety", "relation": "A_better", "confidence": "high", "rationale": "Hypothesis A (TERT) demonstrates a materially better safety profile than Hypothesis B (BRAF) on this axis. TERT shows 0 curated safety liabilities and 33 mouse-knockout phenotypes with modest, tissue-restricted effects (decreased litter size, testis weight). In contrast, BRAF carries 1 explicit curated safety liability (heart disease) and 77 distinct knockout phenotypes spanning developmental systems (bone morphology, vascular endothelial cell morphology, white adipose tissue). The LOEUF constraint metric further supports this: TERT's LOEUF (o/e) = 0.46 falls in the tolerant range, indicating the gene is well tolerated to loss-of-function in population data. BRAF's LOEUF = 0.15 places it in the constrained tail, flagging intolerance to LoF and raising both mechanistic causality and on-target toxicity concerns. The breadth of BRAF's knockout phenotype footprint (77 vs 33) and the presence of a curated cardiac liability signal a broad developmental/essential role, necessitating a narrow therapeutic window that must be rescued by selective delivery or dosing. TERT's safety interpretation explicitly states 'the safety window is plausibly open,' whereas BRAF's states 'systemic inhibition risks on-target toxicity in normal tissue.' Both hypotheses acknowledge unmeasured tissue specificity; however, the baseline safety liability and constraint data favor TERT decisively.", "decisive_evidence": ["TERT: 0 curated safety liabilities vs BRAF: 1 curated safety liability (heart disease)", "TERT: 33 mouse-knockout phenotypes vs BRAF: 77 mouse-knockout phenotypes, indicating broader developmental/systemic impact of BRAF loss", "TERT LOEUF (o/e) = 0.46 (tolerant) vs BRAF LOEUF (o/e) = 0.15 (constrained), indicating differential population tolerance to loss-of-function", "BRAF knockout phenotypes span critical systems (vascular, adipose, skeletal) vs TERT phenotypes are more tissue-restricted", "Hypothesis A interpretation: 'safety window is plausibly open' vs Hypothesis B interpretation: 'systemic inhibition risks on-target toxicity in normal tissue'"], "missing_evidence": ["Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets (acknowledged as unmeasured)", "Human clinical safety data for TERT inhibitors (no clinical precedent)", "Dose-response and selectivity window data for small-molecule TERT inhibitors", "Comparative specificity of TERT inhibition in melanoma malignant cells vs normal somatic cell populations", "Off-target pharmacology profiles of candidate TERT and BRAF small molecules"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "On the right_patient axis, Hypothesis B (BRAF) demonstrates substantially stronger clinical relevance and a defined patient population with established therapeutic precedent, whereas Hypothesis A (TERT) carries first-in-class stratification risk with no melanoma clinical footprint. B's Phase 3 clinical programme provides direct evidence that a treatable patient population is already defined and that stratification/endpoint risk is largely retired\u2014the remaining work is biomarker refinement within an existing clinical context. In contrast, A must establish both its patient population and biomarker enrichment de novo, which introduces meaningful uncertainty about whether a clinically actionable stratum exists. For the right_patient axis specifically, clinical precedent, defined populations, and proven endpoints are the primary decision drivers, and B decisively outperforms A on these criteria.", "decisive_evidence": ["B has real Phase 3 clinical precedent in melanoma (from Open Targets drugAndClinicalCandidates); A has no melanoma clinical footprint.", "B's patient stratification and endpoint risk are largely retired by existing clinical data; A must establish these de novo.", "B's therapeutic benefit is anchored to an approved drug programme, providing high confidence in patient relevance; A's patient relevance is synthetic and unproven.", "B's confidence on right_patient is 0.7 (supported by clinical data); A's confidence is 0.4 (weak, synthetic, unproven).", "Both hypotheses target cutaneous melanoma with unmet need, but only B has evidence of a defined, treatable population."], "missing_evidence": ["Specific biomarker stratification strategy for B (currently synthetic)\u2014though the population existence is proven, optimal biomarker selection remains open.", "Comparative unmet-need quantification between BRAF-mutant and TERT-driven melanoma populations.", "Clinical data on TERT inhibition in any melanoma subtype (would substantially raise A's right_patient score if available)."]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses target crowded melanoma fields with high-association targets that lack inherent commercial whitespace. However, Hypothesis B (BRAF) has a material commercial advantage: an approved small-molecule drug already exists in the market (evidenced by the tractability finding 'Approved Drug'), which means the indication, patient stratification, and reimbursement pathway are de-risked and established. This creates a clearer entry point for a follow-on or combination strategy, reducing market development cost and timeline risk. Hypothesis A (TERT) must establish patient population, biomarker enrichment, and clinical validation de novo in an unproven first-in-class setting, which carries higher commercial and regulatory burden despite the slightly safer target profile. Neither hypothesis offers whitespace or differentiation on the target itself; commercial success in both cases depends on novel modality, payload, or niche positioning\u2014but B starts from a known playbook while A must invent one.", "decisive_evidence": ["BRAF has an approved small-molecule precedent in melanoma (PHASE_3+ clinical footprint documented in drugAndClinicalCandidates), establishing patient population, endpoint validity, and reimbursement risk as already retired.", "TERT has zero clinical precedent in melanoma and must establish patient stratification and biomarker enrichment de novo, adding first-in-class regulatory and commercial burden.", "Both targets have high Open Targets association scores (0.701 vs 0.555) but both are well-trodden and crowded; commercial differentiation cannot rest on target novelty alone for either.", "BRAF's approved drug status (tractability 0.9 with 'Approved Drug' bucket) vs TERT's theoretical tractability (0.6, 'High-Quality Ligand' only) signals reduced chemistry and manufacturing risk for B."], "missing_evidence": ["Explicit competitor count and current market share for BRAF inhibitors in melanoma (synthetic approximation only).", "Explicit pricing power or indication niche available to a new BRAF program vs. a new TERT program (both are synthetic).", "Whether the approved BRAF drug has resistance mechanisms or patient sub-populations not yet served that would create commercial whitespace for a second-generation program.", "Patent landscape and freedom-to-operate status for both targets (not evaluated).", "Payer/formulary acceptance risk or reimbursement barriers specific to either target (not evaluated)."]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "Both hypotheses propose small-molecule modulation of kinase targets in melanoma, but they differ materially in modality de-risking and precede
