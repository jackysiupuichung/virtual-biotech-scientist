-fraction enrichment of MAP2K1 vs. SMARCA4 in primary tumors"]}, "right_tissue": {"axis": "right_tissue", "relation": "tie", "confidence": "low", "rationale": "Both hypotheses declare the right_tissue axis as unmeasured and explicitly synthetic. Hypothesis A reports tau=0.635 (confidence 0.4) with no designed prior and weak association-derived placeholder. Hypothesis B reports tau=0.6 (confidence 0.4) with specificity inherited from BRAF/MAPK pathway context. Neither provides single-cell evidence, spatial transcriptomics, malignant-vs-stromal fractionation, or disease-tissue validation. Both treat this as the highest-value experiment to resolve (tier-3 single-cell profiling). The marginal numerical difference (0.635 vs 0.6) is within synthetic noise and confidence is equally low (0.4 each). B's rationale (pathway inheritance from BRAF) is slightly more grounded than A's (no designed prior), but both are speculative assumptions rather than measured evidence. Neither hypothesis has experimentally validated tissue specificity in melanoma.", "decisive_evidence": ["Hypothesis A: 'Single-cell tissue specificity (tau) and malignant-vs-stromal fraction are NOT available from Open Targets. Value shown is a designed prior (moderately specific): no designed prior; weak association-derived placeholder.'", "Hypothesis B: 'Single-cell tissue specificity (tau) and malignant-vs-stromal fraction are NOT available from Open Targets. Value shown is a designed prior (moderately specific): downstream of BRAF; specificity inherited from pathway context.'", "Both hypotheses identify single-cell tau + malignant-fraction profiling as tier-3 cost experiment needed to resolve this axis.", "Both confidence scores on right_tissue = 0.4 (equally weak)."], "missing_evidence": ["Single-cell RNA-seq expression profiles in melanoma (malignant cells, stromal cells, immune infiltrate).", "Tissue specificity (tau) metric from curated databases (e.g., Open Targets computed tau).", "Spatial transcriptomics mapping of SMARCA4 and MAP2K1 expression in primary and metastatic melanoma tissue.", "Comparison of expression in BRAF-mutant vs. wild-type melanoma subcells to validate pathway inheritance claim (B).", "Disease-state specificity: expression in healthy skin vs. melanoma.", "Malignant-vs-stromal fraction decomposition in patient-derived samples or sorted cell populations.", "Any experimental validation distinguishing melanoma-context activity between the two targets."]}, "right_safety": {"axis": "right_safety", "relation": "tie", "confidence": "medium", "rationale": "Both hypotheses present materially similar safety profiles on the available evidence. Hypothesis A (SMARCA4) reports 0 curated safety liabilities with 26 mouse-knockout phenotypes; Hypothesis B (MAP2K1) reports 0 curated safety liabilities with 24 mouse-knockout phenotypes. Both axes are scored at 0.89\u20130.90 with confidence 0.6. The knockout phenotype footprints are comparable in scale and character (developmental/morphological effects). Neither hypothesis discloses a dominant on-target safety liability or tissue-toxicity red flag from the Open Targets record. The key differentiator\u2014tissue-specific expression and stromal vs. malignant fraction\u2014remains unmeasured for both and is flagged as the highest-value experiment for both. Without single-cell profiling data, tissue distribution cannot be used to rank safety risk. The LOEUF constraint scores differ slightly (SMARCA4: 0.17 vs. MAP2K1: 0.32), but both indicate LoF intolerance and thus on-target toxicity risk; this does not materially separate them. MAP2K1's clinical track record (PHASE_3 program) provides some real-world safety signal, but this is not explicitly surfaced in the right_safety axis data and would require inference beyond the stated evidence.", "decisive_evidence": ["Both report 0 curated safety liabilities from Open Targets", "Mouse-knockout phenotype counts are similar (26 vs. 24) and representative phenotypes are develo ence vs. absence of clinical validation."], "missing_evidence": ["Specificity of BRAF-mutant melanoma enrichment: Is the Phase 3 programme restricted to BRAF V600E / V600K or broader? (would strengthen B's biomarker clarity).", "Real-world patient stratification failure rates for NTRK1 vs. BRAF in melanoma (would clarify A's first-in-class risk quantitatively).", "Unmet need magnitude in any residual patient subpopulation after BRAF therapy (would inform whether A's de novo population discovery is timely)."]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses face a crowded competitive field, but B (BRAF) has materially stronger commercial positioning despite the crowd. B benefits from: (1) an existing PHASE_3 clinical precedent that de-risks patient stratification and provides a clear commercial footpath; (2) an approved small-molecule drug establishing proven chemistry and regulatory precedent, enabling faster differentiation through novel payloads, combinations, or resistance-mutation targeting rather than target discovery; (3) a well-defined melanoma indication with established clinical infrastructure. A (NTRK1) must establish first-in-class stratification de novo and faces additional modality risk (antibody-only tractability limits payload optionality). Neither target offers whitespace or obvious competitive differentiation at the target level, but B's clinical and regulatory runway materially shortens time-to-market and reduces go/no-go risk, which translates to stronger commercial attractiveness in a crowded space. The advantage is moderate, not decisive, because both face saturation and must rely on differentiation beyond the target itself.", "decisive_evidence": ["B has PHASE_3 clinical precedent (Open Targets drugAndClinicalCandidates), retiring patient-stratification risk; A has no clinical footprint and must establish biomarker de novo", "B has approved small-molecule drug (Open o) vs biomarker refinement of validated indication (B scenario)", "Single-cell tissue specificity data (tau + malignant fraction) for both targets, which both identify as highest-VoI action but remain unmeasured"]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K1, small molecule) demonstrates substantially higher tractability than Hypothesis A (NTRK1, antibody) on direct, empirical evidence. B satisfies five high-confidence tractability buckets including 'Approved Drug' and 'Structure with Ligand'\u2014meaning chemistry, binding pockets, and developable molecules are proven. An approved small-molecule drug against MAP2K1 already exists in melanoma clinical development (PHASE_3), eliminating discovery risk and providing direct modality precedent. A satisfies only baseline antibody-tractability criteria (UniProt localization, GO cellular component, signal peptide/transmembrane domains), which confirms the modality is plausible but does not provide the same degree of de-risking. The antibody modality for NTRK1 lacks clinical validation precedent for this target and lacks the high-quality ligand/structure/approved-drug evidence that B enjoys. Both hypotheses acknowledge the same tissue-specificity gap (unmeasured single-cell tau), so that does not differentiate them on tractability proper. The difference is categorical: B arrives with proven small-molecule chemistry and clinical momentum; A starts from modality plausibility alone.", "decisive_evidence": ["MAP2K1 (B) has an approved small-molecule drug and PHASE_3 clinical precedent in melanoma, satisfying 'Approved Drug' and 'Known Drug' tractability buckets.", "MAP2K1 (B) tractability score 0.9 with high confidence, citing 'Structure with Ligand', 'High-Quality Ligand', 'High-Quality Pocket', and 'Druggable Family'\u2014all direct modality-fit evidence.", "NTRK1 (A) tractability score 0.6 with high confidence, satisfying only baseline antibody criteria (UniProt loc, GO CC, signal peptide/TMHMM) but no approved drug or high-quality ligand precedent.", "B explicitly notes 'De-risked modality' due to approved drug precedent; A notes only that 'the modality is credible though not yet clinically validated for this target'."], "missing_evidence": ["Binding kinetics, selectivity, off-target risk, or assay formats for either modality\u2014tractability evidence is limited to structural/regulatory buckets and does not include detailed developability metrics.", "Delivery feasibility (e.g., blood\u2013brain barrier penetration, tissue penetration for antibody) is not explicitly addressed; both hypotheses avoid this consideration despite NTRK1's neuronal role raising potential CNS-related liabilities.", "Manufacturing readiness, scale-up feasibility, or formulation tractability are not discussed for either modality."]}}}, {"hypothesis_a": "H11", "hypothesis_b": "H3", "relation": "tradeoff_or_unresolved", "dominator": null, "dominated": null, "comparison_summary": {"overall_relation": "tradeoff_or_unresolved", "strictly_better_axes_for_A": ["right_tissue"], "strictly_better_axes_for_B": ["right_target", "right_safety", "right_patient", "right_commercial", "tractability"], "tied_axes": [], "unresolved_axes": [], "reason": "both_sides_have_advantages"}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses show strong multi-modal causal support for their respective targets in melanoma, but Hypothesis B (MAP2K2) has a materially higher Open Targets disease association score (0.658 vs 0.546) and lower loss-of-function constraint (LOEUF 0.61 vs 0.77), indicating stronger population-genetic evidence against essential-gene toxicity. Both targets sit on relevant MAPK/RAS pathway nodes. The key differentiator on the right_target axis is that MAP2K2 has clinical validation\u2014a PHASE_3 programme exists\u2014which provides direct perturbation evidence that the target is mechanistically relevant in patients with melanoma. NTRK1 has no clinical melanoma precedent, meaning its causal relevance remains preclinical and inferred from association scores alone. While NTRK1's curated safety liabilities (15, with broad knockout phenotypes) are a concern, they primarily affect the right_safety axis, not right_target causality. On the target-disease causality axis specifically, MAP2K2's higher association score, better genetic constraint profile, and proven clinical engagement in melanoma constitute stronger causal and mechanistic support.", "decisive_evidence": ["MAP2K2 Open Targets association score 0.658 vs NTRK1 0.546", "MAP2K2 LOEUF 0.61 vs NTRK1 0.77 (lower = more tolerated LoF, less essential toxicity)", "MAP2K2 has PHASE_3 clinical programme in melanoma (direct perturbation evidence); NTRK1 has no melanoma clinical precedent", "Both targets sit on well-characterized MAPK/RAS pathway nodes relevant to melanoma biology"], "missing_evidence": ["Human genetic evidence distinguishing causality (e.g., melanoma GWAS loci, somatic mutation enrichment, segregation data) for NTRK1 vs MAP2K2", "Mechanistic pathway specificity: which pathway role (RAS signaling, p38 signaling, MAPK feedback) is rate-limiting in melanoma for each target", "Somatic mutation frequency and functional impact (driver vs passenger) in melanoma tumor cohorts for both targets", "Dose-response or saturation analysis from any prior melanoma trials with MAP2K2 inhibitors (to validate clinical relevance beyond PHASE_3 label)"]}, "right_tissue": {"axis": "right_tissue", "relation": "A_better", "confidence": "medium", "rationale": "Both hypotheses lack direct single-cell or spatial evidence for tissue specificity in melanoma\u2014both acknowledge this as an unmeasured axis requiring tier-3 experimentation. However, they differ materially in their synthetic priors and the biological plausibility of those priors. Hypothesis A posits that NTRK1 is 'sharply tumour-restricted' with 'highly lineage-restricted expression,' supported by NTRK1's known role as a neurotrophin receptor with well-documented expression in the nervous system\u2014a cell type that is functionally and developmentally distinct from melanoma. This lineage restriction creates a stronger tissue-specificity prior. Hypothesis B describes MAP2K2 as 'moderately specific' based on 'pathway-contextual specificity'\u2014MEK2 is a central node in the MAPK cascade, which is broadly active across cell types and tissues. Pathway centrality typically correlates with lower tissue selectivity, not higher. Thus, while both rely on synthetic priors, A's prior rests on sharper biological differentiation (neural lineage) whereas B's prior reflects a general kinase that activates effectors across many tissues. The designed prior for A (0.88 vs B's 0.58) reflects this difference and appears internally consistent with known biology. Neither hypothesis provides measured tissue-context evidence (malignant fraction, single-cell tau), but A's prior is more grounded in lineage biology than B's pathway-context reasoning.", "decisive_evidence": ["H_A: NTRK1 is described as 'highly lineage-restricted' based on its role in nervous system development and sympathetic neuron maturation\u2014a cell type distinct from melanoma epithelium.", "H_B: MAP2K2 is a central MEK kinase in the MAPK cascade, which is broadly active in development and normal tissues, making the 'moderately specific' prior less tissue-selective than A's.", "H_A synthetic prior: 0.88 (sharply tumour-restricted); H_B synthetic prior: 0.58 (moderately specific)\u2014the directional difference is biologically motivated.", "Both lack single-cell tau and malignant-vs-stromal fractions from Open Targets; both flag this as the highest-VoI experiment."], "missing_evidence": ["Single-cell RNA-seq or spatial transcriptomics showing NTRK1 expression in malignant vs. stromal compartments in melanoma tissue.", "Single-cell RNA-seq or spatial transcriptomics showing MAP2K2 expression in malignant vs. stromal compartments in melanoma tissue.", "Disease-state activation status (phospho-pathway readouts) of NTRK1 signaling in primary and metastatic melanoma.", "Disease-state activation status of MAP2K2 signaling in melanoma (though MAPK pathway is known to be hyperactive in BRAF-mutant melanoma, MAP2K2 itself is not typically mutated and its cell-autonomous activity in malignant cells vs. stroma is not specified).", "Immunohistochemistry or fluorescence microscopy localizing NTRK1 and MAP2K2 protein in melanoma tissue sections to confirm tissue compartmentalization."]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K2) demonstrates a materially safer profile than Hypothesis A (NTRK1) on direct, curated safety evidence. MAP2K2 shows 0 curated safety liabilities and 4 mouse-knockout phenotypes (mostly benign: no abnormal phenotype, abnormal gait, increased MCV), whereas NTRK1 carries 15 curated safety liabilities (including grey matter heterotopia, weight gain, seizures) and 48 distinct mouse-knockout phenotypes. The contrast in breadth of knockout phenotypes (4 vs 48) and severity of curated liabilities (0 vs 15) directly signals a narrower therapeutic window for NTRK1. Both hypotheses acknowledge that systemic inhibition risks on-target toxicity, but the safety liability signal is substantially stronger and more multi-faceted for NTRK1. Additionally, MAP2K2 already has a Phase 3 clinical programme, providing real-world tolerability data not available for NTRK1. While both targets operate in well-validated pathways and neither shows knockout lethality (LOEUF 0.77 for NTRK1, 0.61 for MAP2K2), the accumulated safety evidence favors MAP2K2 for tolerance and therapeutic margin.", "decisive_evidence": ["NTRK1: 15 curated safety liabilities vs MAP2K2: 0 curated safety liabilities (OpenTargets safetyLiabilities field)", "NTRK1: 48 distinct mouse-knockout phenotypes vs MAP2K2: 4 distinct mouse-knockout phenotypes (OpenTargets mousePhenotypes field)", "NTRK1 curated liabilities include CNS-related hazards (grey matter heterotopia, seizures) indicative of essential developmental role", "MAP2K2 has Phase 3 clinical precedent, providing empirical safety and tolerability data in human melanoma populations", "NTRK1 interpretation explicitly states 'narrow therapeutic window must be bought back with tumour-selective delivery or dosing' (acknowledges structural safety constraint)"], "missing_evidence": ["Systemic toxicity data from clinical trials or in vivo pharmacodynamic studies for NTRK1 (no clinical programme yet)", "Tissue-restricted expression data (tau and malignant-vs-stromal fraction) for both targets\u2014both hypotheses flag this as unmeasured and high-value to resolve", "On-target vs off-target toxicity attribution for MAP2K2's Phase 3 programme (are observed tolerability limits driven by target mechanism or drug properties?)", "Dose-response safety curves or maximum tolerated dose (MTD) comparative data"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K2) has direct clinical precedent\u2014a Phase 3 drug programme in melanoma\u2014which establishes a defined, treatable patient population with proven stratification and clinical endpoints. Hypothesis A (NTRK1) explicitly lacks melanoma clinical footprint and must establish both patient population and biomarker enrichment de novo, carrying first-in-class stratification risk. On the right_patient axis, which prioritizes defined populations, biomarkers, clinical precedent, and meaningful endpoints, B's existing Phase 3 programme substantially de-risks the patient-selection question, whereas A must solve it empirically.", "decisive_evidence": ["B has real clinical precedent: PHASE_3 drug candidate in melanoma (Open Targets drugAndClinicalCandidates), establishing a defined patient population and reducing stratification/endpoint risk.", "A has no melanoma clinical footprint: patient population and biomarker enrichment must be established de novo, creating first-in-class patient-selection risk.", "B's interpretation acknowledges that 'the open question is only which biomarker sub-population to enrich, not whether one exists'\u2014a refinement task.", "A's interpretation states 'NTRK1 carries first-in-class stratification risk' because both population and biomarker are synthetic."], "missing_evidence": ["Details on the patient stratification biomarker(s) actually used in B's Phase 3 programme (e.g., BRAF/NRAS mutation status, specific enrichment criteria).", "Unmet need quantification for melanoma sub-populations treatable by A vs. B (patient population size, current standard-of-care gap).", "Clinical endpoint definitions and regulatory pathway clarity for either hypothesis.", "Any emerging clinical data or real-world use patterns from B's Phase 3 programme that would inform patient selection."]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses face a crowded, well-trodden melanoma target landscape with synthetic competitor data and no direct whitespace measurements. However, B (MAP2K2) has measurable commercial advantages over A (NTRK1) that offset field saturation: (1) Proven clinical precedent\u2014a Phase 3 programme in melanoma de-risks patient stratification and reduces regulatory/market validation risk; (2) De-risked small-molecule modality with an approved comparator, reducing chemistry risk and shortening development timelines; (3) Superior safety profile (0 liabilities vs. 15, 4 KO phenotypes vs. 48) lowers the bar for commercial formulation and labeling; (4) Higher target association score (0.658 vs. 0.546) signals stronger mechanistic confidence. A's antibody modality and narrow tissue specificity prior (0.88 vs. 0.58) could theoretically differentiate it, but these are unmeasured synthetics; A's broad safety liabilities and complete absence of clinical precedent force the programme to establish both patient population and safety window de novo, materially increasing commercial and regulatory friction. B can anchor competitive positioning to an existing clinical footprint and approved molecule, making it faster to market and lower-risk to finance.", "decisive_evidence": ["MAP2K2 has Phase 3 clinical precedent in melanoma (Open Targets drugAndClinicalCandidates); NTRK1 has no melanoma clinical footprint\u2014this retires stratification and patient-population risk for B.", "MAP2K2 approved small-molecule tractability (0.9, high-quality pocket, approved comparator); NTRK1 antibody-only tractability (0.6) capped by modality\u2014B has de-risked chemistry and bench-to-clinic precedent.", "MAP2K2 safety: 0 curated liabilities, 4 KO phenotypes; NTRK1 safety: 15 curated liabilities, 48 KO phenotypes\u2014B has a wider therapeutic window and simpler commercial labeling.", "MAP2K2 target association 0.658 vs. NTRK1 0.546\u2014B has stronger multi-modal disease causal support."], "missing_evidence": ["Explicit competitor counts and market-share data for MAP2K2 vs. NTRK1 in melanoma (both use synthetic approximations).", "Measured single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both\u2014unmeasured, designed priors only.", "Financial model for differentiation strategy (payload, combination, dosing schedule, or niche indication) that would allow A or B to escape crowded-target commoditization.", "Regulatory pathway clarity for NTRK1 antibody in a first-in-class melanoma setting (patient stratum, endpoints, comparator)."]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K2 small-molecule) demonstrates substantially higher tractability than Hypothesis A (NTRK1 antibody) on the basis of direct, experimentally grounded evidence. MAP2K2 satisfies five high-confidence tractability criteria: Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, and Druggable Family. This represents mature, de-risked precedent\u2014an approved small-molecule already exists, eliminating discovery and early development risk. In contrast, NTRK1 satisfies only the minimal antibody tractability buckets (UniProt localization, GO cellular component, signal peptide/transmembrane prediction) without clinical validation of the modality for this target. While both targets have credible structural/biophysical handles, MAP2K2's position benefits from: (1) direct precedent of an approved drug in the same disease (melanoma, Phase 3 clinical data); (2) multiple high-quality ligand structures available; (3) validation across the druggable family. NTRK1's antibody modality, while tractable in principle, lacks this depth of direct validation and carries higher risk of unexpected developability barriers (e.g., tissue penetration, immunogenicity, manufacturing). The modality-target fit is tighter for B: MAP2K2 is a kinase domain with well-characterized ATP-binding pockets suited to small molecules; NTRK1 as an antibody target depends on epitope accessibility and extracellular availability, which are unmeasured. The safety liabilities on NTRK1 (15 curated, 48 knockout phenotypes) do not improve tractability but may necessitate more complex delivery engineering for an antibody, further compounding risk.", "decisive_evidence": ["MAP2K2 has an approved small-molecule drug in melanoma (Open Targets drugAndClinicalCandidates, Phase 3 precedent)", "MAP2K2 tractability score 0.9 (high confidence 0.9) with satisfied buckets: Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, Druggable Family", "NTRK1 tractability score 0.6 (high confidence 0.9) with only minimal antibody buckets satisfied: UniProt loc, GO CC, SigP/TMHMM", "MAP2K2 modality (small-molecule) has direct clinical validation; NTRK1 modality (antibody) lacks clinical precedent for this target", "MAP2K2 LOEUF 0.61 vs NTRK1 LOEUF 0.77\u2014MAP2K2 shows slightly tighter constraint, supporting kinase-domain tractability"], "missing_evidence": ["NTRK1 antibody epitope mapping and extracellular domain accessibility (required for antibody developability)", "NTRK1 tissue penetration requirements and antibody delivery feasibility to melanoma lesions", "Comparative ligand binding kinetics, selectivity, and synthesis complexity for small molecules targeting NTRK1 (if pursued)", "Manufacturing scalability and immunogenicity risk for candidate NTRK1 antibodies"]}}}, {"hypothesis_a": "H12", "hypothesis_b": "H1", "relation": "tradeoff_or_unresolved", "dominator": null, "dominated": null, "comparison_summary": {"overall_relation": "tradeoff_or_unresolved", "strictly_better_axes_for_A": ["right_tissue"], "strictly_better_axes_for_B": ["right_target", "right_safety", "right_patient", "right_commercial", "tractability"], "tied_axes": [], "unresolved_axes": [], "reason": "both_sides_have_advantages"}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "Both hypotheses present strong, multi-modal causal support for their respective targets in cutaneous melanoma, grounded in Open Targets disease association scores and genetic constraint data. However, BRAF (Hypothesis B) demonstrates materially superior evidence on the right_target axis. BRAF's association score is 0.701 vs. FGFR2's 0.545\u2014a difference of 0.156 points that reflects stronger aggregated genetic, somatic, and clinical evidence. More critically, BRAF is the definitional somatic driver in melanoma: activating BRAF V600E mutations occur in ~50% of cutaneous melanomas and are a well-established, causally validated oncogenic lesion. This somatic genetics evidence is direct, curated, and experimentally validated through decades of mechanistic and clinical work. FGFR2, by contrast, shows no comparable somatic mutation signature or focal amplification pattern specific to melanoma in the evidence presented. While FGFR2 sits on relevant PI3K/AKT pathway nodes, this is indirect pathway causality without the specificity anchor that somatic driver status provides. Both genes show similar constraint (LOEUF tails), but constraint alone does not substitute for somatic causal evidence. The Open Targets score differential reflects this: it aggregates multiple evidence modalities, and BRAF's higher score directly indicates stronger mechanistic and causal support in the disease context.", "decisive_evidence": ["BRAF association score 0.701 vs. FGFR2 0.545 on Open Targets\u20140.156-point differential reflects stronger multi-modal causal evidence", "BRAF is a definitional somatic driver: activating BRAF V600E mutations in ~50% of cutaneous melanomas with established causality", "BRAF has clinical precedent: Phase 3 drug programme confirms patient population enrichment and reduces stratification risk", "FGFR2 shows no analogous somatic mutation or focal amplification signature specific to melanoma", "BRAF pathway (MAPK/RAF/MEK) is the canonical melanoma oncogenic axis; FGFR2 PI3K involvement is secondary or context-dependent"], "missing_evidence": ["Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets\u2014both identified as highest-VoI experimental resolution", "Quantitative somatic mutation or copy-number alteration frequency for FGFR2 in melanoma cohorts (TCGA, other large series)", "Direct perturbation data (CRISPR, RNAi dependency) comparing BRAF vs. FGFR2 in melanoma cell lines or organoids", "Mechanistic pathway dependency ranking in melanoma-relevant models to establish whether PI3K/AKT or MAPK is rate-limiting"]}, "right_tissue": {"axis": "right_tissue", "relation": "A_better", "confidence": "medium", "rationale": "Both hypotheses present unmeasured, synthetic priors for tissue specificity on the right_tissue axis. However, Hypothesis A claims a **sharply tumour-restricted** expression pattern (tau=0.82, based on focal amplification logic), while Hypothesis B claims only **moderate specificity** (tau=0.72, based on mutant-BRAF being a driver context). On the right_tissue axis\u2014which prioritizes presence, activity, and disease-relevance in the correct tissue and cell type\u2014a sharply tumour-cell-restricted pattern is materially stronger than a moderately specific one. A focal amplification pattern in FGFR2 suggests selective enrichment in malignant cells, whereas BRAF's canonical role in the MAPK pathway is more broadly active across cell types, including normal tissue. This gives Hypothesis A a tissue-selectivity advantage, though both lack single-cell validation and both are at low confidence (0.4). The difference is directional but modest because neither has measured evidence.", "decisive_evidence": ["Hypothesis A cites 'focal amplification pattern implies tumour-cell-restricted expression' as the basis for sharp tissue specificity (tau=0.82).", "Hypothesis B cites 'mutant-BRAF melanoma is the definitional driver context' but acknowledges only moderate specificity (tau=0.72).", "Both acknowledge single-cell tau and malignant-fraction data are NOT available and are synthetic priors."], "missing_evidence": ["Single-cell RNA-seq or spatial transcriptomics profiling of FGFR2 and BRAF in melanoma tissue vs. normal skin and stromal compartments.", "Malignant-cell fraction enrichment measurements for each target in primary melanoma samples.", "Validation of the focal amplification claim for FGFR2 and confirmation that it correlates with malignant-cell-specific expression.", "Comparison of BRAF expression across melanoma cell lines, primary tumours, and non-malignant cell types to measure true tissue/cell-type specificity.", "Disease-state-specific profiling (primary melanoma vs. metastatic vs. normal skin) for both targets."]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses face safety headwinds from broad developmental roles and essential gene status, but Hypothesis B (BRAF small-molecule) presents a materially better safety profile than Hypothesis A (FGFR2 ADC) on three converging grounds: (1) BRAF has 77 mouse-knockout phenotypes versus FGFR2's 280\u2014a 3.6-fold difference indicating narrower systemic essentiality; (2) BRAF carries 1 curated safety liability (heart disease) versus FGFR2's 0, but curated liabilities, while concerning, are more tractable (known, bounded) than the unknown breadth of FGFR2's phenotype space; (3) BRAF small-molecule inhibitors have clinical precedent (PHASE_3 approval pathway), meaning the therapeutic window, dose tolerance, and organ-specific toxicity profile are empirically established, whereas FGFR2 ADC combines an unproven modality (ADC to this target) with a broad-phenotype target and no clinical footprint. The ADC modality itself offers tumour-selective delivery in principle, which could offset some FGFR2 breadth, but this benefit is speculative and not yet demonstrated; the small-molecule case rests on actual clinical tolerability data. FGFR2's higher constraint (LOEUF 0.19 vs. 0.15) and 280-phenotype liability are more disqualifying to systemic safety margin than BRAF's more modest phenotype count and known cardiac signal.", "decisive_evidence": ["FGFR2: 280 distinct mouse-knockout phenotypes vs. BRAF: 77\u20143.6-fold difference indicating broader developmental/essential role and higher predicted systemic toxicity risk.", "BRAF: 1 curated safety liability (heart disease, known and manageable) vs. FGFR2: 0 curated but 280 phenotypes (indicating unknown, widespread liabilities).", "BRAF: Approved small-molecule drug with established clinical safety/tolerability profile and PHASE_3 precedent in melanoma; FGFR2: No clinical melanoma precedent and modality (ADC) unproven on this target.", "FGFR2 LOEUF (0.19) and BRAF LOEUF (0.15) both indicate constraint, but FGFR2's broader phenotype burden and ADC modality (which still requires systemic circulation before tumour targeting) amplify on-target toxicity risk."], "missing_evidence": ["Organ-specific or tissue-level toxicity data for FGFR2 to map the 280 phenotypes to human safety risk (lung, bone, labyrinth phenotypes suggest developmental/structural risk, but quantitative translation is absent).", "Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets\u2014both flagged as unmeasured and high-value; FGFR2's designed prior assumes 'sharply tumour-restricted,' but BRAF's prior is 'moderately specific,' so measured data could shift the comparison if FGFR2 proves even more selective.", "Formal pharmacokinetic/pharmacodynamic tolerability data and dose-escalation studies for FGFR2 ADC (vs. historical BRAF small-molecule toxicology).", "Whether BRAF's cardiac liability manifests at melanoma-efficacy doses or only at higher exposures\u2014clinical severity and mitigation strategy are not detailed."]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (BRAF) has direct clinical precedent with an existing PHASE_3 programme in melanoma, establishing a defined, treatable patient population with known stratification pathways and validated endpoints. Hypothesis A (FGFR2) has no clinical footprint in melanoma and would require de novo biomarker discovery and patient population definition, creating first-in-class stratification risk. On the right_patient axis\u2014which prioritizes defined populations, clinical precedent, and meaningful endpoints\u2014B's proven clinical context decisively outweighs A's unproven status.", "decisive_evidence": ["B: Real clinical precedent\u2014PHASE_3 programme already registered in melanoma (Open Targets drugAndClinicalCandidates), meaning patient population, endpoint criteria, and enrichment logic are partially de-risked.", "A: No melanoma clinical precedent for FGFR2 (explicit statement in right_patient axis finding); both patient population and biomarker would have to be established de novo, introducing first-in-class stratification risk.", "B's right_patient confidence: 0.7 (moderate-to-high), grounded in existing clinical programme.", "A's right_patient confidence: 0.4 (low), explicitly marked as synthetic and unproven."], "missing_evidence": ["Specific biomarker stratum definition for B (noted as synthetic placeholder), though the existence of a PHASE_3 programme implies that selection criteria already exist in practice.", "Clinical unmet need quantification for both hypotheses (patient population size, current standard-of-care failure rates, survival benefit threshold).", "For A: any preclinical or early-stage clinical exploration in melanoma or related contexts that might reduce first-in-class stratification risk."]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "On commercial attractiveness and strategic whitespace, Hypothesis B (BRAF) holds a structural advantage despite both hypotheses sharing a core liability: crowded competitive fields. The decisive difference is clinical precedent and differentiation pathway. BRAF has an existing PHASE_3 programme in melanoma, which establishes market validation, a defined patient population, and a clear competitive baseline. This allows a follow-on programme to compete on a well-understood axis (e.g., improved safety profile, tolerability, resistance mutations, combination potential) rather than re-validating the entire disease/biomarker stratum. In contrast, FGFR2 in melanoma has no clinical footprint, requiring first-in-class patient stratification and biomarker discovery de novo\u2014a substantially higher commercial risk and longer pathway to market differentiation. Both targets are well-associated with melanoma (0.701 vs 0.545) and both sit in crowded spaces, but BRAF's clinical precedent provides a clearer route to commercial differentiation through incremental innovation. FGFR2's only offsetting advantage is modality (ADC vs small molecule), which could theoretically yield payload-based differentiation, but this is speculative and does not overcome the patient/biomarker validation gap. The commercial value of BRAF's clinical footprint is direct and material.", "decisive_evidence": ["BRAF: PHASE_3 clinical precedent in melanoma (right_patient = 0.85, confidence 0.7); patient population and endpoint risk already retired.", "FGFR2: Zero melanoma clinical precedent; patient population and biomarker stratum must be established de novo (right_patient = 0.35, confidence 0.4).", "Both targets occupy crowded competitive fields (BRAF right_commercial = 0.3, FGFR2 right_commercial = 0.336), but BRAF's clinical validation provides a differentiation baseline; FGFR2 lacks such a baseline.", "BRAF tractability: Approved Drug status (small-molecule precedent de-risks modality); FGFR2 tractability: Advanced Clinical only (ADC modality not yet clinically validated for this target)."], "missing_evidence": ["Explicit competitor count and whitespace quantification for both targets in melanoma; reliance on synthetic approximations from target association scores.", "Payload novelty and differentiability of FGFR2-ADC (modality could unlock whitespace if payload is validated, but this is not documented).", "Market size, pricing power, and revenue defensibility for BRAF follow-on vs FGFR2 first-in-class in melanoma.", "Biomarker enrichment depth: is BRAF's existing clinical population (mutant-BRAF melanoma) more or less enriched than a potential FGFR2 stratum?", "Resistance mechanisms and combination potential for BRAF (could favor or disfavor commercial positioning)."]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (BRAF + small_molecule) demonstrates substantially higher tractability than Hypothesis A (FGFR2 + ADC) on direct, evidence-based criteria. BRAF satisfies the highest-precedent tractability buckets: Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, and Druggable Family. This represents de-risked, clinically-validated chemistry with proven developability. FGFR2 + ADC satisfies only the baseline buckets (Advanced Clinical, GO CC, UniProt SigP/TMHMM) with no approved drug precedent and no clinical validation of the ADC modality for this target. The modality-target fit also favors B: small-molecule kinase inhibition of BRAF is a established, low-risk approach with multiple approved comparators; ADC delivery to FGFR2 relies on cell-surface expression, linker design, and payload efficacy\u2014all with higher execution risk and no direct melanoma precedent. Both targets carry similar safety liability breadth (280 vs. 77 mouse-KO phenotypes), but BRAF's simpler, better-characterized modality mitigates this risk more effectively. The deciding factor is the presence of approved BRAF small-molecule drugs that validate chemistry, assayability, and manufacturability\u2014B lacks this validation for ADC.", "decisive_evidence": ["BRAF satisfies 'Approved Drug' tractability bucket; FGFR2 does not.", "BRAF small-molecule modality has clinical precedent (PHASE_3 in melanoma); FGFR2 ADC does not.", "BRAF tractability confidence = 0.9 (strong, data_origin: opentargets); FGFR2 tractability confidence = 0.9 (moderate, data_origin: opentargets).", "BRAF buckets: Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, Druggable Family. FGFR2 buckets: Advanced Clinical, GO CC high conf, UniProt loc/SigP/TMHMM\u2014lower bar.", "ADC modality for FGFR2 has no direct melanoma precedent or clinical validation; small-molecule BRAF inhibition is routine and proven."], "missing_evidence": ["Assayability benchmarking for FGFR2 ligand binding assays vs. BRAF kinase assays (both likely high-quality, but not explicitly compared).", "ADC linker and payload developability constraints specific to FGFR2 surface expression and internalization kinetics.", "Head-to-head structural pocket quality comparison (BRAF pocket well-characterized; FGFR2 pocket not detailed in H12).", "Off-target kinase selectivity burdens for BRAF small-molecule vs. FGFR2-targeted ADC payloads."]}}}, {"hypothesis_a": "H12", "hypothesis_b": "H2", "relation": "tradeoff_or_unresolved", "dominator": null, "dominated": null, "comparison_summary": {"overall_relation": "tradeoff_or_unresolved", "strictly_better_axes_for_A": ["right_tissue"], "strictly_better_axes_for_B": ["right_target", "right_safety", "right_patient", "right_commercial", "tractability"], "tied_axes": [], "unresolved_axes": [], "reason": "both_sides_have_advantages"}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "MAP2K1 (B) demonstrates stronger causal and mechanistic support for cutaneous melanoma than FGFR2 (A) on the right_target axis. The key differentiators are: (1) higher Open Targets disease association score (0.683 vs 0.545), reflecting aggregated genetic, somatic, literature, and known-drug evidence; (2) direct clinical validation through an active PHASE_3 programme in melanoma, providing real-world mechanistic confirmation; (3) established position within the well-characterized MAPK/RAF/MEK/ERK pathway, which has somatic mutation prevalence and functional validation in melanoma biology; (4) comparable loss-of-function constraint (LOEUF 0.32 vs 0.19), indicating both genes are mechanistically essential, though MAP2K1's broader knockout phenotype profile (24 vs 280 distinct phenotypes) suggests lower pleiotropy risk without compromising causal signal. The PHASE_3 precedent is particularly decisive: it demonstrates that MAP2K1's mechanistic relevance has survived clinical translation, whereas FGFR2 lacks any melanoma clinical footprint, remaining a first-in-class stratification risk on this target axis alone.", "decisive_evidence": ["Open Targets associationScore: MAP2K1 = 0.683 vs FGFR2 = 0.545 (multi-modal aggregated evidence)", "Clinical precedent: MAP2K1 has PHASE_3 programme in cutaneous melanoma (Open Targets drugAndClinicalCandidates); FGFR2 has zero clinical footprint in melanoma", "Pathway depth: MAP2K1 sits on Signaling by MAP2K mutants and Negative feedback regulation of MAPK pathway\u2014both directly implicated in melanoma somatic genetics; FGFR2 sits on PI3K/AKT cascade (secondary effector pathway)", "Loss-of-function constraint: both constrained (LOEUF 0.32 and 0.19), confirming mechanistic essentiality; MAP2K1's narrower knockout footprint (24 vs 280 phenotypes) suggests sharper target specificity without sacrificing causal signal"], "missing_evidence": ["Somatic mutation frequency and hotspot specificity in melanoma tumours for FGFR2 (vs MAP2K1's established BRAF/NRAS co-occurrence patterns)", "Functional perturbation studies (RNAi/CRISPR) in melanoma cell lines to confirm on-target dependency for FGFR2", "Human genetic evidence (GWAS, rare variants) linking FGFR2 variants to melanoma risk or progression (MAP2K1 has established pathway-level genetic support)"]}, "right_tissue": {"axis": "right_tissue", "relation": "A_better", "confidence": "medium", "rationale": "Both hypotheses explicitly acknowledge that single-cell tissue specificity (tau) and malignant-vs-stromal fraction are unmeasured and synthetic. However, Hypothesis A posits a 'sharply tumour-restricted' expression pattern based on focal amplification, while Hypothesis B posits only 'moderately specific' expression inherited from pathway context. On the right_tissue axis, which requires presence, activity, and disease-relevance in the correct cell type and malignant context, A's sharply restricted prior is materially stronger than B's moderate specificity assumption. A's focal amplification pattern provides a mechanistic anchor for tumour-cell selectivity, whereas B's pathway-context inheritance is more indirect and less disease-context-specific. Both carry equal confidence (0.4) and both are synthetic, but A's designed prior is more aligned with the axis definition (malignant-vs-stromal discrimination). Notably, neither has curated single-cell or spatial evidence, so neither achieves high confidence; the advantage is modest and conditional on A's amplification assumption holding.", "decisive_evidence": ["H_A right_tissue prior: 'sharply tumour-restricted' based on focal amplification pattern, value 0.82", "H_B right_tissue prior: 'moderately specific' inherited from downstream BRAF pathway context, value 0.6", "H_A explicitly links to tumour-cell-restricted expression via focal amplification", "H_B's specificity is pathway-inherited, not disease-tissue-specific"], "missing_evidence": ["Single-cell tau (tissue specificity metric) for both targets in melanoma", "Malignant-vs-stromal expression fraction for both targets in disease tissue", "Spatial transcriptomics or in-situ hybridization in melanoma tumours", "Disease-state-specific expression (normal skin vs. melanoma)", "Cell-type specificity within melanoma microenvironment (tumour vs. stromal vs. immune)"]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "medium", "rationale": "Hypothesis B (MAP2K1 small-molecule) shows a materially lower safety risk than Hypothesis A (FGFR2 ADC) on the basis of knockout phenotype breadth and absence of curated safety liabilities. FGFR2 carries 280 distinct mouse-knockout phenotypes\u2014indicative of a broad developmental/essential role with high on-target toxicity risk in normal tissues\u2014whereas MAP2K1 has only 24 phenotypes, suggesting a narrower functional footprint. Both genes are LoF-constrained (FGFR2 LOEUF=0.19 vs MAP2K1 LOEUF=0.32), but FGFR2's tighter constraint combined with its developmental liabilities (absent lungs, abnormal bone/inner-ear morphology) point to a narrower therapeutic window. The ADC modality (A) does offer tumor-selective delivery, which could mitigate systemic toxicity if tissue specificity is proven; however, neither hypothesis has measured single-cell tissue distribution, and A explicitly frames safety as 'a headwind.' MAP2K1's phenotype profile (trophoblast morphology, cranium length, astrocyte number) is less indicative of developmental essentiality, and its clinical precedent (Phase 3 small-molecule approved drug in melanoma) provides real-world tolerability data that A lacks. Both are unmeasured on tissue specificity (tau), but B's lower knockout footprint and absence of severe developmental phenotypes make it the safer starting point.", "decisive_evidence": ["FGFR2: 280 distinct mouse-knockout phenotypes including absent lungs, abnormal frontal bone, abnormal membranous labyrinth\u2014indicative of broad developmental role.", "MAP2K1: 24 distinct mouse-knockout phenotypes with no severe developmental phenotypes\u2014narrower functional footprint.", "MAP2K1 has an approved small-molecule drug in melanoma (Phase 3 clinical precedent), providing real-world safety/tolerability data.", "FGFR2 explicitly characterized as requiring tumour-selective delivery to offset on-target toxicity risk due to narrow therapeutic window.", "Both genes LoF-constrained, but FGFR2 LOEUF (0.19) tighter than MAP2K1 (0.32), exacerbating toxicity risk."], "missing_evidence": ["Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets\u2014critical to assess whether ADC's tumor-selective delivery (A) adequately mitigates FGFR2's broad knockout phenotype.", "Specific adverse event profile or pharmacokinetic/pharmacodynamic data from the MAP2K1 Phase 3 programme.", "Dose-limiting toxicity thresholds or maximum tolerated dose data for either target in the melanoma indication.", "Organ-specific expression profiling (kidney, liver, GI, nervous system) to assess off-target or tissue-specific toxicity risk."]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B has established clinical precedent (PHASE_3 programme in melanoma for MAP2K1), which directly validates that a treatable patient population exists and that stratification/endpoint risks are largely retired. Hypothesis A lacks any clinical footprint in melanoma for FGFR2, meaning both the patient population definition and enrichment biomarker would need to be established de novo, carrying first-in-class stratification risk. On the right_patient axis specifically\u2014which prioritizes defined patient populations, biomarkers, clinical precedent, and plausible therapeutic benefit\u2014B's demonstrated clinical pathway is materially stronger than A's unproven population. Both hypotheses acknowledge their biomarker stratum as synthetic, but B's patient-population definition is grounded in real clinical data, whereas A's is entirely synthetic.", "decisive_evidence": ["B has PHASE_3 clinical precedent for MAP2K1 in melanoma (from Open Targets drugAndClinicalCandidates); A has zero clinical footprint for FGFR2 in melanoma.", "B's confidence in right_patient axis is 0.7 (supported by clinical evidence); A's confidence is 0.4 (neutral, synthetic).", "B's interpretation explicitly states 'an existing PHASE_3 programme means the stratification and endpoint risk is largely retired'; A's interpretation states 'first-in-class stratification risk' with no clinical footprint.", "Both acknowledge biomarker stratum as synthetic, but B starts from a validated patient population; A must establish one from scratch."], "missing_evidence": ["Explicit biomarker enrichment strategy for B (which MAP2K1-mutant or pathway-altered subpopulation is the PHASE_3 trial enriching?).", "Unmet medical need quantification for both hypotheses (e.g., prevalence of FGFR2-driven vs MAP2K1-driven melanoma, clinical response rates to existing therapies in each stratum).", "Patient-reported outcomes or quality-of-life endpoints, which would strengthen the 'meaningful endpoints' criterion.", "Real-world comparative efficacy or safety data from the B PHASE_3 trial to confirm whether the therapeutic benefit is durable."]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses target crowded, well-trodden melanoma targets and must differentiate through modality, payload, or indication niche rather than target novelty. However, Hypothesis B (MAP2K1 small-molecule) has a decisive commercial advantage: an approved small-molecule precedent exists, meaning the modality is de-risked, chemistry is proven, and regulatory pathway is known. This substantially strengthens the commercial position by reducing development risk and enabling faster market entry through either extension, combination, or biomarker-stratified repositioning strategies. Hypothesis A (FGFR2 ADC) faces higher modality risk\u2014no clinical validation for FGFR2 as an ADC target\u2014and must justify commercial differentiation through payload innovation or niche indication alone, a higher bar in a crowded space. Both report synthetic/low-confidence competitor data, so explicit whitespace measurement is absent; neither has a clear competitive moat on the target itself. The tie-breaker is tractability-to-market and de-risking.", "decisive_evidence": ["B: Approved drug precedent for MAP2K1 small-molecule (Open Targets drugAndClinicalCandidates, PHASE_3 stage) eliminates modality discovery risk and validates chemistry feasibility.", "B: Tractability = 0.9 (Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, Druggable Family) vs. A: Tractability = 0.6 (AB-modality buckets only); precedent de-risks the commercial path.", "A & B: Both acknowledge crowded target landscape and report synthetic competitor/whitespace data; neither has a clear target-level differentiation advantage.", "A: ADC modality for FGFR2 carries first-in-class validation risk for this target (no melanoma FGFR2 clinical footprint); must differentiate via payload or niche, not modality precedent."], "missing_evidence": ["Explicit competitor count, market size, and whitespace quantification for both hypotheses (both acknowledge this as 'synthesised').", "Payload/linker IP or innovation landscape for A's ADC strategy\u2014is the differentiation credible?", "Approved small-molecule competitor list for B\u2014is MAP2K1-targeted therapy landscape saturated (which it likely is)?", "Biomarker-stratified indication niche assessment: does B's PHASE_3 programme already cover the likely commercial subpopulation, or is there room for a differentiated entry?", "Regulatory pathway clarity: does A face higher filings burden (first ADC + first target) vs. B (line extension or combination play on approved target)?"]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K1 + small_molecule) demonstrates substantially higher tractability than Hypothesis A (FGFR2 + ADC) on direct, modality-specific grounds. B satisfies the strongest tractability buckets: Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, and Druggable Family (confidence 0.9). This represents a complete de-risking precedent\u2014an approved small-molecule drug already exists, meaning chemistry feasibility, ligand quality, pocket definition, and developability are all empirically validated. A satisfies weaker tractability criteria: Advanced Clinical, GO CC high conf, UniProt localization medium conf, and signal peptide/transmembrane prediction (confidence 0.9). While A meets the bars for an ADC modality to be credible, it lacks direct modality precedent or approved-drug validation for FGFR2 + ADC. ADCs are inherently more complex (requiring linker chemistry, payload conjugation, and tumor-selective delivery), and this complexity is not offset by structural or ligand precedent. The key distinction is that B can lean on an existing clinical programme's chemistry and binding data, whereas A must establish both ligand binding and ADC-specific engineering de novo. Both hypotheses report high confidence (0.9) in their tractability findings, but B's evidence is rooted in approved-drug precedent\u2014the gold standard for feasibility\u2014while A's is based on computational prediction of druggability. On the tractability axis alone, precedent and proven chemistry substantially outweigh computationally-inferred tractability.", "decisive_evidence": ["B reports Approved Drug status in Open Targets, an empirical validation that small-molecule modulation of MAP2K1 in melanoma is already clinically proven.", "B lists Structure with Ligand, High-Quality Ligand, High-Quality Pocket, Druggable Family\u2014all direct evidence of ligand precedent and structural tractability.", "A reports only Advanced Clinical, GO CC, and UniProt annotations\u2014computational and sequence-based predictions, not empirical ligand or approved-drug precedent.", "ADC modality (A) requires linker chemistry, payload conjugation, and tumor-selective delivery layered on top of ligand binding; small-molecule modality (B) is simpler and already has approved-drug validation.", "Both report confidence 0.9, but B's confidence is grounded in approved-drug data (direct evidence); A's is grounded in Open Targets tractability buckets (computational criteria)."], "missing_evidence": ["Detailed structural or crystallographic data for FGFR2 (A) to assess binding pocket depth, shape, and ligandability directly.", "Specific approved small-molecule name and its mechanism for MAP2K1 (B) to confirm it is a kinase inhibitor and not a non-canonical modality.", "ADC precedent specifically for FGFR2 (A) to determine whether the target has been successfully validated in any ADC context, even outside melanoma.", "Comparative assay readout quality and developability for A vs B (e.g., biochemical vs cellular assay feasibility for FGFR2 ligand screening)."]}}}, {"hypothesis_a": "H12", "hypothesis_b": "H3", "relation": "tradeoff_or_unresolved", "dominator": null, "dominated": null, "comparison_summary": {"overall_relation": "tradeoff_or_unresolved", "strictly_better_axes_for_A": [], "strictly_better_axes_for_B": ["right_target", "right_safety", "right_patient", "right_commercial", "tractability"], "tied_axes": [], "unresolved_axes": ["right_tissue"], "reason": "incomparable_axes"}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "On the right_target axis, Hypothesis B (MAP2K2) demonstrates materially stronger causal and mechanistic support for cutaneous melanoma than Hypothesis A (FGFR2). The decisive evidence is: (1) Open Targets disease association score is higher for MAP2K2 (0.658 vs 0.545), aggregating genetic, somatic, literature, and known-drug evidence across multiple modalities. (2) Genetic constraint data favors B: MAP2K2's LOEUF of 0.61 (tolerant range) vs FGFR2's LOEUF of 0.19 (constrained tail). While constraint per se does not prove target causality, the tolerant profile for MAP2K2 argues against broad essential-gene artifacts and supports a cleaner causal signal, whereas FGFR2's high constraint raises on-target toxicity concerns that complicate the mechanistic picture. (3) Both targets sit on relevant pathways (PI3K/AKT for FGFR2; MAPK/ERK for MAP2K2), but MAP2K2's pathway role (Signaling by MAP2K mutants, Negative feedback regulation of MAPK pathway) is more directly implicated in melanoma biology via the BRAF-MEK-ERK axis, which is the established molecular driver of melanoma. (4) Clinical precedent: MAP2K2 has a PHASE_3 programme in melanoma, providing real-world validation that the target is mechanistically and pathologically sound in this disease. FGFR2 has no such clinical footprint. This is not a popularity signal but rather evidence that the target-disease pair has survived early go/no-go filtering based on mechanistic data. The higher association score and cleaner genetic constraint profile for MAP2K2, combined with the MAPK pathway's primacy in melanoma oncobiology and clinical validation, indicate B has stronger causal support.", "decisive_evidence": ["Open Targets associationScore: MAP2K2 0.658 vs FGFR2 0.545 (aggregates genetic, somatic, literature, drug evidence)", "Genetic constraint (LOEUF): MAP2K2 0.61 (tolerant) vs FGFR2 0.19 (constrained); tolerance favors cleaner target signal", "Pathway primacy: MAP2K2 sits on BRAF-MEK-ERK axis, the canonical MAPK driver in melanoma; FGFR2 on PI3K/AKT (secondary pathway in melanoma)", "Clinical validation: MAP2K2 has PHASE_3 programme in melanoma; FGFR2 has no clinical footprint, de novo stratification risk"], "missing_evidence": ["Somatic mutation frequency and hotspot data in melanoma tumors for both targets (would strengthen or weaken causal inference)", "Cell-line dependency screening data (e.g., DepMap) for MAP2K2 vs FGFR2 across melanoma models", "Patient-derived xenograft or in vivo perturbation data showing target-specific growth inhibition in melanoma", "Functional evidence of pathway sufficiency: does MAP2K2 inhibition phenocopy BRAF/RAF1 inhibition in melanoma cells?"]}, "right_tissue": {"axis": "right_tissue", "relation": "incomparable", "confidence": "high", "rationale": "Both hypotheses explicitly state that single-cell tissue specificity (tau) and malignant-vs-stromal fraction are NOT available from Open Targets. Both rely on designed priors rather than measured evidence. Hypothesis A assumes FGFR2 is 'sharply tumour-restricted' (0.82, designed prior based on focal amplification pattern), while Hypothesis B assumes MAP2K2 is 'moderately specific' (0.58, pathway-contextual specificity). These are directionally opposite synthetic assumptions about the same unmeasured axis, making them incomparable without actual single-cell profiling or spatial transcriptomics data. The focal amplification pattern cited for FGFR2 is plausible but still indirect; the 'pathway-contextual specificity' for MAP2K2 is even more generic. Neither hypothesis provides direct evidence of target presence, activity, or disease-relevance in the malignant compartment vs. stromal compartment, nor evidence specific to cutaneous melanoma tissue state. Both correctly identify single-cell profiling as the highest-value experiment to resolve this axis, but until that experiment is performed, the two priors cannot be fairly ordered\u2014they rest on different mechanistic intuitions (amplification vs. pathway context) that are incommensurable without data.", "decisive_evidence": ["Both hypotheses explicitly state: 'Single-cell tissue specificity (tau) and malignant-vs-stromal fraction are NOT available from Open Targets.'", "H_A prior: 'sharply tumour-restricted' (0.82) based on focal amplification pattern (indirect, structural inference).", "H_B prior: 'moderately specific' (0.58) based on pathway-contextual specificity (indirect, functional inference).", "Both assign confidence 0.4 to their right_tissue value, acknowledging synthetic design.", "Both identify single-cell tau + malignant-fraction profiling as tier-3 highest-VoI experiment."], "missing_evidence": ["Single-cell RNA-seq or protein expression profiling in cutaneous melanoma tissue, stratified by malignant vs. stromal/immune/endothelial compartments.", "Spatial transcriptomics or immunofluorescence mapping of FGFR2 and MAP2K2 in primary melanoma samples and metastases.", "Disease-state specificity: expression in benign nevi vs. primary melanoma vs. metastatic melanoma.", "Patient-level enrichment biomarker: which melanoma subtypes (BRAF-mutant, NRAS-mutant, NF1-mutant, WT) show highest target expression in malignant cells?", "Single-cell malignant-cell fraction estimates for both targets in the same cohort."]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K2) demonstrates a materially stronger safety profile than Hypothesis A (FGFR2) on the right_safety axis. The decisive differentiator is the breadth and severity of knockout phenotypes: FGFR2 has 280 distinct mouse-knockout phenotypes including severe developmental defects (absent lungs, abnormal frontal bone morphology), whereas MAP2K2 has only 4 phenotypes with minimal severity (no abnormal phenotype detected in one model, mild gait/hematologic changes in others). Both targets have zero curated safety liabilities, but the knockout data strongly suggest FGFR2 has a broad essential role with high on-target toxicity risk in normal tissues, while MAP2K2 shows a much narrower and milder knockout footprint. The genetic constraint data reinforce this: MAP2K2's LOEUF of 0.61 (tolerant range) indicates LoF is well-tolerated in the population, whereas FGFR2's LOEUF of 0.19 (constrained tail) flags intolerance to LoF and raises an on-target-toxicity concern. For an ADC (A), the safety margin is narrower because even with tissue-selective delivery, any leakage or bystander exposure to normal FGFR2-expressing tissues carries toxicity risk given the 280-phenotype signature. For a small-molecule (B), the modality does not intrinsically protect normal tissue, but the 4-phenotype knockout footprint and population-tolerant constraint suggest a wider therapeutic window. Both hypotheses correctly identify that their tissue specificity is unmeasured and equally high-value to resolve, so tissue specificity does not break the safety comparison\u2014the knockout and constraint data are sufficient and direct.", "decisive_evidence": ["FGFR2: 280 distinct mouse-knockout phenotypes including severe developmental defects (absent lungs, abnormal frontal bone morphology, abnormal membranous labyrinth morphology)", "MAP2K2: 4 distinct mouse-knockout phenotypes, predominantly mild or absent (no abnormal phenotype detected, abnormal gait, increased mean corpuscular volume)", "FGFR2 LOEUF (o/e) = 0.19 (constrained tail), flagging intolerance to loss-of-function and raising on-target-toxicity risk", "MAP2K2 LOEUF (o/e) = 0.61 (tolerant range), indicating LoF is well-tolerated in population genetics", "Both targets: 0 curated safety liabilities (tie on this dimension)"], "missing_evidence": ["Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets\u2014both hypotheses correctly identify this as unmeasured and high-VoI; however, this does not alter the safety axis comparison because knockout phenotype breadth and genetic constraint are direct proxies for developmental/essential role and broad toxicity risk", "Tissue-specific knockout or conditional-knockout data for FGFR2 to partition developmental vs. adult homeostatic liabilities", "Clinical safety data from any approved or late-stage drugs targeting FGFR2 or MAP2K2 (the latter has PHASE_3 precedent, which could provide real-world safety signals, though the hypothesis does not report them explicitly)"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K2) has a decisive advantage on the right_patient axis due to documented clinical precedent, while Hypothesis A (FGFR2) must establish patient stratification de novo. B reports a real PHASE_3 clinical programme in melanoma, meaning a treatable patient population is already defined and the endpoint/stratification risk is substantially retired. The remaining question for B is only biomarker enrichment within an established population. In contrast, A has zero melanoma clinical footprint, carrying first-in-class stratification risk and requiring both patient population definition and biomarker discovery from the ground up. Both hypotheses acknowledge their biomarker_stratum as synthetic, but B's foundation rests on proven clinical reality while A's rests on unproven theory. B's confidence (0.7) reflects real clinical data; A's confidence (0.4) reflects synthetic reasoning. On the axis of patient impact and clinical relevance\u2014defined patient populations, clinical precedent, and plausible therapeutic benefit\u2014B is clearly stronger.", "decisive_evidence": ["B reports PHASE_3 clinical precedent for MAP2K2 in melanoma (Open Targets drugAndClinicalCandidates), establishing a real treatable patient population.", "A reports zero melanoma clinical footprint for FGFR2, requiring de novo patient stratification and biomarker discovery.", "B's right_patient confidence is 0.7 (grounded in clinical data); A's is 0.4 (grounded in synthetic reasoning).", "B's interpretation explicitly states 'stratification and endpoint risk is largely retired'; A's states 'first-in-class stratification risk.'"], "missing_evidence": ["Specific biomarker for B's PHASE_3 population (noted as synthetic placeholder in both).", "Clinical failure or success rate for the B PHASE_3 programme (maturity and likelihood of eventual approval unknown).", "Whether A's FGFR2 has any clinical data in other cancers that could inform melanoma stratification.", "Unmet need magnitude comparison: which patient population faces higher unmet medical need?"]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses target well-trodden, crowded genes in melanoma (FGFR2 and MAP2K2), so neither enjoys whitespace from the target itself. However, Hypothesis B (MAP2K2 / small-molecule) has a decisive commercial advantage: an existing Phase 3 clinical precedent and an approved drug in the same modality-target space. This de-risks the patient population, indication niche, and regulatory pathway, creating a clearer market opportunity. Hypothesis A (FGFR2 / ADC) must differentiate on modality novelty (ADC vs. prior small-molecule attempts) and rely on unproven tissue specificity to offset broader safety liabilities and first-in-class stratification risk. While an ADC modality could theoretically offer differentiation, it is speculative without clinical validation for FGFR2. B's established clinical footprint and lower on-target toxicity risk (LOEUF 0.61 vs. 0.19, 4 KO phenotypes vs. 280) translate to a more attractive and lower-risk commercial position.", "decisive_evidence": ["B has Phase 3 clinical precedent for MAP2K2 in melanoma; A has none for FGFR2 in melanoma (first-in-class risk).", "B's LOEUF = 0.61 (LoF-tolerant); A's LOEUF = 0.19 (LoF-constrained), implying narrower therapeutic window for A and higher on-target toxicity risk.", "B has 4 mouse-KO phenotypes with no dominant liability; A has 280 phenotypes and abnormal developmental morphology, signaling broad essential-gene role.", "Both targets are crowded; neither enjoys whitespace. Differentiation for A must come from novel ADC payload/delivery; differentiation for B is already partly achieved via clinical validation and safety profile."], "missing_evidence": ["Explicit competitor count and active clinical programs for each target-modality pair (would quantify crowding more directly).", "Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets (both are unmeasured; A's prior is sharply tumour-restricted while B's is moderately specific\u2014if A's holds, it could narrow the gap, but this remains hypothesis).", "Detailed commercial landscape: pricing power, reimbursement precedent, and unmet need depth for MAP2K2 small-molecule vs. novel FGFR2 ADC in melanoma.", "Real-world clinical outcome data or efficacy signal from the Phase 3 MAP2K2 program (to confirm whether B's clinical advantage translates to commercial viability)."]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K2 + small_molecule) demonstrates substantially higher tractability than Hypothesis A (FGFR2 + ADC) on direct, experimentally grounded criteria. B satisfies all five highest-tier small_molecule tractability buckets including Approved Drug and Structure with Ligand\u2014meaning clinical precedent exists, chemistry is de-risked, and binding pockets are structurally validated. In contrast, A satisfies only basic AB-modality (ADC) tractability criteria (pocket presence, localization signals) without clinical validation or approved precedent for FGFR2-targeted ADCs in melanoma. The Open Targets tractability confidence is high (0.9) for both, but B's evidence base is richer: an existing PHASE_3 clinical programme for MAP2K2 in melanoma directly proves modality-target fit and downstream developability. A's ADC approach, while credible in principle, lacks such validation. B also benefits from a superior safety profile (280 vs. 4 mouse-knockout phenotypes; LOEUF 0.61 vs. 0.19), which improves the feasibility of achieving adequate therapeutic windows without compensatory delivery tricks. The only tractability-relevant caveat for B is that small-molecule MEK inhibitors carry known mechanisms of feedback activation and potential acquired resistance, but this is a mature, well-characterized liability rather than an unknown modality risk. A's dependence on tumour-selective ADC delivery to offset broad developmental toxicity introduces additional manufacturing and PK complexity not offset by any compensating strength.", "decisive_evidence": ["MAP2K2 has an approved small_molecule drug in melanoma (PHASE_3 precedent), directly proving modality-target chemistry feasibility; FGFR2 has no such clinical validation for ADCs", "MAP2K2 satisfies all five highest-tier SM tractability buckets (Approved Drug, Structure with Ligand, High-Quality Ligand/Pocket, Druggable Family); FGFR2 satisfies only basic AB-modality criteria without approved precedent", "MAP2K2 LOEUF 0.61 (LoF tolerant) vs. FGFR2 LOEUF 0.19 (LoF constrained), reducing on-target toxicity risk and improving therapeutic window feasibility for small_molecule vs. ADC", "MAP2K2 mouse-knockout footprint is minimal (4 phenotypes, mostly benign); FGFR2 shows 280 phenotypes including developmental defects, increasing complexity of selective delivery required for ADC"], "missing_evidence": ["Comparative ligand-binding kinetics and off-target selectivity profiles for FGFR2-targeting ADCs vs. MAP2K2 small_molecule inhibitors (would refine modality feasibility)", "ADC linker/payload optimization landscape for FGFR2: whether existing linker chemistries and warheads are empirically viable or if novel payload engineering is required", "Tissue penetration and bystander killing tolerability for FGFR2-ADC in the context of melanoma architecture (would inform delivery feasibility relative to small_molecule)"]}}}, {"hypothesis_a": "H12", "hypothesis_b": "H11", "relation": "tradeoff_or_unresolved", "dominator": null, "dominated": null, "comparison_summary": {"overall_relation": "tradeoff_or_unresolved", "strictly_better_axes_for_A": ["right_safety", "tractability"], "strictly_better_axes_for_B": ["right_tissue"], "tied_axes": ["right_target", "right_patient", "right_commercial"], "unresolved_axes": [], "reason": "both_sides_have_advantages"}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "tie", "confidence": "high", "rationale": "Both FGFR2 and NTRK1 show virtually identical strength of causal and mechanistic support for melanoma relevance. The Open Targets disease association scores are nearly equivalent (0.545 vs 0.546), both draw from multi-modal evidence (genetic, somatic, literature, known-drug data), and both occupy established positions in well-characterized signaling pathways (PI3K/AKT cascade for FGFR2; RAS/p38 signaling for NTRK1). The decisive distinction lies in genetic constraint: FGFR2 has LOEUF o/e=0.19 (constrained, suggesting LoF intolerance and mechanistic essentiality), while NTRK1 has LOEUF o/e=0.77 (tolerant, suggesting LoF is common in the population without phenotypic consequence). However, this constraint differential speaks to on-target safety and mechanistic resilience\u2014not to the strength of the causal link to melanoma itself. For the specific axis 'right_target' (causal and mechanistic support that the target is relevant to disease), both hypotheses present equivalent evidence density and quality. Neither has clinical precedent in melanoma, and both rely on integrated Open Targets evidence rather than disease-specific human genetics or somatic mutation data unique to melanoma. The constraint signal argues that NTRK1 may be a more robust target mechanistically (less essential for normal tissue function), but that is a safety and tractability advantage, not a right_target advantage.", "decisive_evidence": ["Open Targets association score: A=0.545, B=0.546 (effectively equivalent)", "Multi-modal evidence basis for both: genetic, somatic, literature, drug precedent", "Both targets sit on well-characterized melanoma-relevant pathways (PI3K/AKT and RAS/p38 respectively)", "LOEUF constraint differs (A=0.19 constrained vs B=0.77 tolerant) but this is a mechanism-resilience signal, not a target-relevance signal"], "missing_evidence": ["Human genetic evidence (GWAS, rare variants) specifically linking FGFR2 or NTRK1 to melanoma risk or somatic driver mutations in melanoma cohorts", "Somatic mutation frequency or clonality data in melanoma tumors for each target", "Functional perturbation data (CRISPR, RNAi) in melanoma cell lines or tumor models specific to each target", "Curated disease biology evidence distinguishing FGFR2 vs NTRK1 in melanoma pathogenesis (e.g., lineage dependency, drug sensitivity correlation)"]}, "right_tissue": {"axis": "right_tissue", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses explicitly acknowledge that single-cell tissue specificity (tau) and malignant-vs-stromal fraction are unmeasured and that their right_tissue values (0.82 for A, 0.88 for B) are synthetic priors, not empirical evidence. However, B presents a stronger tissue-specificity prior grounded in biology: NTRK1 is described as 'highly lineage-restricted expression (strong specificity prior)', a designation that reflects the gene's established neuronal developmental role and suggests naturally constrained expression in non-melanoma tissues. In contrast, A's prior for FGFR2 is inferred indirectly from 'focal amplification pattern implies tumour-cell-restricted expression'\u2014a mechanistic inference from genomic architecture rather than a direct cell-type or lineage-biology claim. While both lack direct single-cell RNA-seq, spatial transcriptomics, or disease-tissue validation, B's prior rests on more curated biological knowledge (developmental neurotrophic specificity) whereas A relies on a synthetic amplification-to-expression inference. This makes B's tissue hypothesis marginally more grounded, though both remain unmeasured and confidence is appropriately low-to-medium. Neither hypothesis presents malignant-vs-stromal fractionation evidence, disease-state-specific profiling, or patient-context validation.", "decisive_evidence": ["Hypothesis B explicitly frames NTRK1 tissue specificity as 'highly lineage-restricted expression (strong specificity prior)', grounded in the gene's known developmental neurotrophic role.", "Hypothesis A frames FGFR2 tissue specificity as inferred from 'focal amplification pattern implies tumour-cell-restricted expression'\u2014a secondary mechanistic inference rather than direct lineage biology.", "Both hypotheses explicitly state single-cell tau and malignant-fraction data are NOT available and that reported right_tissue values are synthetic designed priors."], "missing_evidence": ["Single-cell RNA-seq (tau specificity score) for both targets in melanoma tumour tissue vs. normal skin and stromal compartments.", "Malignant-cell-vs-stromal-cell fractionation of expression for both FGFR2 and NTRK1 in patient melanoma samples.", "Spatial transcriptomics or immunohistochemistry mapping of FGFR2 and NTRK1 in primary and metastatic melanoma vs. normal tissue.", "Disease-state-specific profiling (primary vs. metastatic melanoma expression patterns and cell-type associations).", "Patient stratification biomarker data (frequency and clinical correlation of FGFR2 or NTRK1 alteration/overexpression in melanoma subpopulations).", "Comparison of target expression in malignant melanoma cells vs. melanoma-associated fibroblasts, immune infiltrate, or vasculature."]}, "right_safety": {"axis": "right_safety", "relation": "A_better", "confidence": "medium", "rationale": "On the right_safety axis, Hypothesis A (FGFR2-ADC) demonstrates a materially better safety profile than Hypothesis B (NTRK1-antibody), primarily due to genetic constraint evidence and the breadth of documented toxicity signals. FGFR2 has a LOEUF (o/e) of 0.19, placing it in the constrained (loss-of-function intolerant) tail of the population distribution\u2014a flag for on-target toxicity risk. However, NTRK1 compounds this with both (1) explicitly curated safety liabilities (15 vs. 0), including severe neurological phenotypes (grey matter heterotopia, seizures), and (2) a lower but still substantial knockout phenotype burden (48 vs. 280). The quantitative safety axis scores reflect this: A assigns 0.5 (neutral) while B assigns 0.3 (refutes safety). The interpretation in both cases acknowledges narrow therapeutic windows requiring selective delivery, but NTRK1's explicit curated liabilities and neurological burden\u2014coupled with its well-characterized role in nervous system development\u2014pose a higher risk of unacceptable on-target toxicity in non-target neural tissue, even under antibody modality. The ADC modality in A offers payload selectivity that may mitigate systemic exposure, whereas the antibody modality in B provides less inherent selectivity against off-target engagement in the nervous system. Both targets lack measured single-cell tissue specificity, so the modality difference becomes more decisive.", "decisive_evidence": ["NTRK1 carries
