 15 curated safety liabilities including grey matter heterotopia, weight gain, and seizures; FGFR2 carries 0 curated liabilities.", "FGFR2 LOEUF (o/e) = 0.19 (constrained); NTRK1 LOEUF = 0.77 (tolerant)\u2014NTRK1's LoF tolerance in population data argues against developmental essentiality but does not override the explicit curated safety signal.", "NTRK1 has a well-established developmental role in central and peripheral nervous systems; systemic inhibition of a neurotrophin receptor carries inherent risk of neurotoxicity.", "ADC modality (A) permits payload-driven selectivity; antibody modality (B) relies on antigen targeting alone and offers no inherent payload selectivity to mitigate off-target neural effects."], "missing_evidence": ["Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets\u2014both acknowledge this as unmeasured and propose tier-3 profiling.", "Quantitative severity or reversibility data for the 48 NTRK1 knockout phenotypes vs. the 280 FGFR2 phenotypes\u2014phenotype count alone does not indicate clinical relevance.", "In vivo pharmacodynamic and toxicity profiles for FGFR2-ADC and NTRK1-antibody in melanoma models or normal tissue.", "Tissue-specific expression of NTRK1 in melanoma (malignant vs. stromal) to assess whether tumor-selective delivery can mitigate nervous system exposure risk.", "Dose-response and therapeutic index data for either modality in preclinical settings."]}, "right_patient": {"axis": "right_patient", "relation": "tie", "confidence": "high", "rationale": "Both hypotheses are identical on the right_patient axis. Each reports: (1) no melanoma clinical precedent in Open Targets, (2) no established patient population, (3) no enrichment biomarker, (4) both must establish stratification de novo, and (5) both carry first-in-class stratification risk. The value, confidence, direction, strength, and data origin are identical across both reports (0.35 value, 0.4 confidence, neutral direction, weak strength, hybrid data origin). Neither hypothesis has clinical footprint, defined biomarkers, meaningful clinical endpoints, or plausible therapeutic benefit anchored to a real patient population. Both are speculative on the patient axis.", "decisive_evidence": ["Both A and B: 'No melanoma clinical precedent for [FGFR2|NTRK1] in Open Targets'", "Both A and B: 'Patient population and enrichment biomarker would have to be established de novo'", "Both A and B: 'First-in-class stratification risk'", "Both A and B: right_patient value = 0.35, confidence = 0.4, strength = weak"], "missing_evidence": ["Clinical precedent or published efficacy data for either target in melanoma patients", "Defined patient subpopulations or enrichment biomarkers for either target", "Evidence of unmet need in a molecularly-defined melanoma subset", "Mechanistic link between target inhibition and meaningful clinical endpoints in melanoma", "Any differentiation in patient-level benefit or accessibility between the two approaches"]}, "right_commercial": {"axis": "right_commercial", "relation": "tie", "confidence": "medium", "rationale": "Both hypotheses report identical commercial scores (0.336) and explicitly describe their targets as well-trodden, high-association candidates in a crowded field. Both must rely on novel modality, payload, or indication niche for differentiation rather than target whitespace. However, there is a material asymmetry in modality positioning: Hypothesis A (FGFR2-ADC) proposes a modality with established clinical precedent in solid tumors and recognized payload optionality, whereas Hypothesis B (NTRK1-antibody) constrains itself to antibody-only tractability, which limits downstream commercial optionality and repositioning flexibility. Despite this modality disadvantage for B, both hypotheses carry equivalent strategic risk profiles\u2014first-in-class melanoma positioning, unproven patient enrichment, and reliance on differentiation through delivery or mechanism rather than target novelty. The data provided do not contain explicit competitor counts, market sizing, or clinical precedent analysis that would allow a clear ranking on commercial whitespace or competitive positioning. The modality asymmetry favors A slightly, but the reported commercial scores and crowded-field interpretations are materially identical, preventing a strong directional call.", "decisive_evidence": ["Both A and B report right_commercial = 0.336 with identical confidence (0.5)", "Both explicitly state targets are 'well-trodden' and in 'crowded field'", "Both require differentiation via modality, payload, or indication niche\u2014not target whitespace", "Both carry first-in-class melanoma stratification risk with no clinical precedent", "Modality optionality favors A: ADC offers broader payload and delivery flexibility vs. antibody-only (B)"], "missing_evidence": ["Explicit competitor count and clinical-stage pipeline density for FGFR2 vs. NTRK1 in melanoma", "Addressable market size and payer/commercial landscape for melanoma indication", "Precedent for ADC vs. antibody in melanoma: relative market acceptance and pricing power", "Indication niche definition and unmet-need specificity (both hypotheses claim need to stratify de novo)", "Real-world competitive positioning of existing FGFR2 and NTRK1 programs (if any) in melanoma"]}, "tractability": {"axis": "tractability", "relation": "A_better", "confidence": "medium", "rationale": "Both hypotheses satisfy Open Targets AB-modality (antibody) tractability criteria and report equivalent confidence (0.9) and strength (moderate). However, Hypothesis A proposes an ADC (antibody-drug conjugate) modality, which is a more mature and clinically validated format than a naked antibody. ADCs have established precedent in oncology (>10 approved drugs, multiple melanoma-relevant payloads), whereas naked anti-NTRK1 antibodies lack direct clinical precedent in melanoma. Hypothesis B's narrative explicitly notes that 'antibody-only tractability caps the modality options,' acknowledging a constraint. Both targets have comparable structural druggability and assayability, but the ADC modality in A offers a more developed path to developable molecules and delivery feasibility. This advantage is modest\u2014both are feasible\u2014but measurable on the modality-tractability axis.", "decisive_evidence": ["Hypothesis A employs ADC modality, which has direct clinical precedent in oncology and melanoma contexts.", "Hypothesis B employs naked antibody modality, which lacks direct NTRK1 melanoma clinical precedent.", "Both targets satisfy Open Targets AB-modality tractability buckets with equal confidence (0.9).", "Hypothesis B narrative states 'antibody-only tractability caps the modality options,' flagging inherent modality limitation.", "ADC payloads and linker chemistry are mature; naked anti-NTRK1 efficacy requires robust membrane expression and Fc-mediated mechanisms (less precedent)."], "missing_evidence": ["Direct structural/crystallographic data on FGFR2 vs. NTRK1 druggable pockets for each modality.", "Quantitative assay readiness comparison (kinetic stability, binding kinetics, cell-based assay maturity).", "Explicit ADC payload compatibility and linker stability precedent for FGFR2 (vs. generic ADC maturity).", "Naked antibody binding kinetics and Fc-effector function data for NTRK1.", "In vitro developability metrics (solubility, stability, manufacturability) for each lead molecule."]}}}, {"hypothesis_a": "H14", "hypothesis_b": "H1", "relation": "tradeoff_or_unresolved", "dominator": null, "dominated": null, "comparison_summary": {"overall_relation": "tradeoff_or_unresolved", "strictly_better_axes_for_A": ["right_safety"], "strictly_better_axes_for_B": ["right_target", "right_tissue", "right_patient", "right_commercial", "tractability"], "tied_axes": [], "unresolved_axes": [], "reason": "both_sides_have_advantages"}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "Both hypotheses present strong, multi-modal causal support for their respective targets in cutaneous melanoma. However, Hypothesis B (BRAF) has materially stronger evidence on the right_target axis. BRAF shows a higher Open Targets association score (0.701 vs 0.544), reflecting aggregated genetic, somatic, and clinical evidence. Critically, BRAF harbors somatic driver mutations (BRAF V600E) that are defining features of the melanoma subtype\u2014this is direct somatic-genetic causality, not inferred from pathway participation alone. ATR, by contrast, is a housekeeping DNA damage checkpoint kinase with no melanoma-specific genetic alterations reported; its relevance is inferred through pathway membership (TP53, Fanconi Anemia, homologous recombination) rather than direct driver status. Additionally, BRAF's LoF constraint (LOEUF 0.15, constrained tail) is tighter than ATR's (LOEUF 0.45, tolerant range), which actually strengthens the mechanistic causality signal for BRAF\u2014loss-of-function intolerance in the population supports essentiality in normal cells, while the somatic gain-of-function in melanoma provides tumor-specific relevance. ATR's tolerant LoF profile (0.45) is weaker evidence for disease causality, as it suggests the gene is not tightly constrained in normal development. The clinical precedent strongly favors B: BRAF has a Phase 3 clinical candidate (vemurafenib and successors are approved), proving that the target supports a treatable patient population with measurable biomarker enrichment (BRAF V600 mutation status). ATR has zero melanoma clinical precedent. On the right_target axis specifically, somatic driver mutations, genetic constraint patterns consistent with essentiality, and clinical proof-of-concept are stronger evidence than pathway annotation and literature association alone.", "decisive_evidence": ["BRAF V600E is a defining somatic driver mutation in ~50% of cutaneous melanoma (direct somatic-genetic causality); ATR has no known melanoma-specific driver mutations.", "BRAF association score 0.701 vs ATR 0.544 (Open Targets, multi-modal aggregation).", "BRAF LoF constraint (LOEUF 0.15, constrained) supports mechanistic essentiality; ATR LoF constraint (LOEUF 0.45, tolerant) weakens causality inference.", "BRAF has Phase 3 clinical precedent in melanoma (vemurafenib approved); ATR has zero clinical precedent in melanoma or any indication.", "BRAF sits on gain-of-function pathway (Gain-of-function MRAS complexes activate RAF signaling), aligned with somatic oncogenic mutations; ATR is a housekeeping checkpoint kinase without tumor-specific pathway context."], "missing_evidence": ["Quantitative somatic mutation frequency and clonality data for ATR in melanoma cohorts (to rule out passenger or subclonal status).", "Functional perturbation studies (CRISPR, RNAi) demonstrating ATR dependency in BRAF-mutant vs wild-type melanoma cell lines.", "Patient stratification biomarker (beyond BRAF V600 status) that would identify ATR-dependent melanoma subsets.", "Comparative dependency analysis across melanoma genetic backgrounds (BRAF, NRAS, NF1, triple-WT)."]}, "right_tissue": {"axis": "right_tissue", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses lack direct, measured single-cell or spatial evidence for tissue specificity and malignant-vs-stromal fraction in melanoma\u2014the unmeasured core of the right_tissue axis. However, they differ materially in their *priors* about target biology. Hypothesis B (BRAF) rests on a moderately-specific prior: BRAF is the definitional oncogenic driver in mutant-BRAF melanoma, a well-established disease context that constrains the hypothesis to malignant cells with BRAF mutations. This context-specificity (even if unproven by single-cell data) materially increases the plausibility that BRAF inhibition would act preferentially in the disease tissue. Hypothesis A (ATR) rests on a broad, non-specific prior: ATR is a housekeeping replication-stress kinase with no tumor restriction. This means ATR is expected to be active in many normal tissues as well as tumor, making it harder to achieve selective disease-tissue engagement without additional modality tricks (e.g., tumor-selective delivery). Neither hypothesis provides measured evidence, but B's synthetic prior is more aligned with the disease tissue (melanoma mutations) than A's broad, non-specific prior. This represents a modest but meaningful advantage for B on the right_tissue axis.", "decisive_evidence": ["Hypothesis B: BRAF is the definitional oncogenic driver in mutant-BRAF melanoma\u2014a well-established malignant-cell context that contextualizes tissue specificity to the disease state.", "Hypothesis A: ATR is a housekeeping replication-stress kinase with no tumor restriction\u2014a broad, non-specific prior that dilutes tissue specificity and requires compensatory modality strategies.", "Both: single-cell tau and malignant-vs-stromal fractions are unmeasured; both are flagged as tier-3 experiments with highest VoI."], "missing_evidence": ["Single-cell RNA-seq or spatial transcriptomics measuring ATR and BRAF expression (tau) in melanoma vs. normal skin, with explicit malignant-vs-stromal cell-type fractionation.", "Immunohistochemistry or flow cytometry quantifying target protein levels in primary melanoma tumors vs. adjacent normal tissue.", "Disease-state specificity: whether ATR and BRAF are enriched or suppressed in metastatic vs. primary vs. normal melanocytes.", "Patient-stratified tissue profiling: comparison of ATR/BRAF expression in BRAF-mutant vs. BRAF-wild-type melanomas.", "Single-cell profiling data distinguishing malignant, stromal, and immune compartments in melanoma tissue."]}, "right_safety": {"axis": "right_safety", "relation": "A_better", "confidence": "medium", "rationale": "ATR exhibits a marginally superior safety profile compared to BRAF on the narrow criterion of on-target toxicity risk. ATR has 0 curated safety liabilities versus BRAF's 1 (heart disease), and while ATR shows 70 mouse-KO phenotypes versus BRAF's 77, the absolute difference is modest. The decisive factor is that BRAF carries an explicit, curated cardiac liability\u2014a serious organ-system risk in a disease (melanoma) treated in patients with variable baseline cardiovascular health. Both targets are broadly expressed, essential-like genes with narrow therapeutic windows, but BRAF's catalogued cardiac hazard represents an additional, foreseeable on-target toxicity burden that ATR does not carry in the curated record. Neither target achieves a high safety value (A: 0.708, B: 0.512), and both require tumor-selective delivery or dosing to mitigate systemic toxicity; however, ATR avoids the documented cardiac-specific liability. The confidence is medium rather than high because (1) mouse-KO phenotypes are correlative and do not guarantee human toxicity, (2) 70 vs. 77 phenotypes is a small absolute difference, and (3) both targets remain safety headwinds that may be offset by superior tissue selectivity (unmeasured) or by modality-specific mitigations.", "decisive_evidence": ["BRAF carries 1 curated safety liability (heart disease); ATR carries 0 curated liabilities.", "Cardiac toxicity is a serious, organ-level hazard in melanoma patients, many of whom are elderly or have comorbidities.", "ATR mouse-KO phenotypes (70) are numerically lower than BRAF (77), suggesting marginally less pleiotropic essentiality.", "Both targets exhibit broad expression and essentiality; the difference is incremental, not categorical."], "missing_evidence": ["Human safety data (clinical trials, pharmacovigilance) for ATR and BRAF inhibitors in melanoma or any indication.", "Tissue-level selectivity (single-cell tau, malignant-fraction) for both targets\u2014critical to assessing whether tumour-selectivity can rescue the narrow therapeutic window.", "Dose-response curves and maximum-tolerated-dose (MTD) data from preclinical or early clinical work.", "Mechanism of the BRAF cardiac liability: is it on-target (BRAF in cardiomyocytes) or off-target (kinase selectivity issue), and is it reversible?", "Comprehensive safety liability curation for ATR (only 0 curated, but mouse phenotypes number 70; gap between curation and phenotype may hide additional risks)."]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (BRAF) demonstrates established patient population definition and clinical precedent, while Hypothesis A (ATR) requires de novo stratification. BRAF has a Phase 3 clinical programme in melanoma with a defined, treatable patient population\u2014this directly addresses the core question of 'right patient' by providing real-world evidence that melanoma patients respond to BRAF inhibition. The biomarker stratum is known (BRAF-mutant melanoma is the canonical driver context). In contrast, ATR lacks any clinical footprint in melanoma; both the patient population and enrichment biomarker would need to be established from scratch, introducing first-in-class stratification risk. This is not a minor difference in confidence\u2014it is a categorical difference in evidence maturity. ATR's value of 0.35 reflects this: 'patient axis is unproven' with no clinical precedent. BRAF's value of 0.85 reflects real precedent offsetting remaining uncertainty about optimal biomarker refinement. Both hypotheses share the limitation that single-cell tissue specificity remains unmeasured, but this does not equalize the patient-definition axis, where BRAF starts from a proven population and ATR must define one.", "decisive_evidence": ["BRAF has an approved/Phase 3 small-molecule drug in melanoma (Open Targets drugAndClinicalCandidates), establishing a defined, treatable patient population", "BRAF-mutant melanoma is a well-characterized, clinically actionable biomarker stratum with decades of literature support", "ATR explicitly reports 'no melanoma clinical precedent' and requires synthetic biomarker stratum definition", "BRAF's right_patient confidence is 0.7 (supported by clinical precedent); ATR's is 0.4 (neutral, first-in-class risk)", "The narrative for B explicitly states 'an existing PHASE_3 programme means the stratification and endpoint risk is largely retired'; for A it states 'ATR carries first-in-class stratification risk'"], "missing_evidence": ["Whether ATR inhibition is clinically active in any melanoma subpopulation (e.g., BRAF-wild-type, DNA-damage-high, homologous-repair-deficient cohorts)", "Prospective biomarker definition and clinical trial design for ATR in melanoma", "Comparative clinical efficacy or patient-selection precedent between ATR and BRAF in the same setting"]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses target well-validated melanoma genes in a crowded competitive space, so neither enjoys strong absolute commercial whitespace. However, B (BRAF) has a material advantage on the right_commercial axis because of clinical precedent and de-risked differentiation pathways. BRAF already has a Phase 3 clinical programme, which establishes patient population clarity and reduces stratification risk\u2014a key commercial liability. This precedent also creates clearer paths for differentiation via payload, modality, or resistance biomarker (e.g., acquired BRAF-resistance tumours), rather than needing to invent the patient stratum de novo. A (ATR) lacks any melanoma clinical footprint, meaning it must establish both target validation in a melanoma cohort and a novel biomarker stratum simultaneously\u2014a higher commercial risk profile and slower path to market definition. The competitive intensity appears similar for both (both are high-association targets), but BRAF's existing clinical infrastructure and patient precedent provide tangible competitive positioning advantages that ATR does not have. ATR's commercial case relies entirely on novel modality or payload differentiation; BRAF can differentiate *within* an established market segment with known patients and endpoints.", "decisive_evidence": ["BRAF has a Phase 3 clinical programme in melanoma (right_patient = 0.85, confidence 0.7), establishing a treatable, precedented patient population.", "ATR has no melanoma clinical footprint (right_patient = 0.35, confidence 0.4), requiring de novo biomarker and patient-population establishment.", "BRAF's tractability is de-risked by an approved drug (tractability = 0.9, 'Approved Drug'), lowering chemistry risk and enabling faster proof-of-concept.", "ATR's tractability is conceptual ('Advanced Clinical, High-Quality Ligand'); no approved BRAF-comparable precedent exists for ATR in any indication.", "Both targets have similar crowded competitive landscapes (right_commercial scores 0.3 vs 0.337), so differentiation advantage accrues to the one with clearer market positioning, which BRAF achieves via clinical precedent."], "missing_evidence": ["Explicit competitor count and whitespace quantification for both targets in melanoma.", "Commercial landscape analysis: number of active programmes, clinical stage distribution, and exit valuations for BRAF vs ATR programs.", "Regulatory pathway clarity: breakthrough designation, priority review, or fast-track eligibility for either target in melanoma.", "Payload / modality differentiation potential: specific mechanistic or delivery innovations available to each hypothesis that would justify market entry despite crowding.", "Measured single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets (both marked 'synthetic' / 'unmeasured')\u2014could shift commercial positioning if ATR shows unexpected tumour specificity.", "Biomarker-driven market size: patient prevalence in BRAF-mutant melanoma vs potential ATR-sensitive subpopulations (e.g., replication-stress-high tumours)."]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (BRAF) demonstrates superior tractability on the small-molecule modality axis compared to Hypothesis A (ATR). BRAF has achieved 'Approved Drug' status with multiple tractability buckets satisfied (Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, Druggable Family), whereas ATR is at the 'Advanced Clinical' stage with High-Quality Ligand and Druggable Family buckets satisfied. The presence of an approved drug for BRAF represents direct clinical precedent that de-risks the modality\u2014chemistry feasibility, pharmacokinetics, assayability, and developability are all proven. ATR, while tractable, lacks this clinical validation and remains at higher discovery/development risk. Both targets have druggable pockets and good ligand quality, but BRAF's approved-drug status is the decisive edge for practical tractability.", "decisive_evidence": ["BRAF tractability: 'Approved Drug' bucket satisfied\u2014small-molecule inhibitors already clinically validated", "BRAF five tractability buckets: Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, Druggable Family", "ATR tractability: Advanced Clinical stage only\u2014no approved drug precedent", "ATR three tractability buckets: Advanced Clinical, High-Quality Ligand, Druggable Family", "Both modality = small_molecule, both confidence = 0.9; difference is maturity of evidence"], "missing_evidence": ["Specific structural/pocket quality details for ATR vs. BRAF (Open Targets buckets summarized but not detailed)", "Ligand binding kinetics or selectivity profiles comparing ATR and BRAF inhibitors", "Assay readiness or cell-based potency benchmarks for the respective modalities"]}}}, {"hypothesis_a": "H14", "hypothesis_b": "H2", "relation": "B_dominates_A", "dominator": "H2", "dominated": "H14", "comparison_summary": {"overall_relation": "B_dominates_A", "strictly_better_axes": ["right_target", "right_tissue", "right_safety", "right_patient", "right_commercial", "tractability"], "tied_axes": [], "worse_axes": [], "unresolved_axes": []}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "Both hypotheses show strong, multi-modal causal support for their respective targets in melanoma. However, B (MAP2K1) has materially stronger evidence on the right_target axis: (1) Higher Open Targets disease association score (0.683 vs 0.544), indicating stronger aggregated genetic, somatic, literature, and drug evidence. (2) More constraining loss-of-function constraint (LOEUF o/e = 0.32 vs 0.45), placing MAP2K1 in the constrained tail where LoF intolerance strengthens mechanistic causality and argues for gene essentiality to disease phenotype. (3) Somatic genetics: MAP2K1 sits on 'Signaling by MAP2K mutants'\u2014a direct somatic pathway in melanoma; ATR's pathways are broader (DNA repair / checkpoint) and less specific to melanoma oncogenic drivers. (4) Disease biology: BRAF\u2192MAP2K1\u2192ERK signaling is the canonical melanoma proliferation axis, with known BRAF/NRAS mutations driving disease. ATR is a replication-stress sensor with broader developmental roles. The higher specificity of MAP2K1 to melanoma biology over ATR's housekeeping replication-checkpoint function supports B. Both lack measured single-cell tissue specificity, so that axis is neutral; however, MAP2K1's pathway context (downstream of BRAF) provides a rational prior for moderately higher malignant-cell enrichment than ATR's uniform housekeeping expression.", "decisive_evidence": ["Open Targets disease association: MAP2K1 0.683 vs ATR 0.544 (higher = stronger multi-modal causal signal)", "LOEUF o/e constraint: MAP2K1 0.32 (constrained) vs ATR 0.45 (tolerant); LoF intolerance argues mechanistic causality", "Somatic pathway specificity: MAP2K1 on 'Signaling by MAP2K mutants' (direct oncogenic driver); ATR on DNA repair / checkpoint (broader, less melanoma-specific)", "Disease biology: BRAF\u2192MAP2K1\u2192ERK is canonical melanoma proliferation axis; ATR is a housekeeping replication-stress kinase"], "missing_evidence": ["Single-cell tau (tissue specificity) for both\u2014unmeasured, highest-VoI action", "Malignant-vs-stromal fraction for both\u2014unmeasured", "Explicit somatic mutation frequency and co-occurrence patterns in melanoma (e.g., does ATR loss co-segregate with specific BRAF/NRAS genotypes?)", "Perturbation evidence (e.g., CRISPR dependency screens in melanoma cell lines) comparing ATR vs MAP2K1 selectivity"]}, "right_tissue": {"axis": "right_tissue", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses lack direct, measured single-cell or spatial evidence of tissue specificity and malignant-vs-stromal enrichment in cutaneous melanoma\u2014the core axis requirement. However, they differ in their tissue-context prior and the plausibility of inherited specificity. Hypothesis A treats ATR as a broadly expressed housekeeping replication-stress kinase with no tumor restriction, assigning it a low prior (0.26). Hypothesis B treats MAP2K1 as moderately specific, with specificity inherited from its position as a downstream effector of BRAF in the MAPK pathway (0.6). This pathway context provides a disease-relevant tissue signal: BRAF mutations are melanoma-initiating events enriched in malignant cells, and MAP2K1 sits directly on the BRAF\u2192ERK axis. While neither hypothesis has measured tau or malignant-fraction data, MAP2K1's functional coupling to a melanoma-driver pathway supplies a rational basis for expecting preferential activity in transformed melanoma cells over normal stromal or skin compartments. ATR, by contrast, lacks such a contextualized pointer\u2014it is genuinely non-specific. Both hypotheses explicitly flag single-cell profiling as the highest-VoI next step, and both carry equal measurement risk. However, the synthetic prior that underpins B is more disease-informed than A's default broadly-expressed assumption.", "decisive_evidence": ["Hypothesis A: ATR described as 'housekeeping replication-stress kinase; no tumour restriction' \u2014 a broadly-expressed, non-tissue-selective prior (tau = 0.26, synthetic)", "Hypothesis B: MAP2K1 described as 'downstream of BRAF; specificity inherited from pathway context' \u2014 a moderately-specific prior grounded in BRAF-mutant melanoma biology (tau = 0.6, synthetic)", "BRAF mutations are well-established as melanoma-initiating, enriched in malignant cells; MAP2K1 is a direct effector of BRAF on the ERK pathway", "ATR's role in replication stress is pan-cellular and not melanoma-specific in its baseline function", "Both hypotheses lack measured single-cell, spatial, or malignant-vs-stromal fraction data"], "missing_evidence": ["Single-cell RNA-seq or protein tau (tissue-specificity metric) for ATR in melanoma tissue vs. normal skin and stromal compartments", "Single-cell RNA-seq or protein tau (tissue-specificity metric) for MAP2K1 in melanoma tissue vs. normal skin and stromal compartments", "Spatial transcriptomics or immunofluorescence showing ATR and MAP2K1 localization in malignant vs. stromal cells within melanoma tumors", "Disease-state-specific expression data: ATR and MAP2K1 in primary melanoma, metastatic melanoma, and pre-malignant nevi", "Patient-stratified expression data: whether ATR or MAP2K1 expression correlates with BRAF/NRAS/NF1 mutation status or other melanoma subtypes", "Functional validation: ATR and MAP2K1 dependency in melanoma cell lines stratified by genotype"]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "medium", "rationale": "On the safety axis, Hypothesis B (MAP2K1) presents a materially more favorable profile than Hypothesis A (ATR), though both carry meaningful caveats. B shows a higher safety score (0.9 vs 0.708), supported by a substantially smaller knockout phenotype footprint (24 vs 70 distinct phenotypes). The ATR profile explicitly describes a 'narrow therapeutic window' driven by its role as a housekeeping replication-stress kinase with broad developmental/essential function, creating systemic on-target toxicity risk. In contrast, MAP2K1's safety narrative notes 'no dominant safety liability surfaced' and describes the safety window as 'plausibly open.' Critically, MAP2K1 already has an approved small-molecule drug in clinical use, which provides real-world evidence of tolerability at efficacious doses\u2014a form of de-risking absent for ATR. However, both hypotheses lack tissue-specificity data (right_tissue is unmeasured for both), which is material to the safety calculation; if ATR's off-target exposure could be mitigated by selective delivery, some of the safety gap would collapse. The LoF constraint data (ATR LOEUF=0.45 tolerant; MAP2K1 LOEUF=0.32 constrained) cuts in different directions\u2014ATR's tolerance slightly favors safety, but MAP2K1's constraint combined with its clinical precedent of tolerability is a stronger practical signal.", "decisive_evidence": ["ATR: 70 distinct mouse-knockout phenotypes vs MAP2K1: 24 phenotypes\u20144.2\u00d7 larger phenotype footprint for ATR suggests broader on-target liability", "MAP2K1 has an approved small-molecule drug in clinical use, providing real-world evidence of a manageable safety window at therapeutic doses", "ATR narrative explicitly identifies 'narrow therapeutic window' and 'on-target toxicity in normal tissue' as a headwind requiring tumour-selective delivery compensation", "MAP2K1 narrative states 'no dominant safety liability surfaced' and safety window is 'plausibly open'", "ATR's role as housekeeping replication-stress kinase (ubiquitous, essential) vs MAP2K1 as downstream MAPK component (potentially more signal-specific)"], "missing_evidence": ["Single-cell tissue specificity (tau) and malignant-vs-stromal fraction for both targets\u2014unmeasured and flagged as highest-VoI experiment for both", "Organ-specific toxicity studies or clinical/preclinical data comparing systemic vs tumour exposure ratios for ATR inhibitors", "Detailed characterization of the 24 MAP2K1 knockout phenotypes to assess severity and developmental timing vs the 70 for ATR", "Pharmacokinetic/pharmacodynamic margin data for approved MAP2K1 inhibitors (e.g., selumetinib) to quantify actual therapeutic window in use", "On-target vs off-target toxicity attribution for ATR in preclinical studies (if any exist)"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (MAP2K1) has established clinical precedent with a Phase 3 programme in cutaneous melanoma, meaning the patient population is defined and stratification/endpoint risk is substantially de-risked. The open question is only biomarker enrichment within an already-validated indication. Hypothesis A (ATR) has no clinical footprint in melanoma, requiring first-in-class patient discovery, biomarker definition, and endpoint validation de novo. This represents material first-mover risk on the right_patient axis. While both hypotheses lack complete biomarker granularity, B's clinical footprint directly addresses the core right_patient criterion (defined population, clinical relevance, meaningful precedent), whereas A's lacks any such anchor.", "decisive_evidence": ["MAP2K1 has a Phase 3 clinical candidate in melanoma (Open Targets drugAndClinicalCandidates), establishing a treatable patient population and retiring stratification/endpoint risk.", "ATR has no melanoma clinical precedent (Open Targets drugAndClinicalCandidates), requiring biomarker and patient population discovery de novo.", "MAP2K1's LOEUF=0.32 (constrained) and downstream position in BRAF pathway provide mechanistic causality and pathway specificity context that supports patient relevance.", "ATR's LOEUF=0.45 (tolerant) and broad housekeeping role offer weaker patient-specific evidence and require tissue-specific enrichment to mitigate safety/specificity risk."], "missing_evidence": ["Single-cell tau and malignant-fraction profiling for both hypotheses (acknowledged as unmeasured; tier-3 experiment recommended for both).", "Specific biomarker definition (BRAF mutation status, specific ATR-deficiency phenotype, etc.) for either hypothesis.", "Head-to-head clinical response rates or endpoint definitions from any melanoma trial.", "Patient subpopulation size and unmet-need magnitude for each biomarker stratum."]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses operate in a crowded field with weak synthetic evidence on explicit competitor counts and whitespace. However, Hypothesis B (MAP2K1) has a material commercial advantage over Hypothesis A (ATR) rooted in reduced differentiation burden and de-risked clinical precedent. B benefits from an approved small-molecule drug in the same target\u2013disease pair, which anchors commercial positioning (follow-on, combination, or biomarker-enriched strategy) without requiring invention of new modality or payload novelty to justify entry. A must overcome the same crowding *and* carry the additional commercial risk of having no clinical footprint in melanoma\u2014differentiating a novel ATR approach requires modality innovation (e.g., targeted delivery, synthetic lethality payload, or niche indication) with no template. Neither hypothesis provides hard competitive landscape data (explicit rival programmes, patent estate, market-size-by-stratum), so confidence is medium rather than high. The decisive edge for B is pragmatic: a Phase 3 precedent in the same indication reduces the commercial bar for a follow-on entry, whereas A must justify entry into a target space with no clinical proof-of-concept.", "decisive_evidence": ["MAP2K1 has a Phase 3 clinical candidate in melanoma (right_patient confidence 0.7), providing clinical validation and a defined patient population; ATR has none in melanoma (right_patient confidence 0.4, synthetic).", "MAP2K1 tractability includes 'Approved Drug' status (0.9 confidence); ATR tractability is 'Advanced Clinical' (0.6 confidence)\u2014a material de-risking of modality feasibility.", "Both targets are noted as 'well-trodden' and crowded (ATR 0.337, MAP2K1 0.3, both synthesised); neither enjoys whitespace advantage.", "MAP2K1's position downstream of BRAF in an established pathway context implies easier positioning as a BRAF-synergy or resistance-mechanism play; ATR as a DNA-damage kinase lacks this commercial narrative anchor."], "missing_evidence": ["Explicit competitor programme count and stage distribution for each target in melanoma.", "Patent estate and freedom-to-operate analysis.", "Market segmentation by biomarker stratum (e.g., BRAF-mutant, NRAS-mutant, WT).", "Commercial intelligence on real differentiation levers (modality, payload, patient access) that would justify a new entrant.", "Single-cell tau and malignant-fraction profiling (proposed tier-3 experiment) for both\u2014both lack measured tissue specificity.", "Explicit competitor pricing, market share, and indication-spillover risk."]}, "tractability": {"axis": "tractability", "relation": "B_better", "confidence": "high", "rationale": "Both hypotheses propose small-molecule modality against kinase targets with confirmed druggable pockets. However, they differ materially in modality precedent and de-risking. Hypothesis B (MAP2K1) benefits from an **approved drug precedent** (Approved Drug bucket satisfied) plus structural and ligand-quality validation (Structure with Ligand, High-Quality Ligand, High-Quality Pocket buckets). This represents direct, clinically validated proof that the target-modality combination is tractable and developable. Hypothesis A (ATR) satisfies Advanced Clinical, High-Quality Ligand, and Druggable Family buckets but lacks approved-drug precedent for this target. While both are 'tractable by small molecule,' the presence of an approved comparator drug in the same indication (melanoma, Phase 3) for MAP2K1 substantially de-risks chemistry, ADME, and manufacturability assumptions. ATR remains at the 'credible but unproven' stage for small-molecule modality in this disease context. The axis explicitly prefers 'direct modality precedent, approved drugs' as primary tractability signals.", "decisive_evidence": ["MAP2K1 tractability = 0.9 with Approved Drug bucket satisfied (vs ATR 0.6 with Advanced Clinical only)", "MAP2K1 has Phase 3 clinical precedent in melanoma (from drugAndClinicalCandidates), proving modality-target-disease fit", "MAP2K1 satisfies Structure with Ligand + High-Quality Pocket buckets; ATR lacks explicit structural precedent stated", "Both are kinases with confirmed druggable pockets, but MAP2K1's approved drug removes chemistry/ADME/formulation discovery risk"], "missing_evidence": ["Explicit chemical series maturity or lead-compound quality for ATR (advanced clinical designation suggests some, but not specified)", "In-vivo or clinical ADME/PK data for ATR small-molecule leads (MAP2K1 has this from approved comparator)", "Manufacturing or scale-up precedent for either candidate (neither hypotheses cite this)"]}}}, {"hypothesis_a": "H15", "hypothesis_b": "H1", "relation": "B_dominates_A", "dominator": "H1", "dominated": "H15", "comparison_summary": {"overall_relation": "B_dominates_A", "strictly_better_axes": ["right_target", "right_tissue", "right_safety", "right_patient", "right_commercial"], "tied_axes": ["tractability"], "worse_axes": [], "unresolved_axes": []}, "axis_comparisons": {"right_target": {"axis": "right_target", "relation": "B_better", "confidence": "high", "rationale": "On the right_target axis, BRAF (B) demonstrates materially stronger causal and mechanistic support for melanoma relevance than FGFR1 (A). The Open Targets association score for BRAF is 0.701 vs. FGFR1's 0.544\u2014a difference of 0.157 points. Both scores are confidence-weighted at 0.9 and derived from the same multi-modal aggregation (genetic, somatic, literature, and known-drug evidence), making them directly comparable. The gap reflects BRAF's status as a somatic driver in melanoma: activating BRAF mutations (particularly V600E) are found in ~50% of cutaneous melanomas and are causally implicated in oncogenic transformation. FGFR1, by contrast, sits downstream in PI3K/AKT and MAPK signaling networks but lacks the direct somatic mutation frequency or oncogenic precedent that BRAF carries. Both genes show LoF constraint (LOEUF 0.15 vs. 0.18), supporting mechanistic causality priors equally. Both are embedded in credible pathway ontologies. The decisive difference is the strength and directness of somatic genetic evidence: BRAF mutations are the canonical driver lesion in melanoma; FGFR1 involvement is more inferred from pathway topology and literature association. No evidence suggests FGFR1 mutations or amplifications drive melanoma at comparable frequency or causal weight.", "decisive_evidence": ["Open Targets association score: BRAF 0.701 vs. FGFR1 0.544 (both confidence 0.9, multi-modal aggregation)", "BRAF V600E is a somatic driver mutation in ~50% of cutaneous melanomas (canonical oncogenic lesion)", "BRAF has clinical precedent: Phase 3 drug programme in melanoma (credentialled patient population)", "FGFR1 lacks comparable somatic mutation frequency or primary driver status in melanoma", "Both genes show similar LoF constraint (LOEUF 0.15 vs. 0.18), equally supporting causality priors", "Both genes are embedded in credible MAPK/PI3K pathway ontologies; BRAF sits more proximal to the primary oncogenic driver"], "missing_evidence": ["Single-cell tau specificity and malignant-vs-stromal fraction for both targets (unmeasured, synthetic priors only)", "Quantitative somatic mutation frequency comparison (BRAF vs. FGFR1 in large melanoma cohorts)", "Functional perturbation data (CRISPR loss-of-function) in melanoma cell lines for FGFR1 to rule out compensatory pathway redundancy", "Expression profiling in melanoma tumors vs. normal skin to clarify FGFR1's role in the malignant cell vs. stroma"]}, "right_tissue": {"axis": "right_tissue", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses lack direct single-cell or spatial transcriptomic evidence for tissue specificity and malignant-vs-stromal fraction in melanoma\u2014the unmeasured axis both propose to resolve via tier-3 profiling. However, Hypothesis B (BRAF) carries a disease-context-specific prior that materially strengthens its tissue relevance claim: mutant-BRAF is the definitional oncogenic driver in a large subset of cutaneous melanoma (V600E mutations present in ~50% of cases), meaning BRAF expression and activation are intrinsically linked to malignant melanoma cells in the disease state. Hypothesis A (FGFR1) has no such anchoring to the malignant-cell compartment\u2014it sits on general growth-factor receptor pathways without disease-specific enrichment evidence. The designed prior for BRAF explicitly acknowledges \"mutant-BRAF melanoma is the definitional driver context,\" which is a grounded mechanistic link to disease-relevant tissue. FGFR1's prior is vaguer (\"moderately specific\"; \"weak association-derived placeholder\"). Both scores (0.72 vs 0.633) are synthetic and low-confidence, but B's supporting narrative is disease-contextualized, whereas A's is not. This is the measurable difference on the right_tissue axis before single-cell profiling is done.", "decisive_evidence": ["BRAF: mutant-BRAF (V600E) is the definitional driver oncogenic mutation in ~50% of cutaneous melanoma, anchoring the target to malignant-cell-specific disease context", "BRAF: evidence_gaps narrative explicitly states 'mutant-BRAF melanoma is the definitional driver context,' linking tissue specificity to disease biology", "FGFR1: evidence_gaps narrative states 'no designed prior; weak association-derived placeholder'\u2014no disease-context grounding", "FGFR1: positioned as a general growth-factor pathway player without malignant-cell compartment enrichment evidence"], "missing_evidence": ["Single-cell RNA-seq (tau specificity) for BRAF in melanoma malignant vs. stromal cells", "Single-cell RNA-seq (tau specificity) for FGFR1 in melanoma malignant vs. stromal cells", "Spatial transcriptomics (malignant-vs-stromal fraction) for both targets in disease-stage tissue", "Functional enrichment (phospho-signaling or pathway activation) in BRAF-mutant vs. wild-type melanoma cells for either target", "Patient cohort stratification data by BRAF/FGFR1 mutational or expression status in existing melanoma trials"]}, "right_safety": {"axis": "right_safety", "relation": "B_better", "confidence": "medium", "rationale": "Hypothesis B (BRAF) presents a materially better safety profile than Hypothesis A (FGFR1) on the basis of direct, quantifiable evidence from knockout phenotypes and curated safety liabilities. BRAF shows 77 distinct mouse-knockout phenotypes and 1 curated safety liability (heart disease), whereas FGFR1 shows 202 distinct mouse-knockout phenotypes and 14 curated safety liabilities. The 2.6-fold higher burden of knockout phenotypes for FGFR1 and the 14-fold higher count of curated liabilities suggest a broader essential role and a narrower therapeutic window. Both targets are LoF-constrained (BRAF LOEUF=0.15, FGFR1 LOEUF=0.18), so the genetic-constraint signal is similar. However, the phenotypic breadth and explicit liability count favor BRAF. Both hypotheses acknowledge that systemic inhibition risks on-target toxicity and that the therapeutic window must be recovered through selective delivery or dosing. The clinical precedent for BRAF (Phase 3 programme) provides additional reassurance that acceptable tolerability has already been demonstrated in patients, whereas FGFR1 has no melanoma clinical footprint. This real-world safety and tolerability data for BRAF strengthens confidence that the narrower phenotypic burden translates to a more manageable safety margin in practice.", "decisive_evidence": ["FGFR1: 202 mouse-knockout phenotypes vs. BRAF: 77 mouse-knockout phenotypes (2.6-fold higher burden for FGFR1)", "FGFR1: 14 curated safety liabilities vs. BRAF: 1 curated safety liability (14-fold higher for FGFR1, specifically anaemia, hypophosphataemia, decreased platelet count)", "BRAF has Phase 3 clinical precedent in melanoma, providing real-world tolerability validation; FGFR1 has no melanoma clinical footprint", "Both targets are LoF-constrained (BRAF LOEUF=0.15, FGFR1 LOEUF=0.18), but BRAF's narrower phenotypic signature suggests less systemic toxicity risk despite similar genetic constraint"], "missing_evidence": ["Quantitative comparison of on-target toxicity mechanisms (e.g., BRAF heart disease liability vs. FGFR1 haematologic liabilities) in relevant human tissues and dose-response relationships", "Tissue-level expression and functional essentiality specificity (single-cell tau profiling and malignant-vs-stromal fraction) for both targets\u2014both are marked as unmeasured", "Clinical adverse-event profiles and maximum-tolerated-dose data from BRAF Phase 3 trial(s) to quantify achieved therapeutic window", "Direct comparison of off-target kinase-inhibition liabilities for matched small-molecule scaffolds (both targets are FGFR and RAF family members, but selectivity profiles differ)", "Functional redundancy and compensatory pathway activation (e.g., isoform switching or pathway cross-talk) specific to FGFR1 vs. BRAF inhibition"]}, "right_patient": {"axis": "right_patient", "relation": "B_better", "confidence": "high", "rationale": "Hypothesis B (BRAF) demonstrates clear and material advantage on the right_patient axis. BRAF has established clinical precedent\u2014a PHASE_3 drug candidate already in development for melanoma\u2014which directly de-risks both patient stratification and clinical endpoint definition. This means the treatable patient population is empirically proven and the biomarker enrichment question is refinement, not discovery. Hypothesis A (FGFR1) explicitly lacks any clinical footprint in melanoma, requiring first-in-class patient population and biomarker establishment de novo. Both hypotheses assign identical confidence (0.4) to their tissue-specificity priors, making tissue axis a wash. The decisive difference is clinical precedent: B carries a 0.85 right_patient score (confidence 0.7, supported by real Phase 3 data) versus A's 0.35 score (confidence 0.4, synthetic and unproven). For a patient-impact axis, the presence of an active clinical programme that has already navigated patient selection is a material, direct, and high-confidence advantage.", "decisive_evidence": ["BRAF has a Phase 3 drug candidate recorded in Open Targets drugAndClinicalCandidates; this is real clinical precedent, not synthetic.", "BRAF's right_patient score is 0.85 with confidence 0.7, grounded in an extant clinical programme that has already solved patient stratification.", "FGFR1 explicitly has 'no melanoma clinical precedent' and would require biomarker and population definition de novo (synthetic, first-in-class risk).", "FGFR1's right_patient score is 0.35 with confidence 0.4\u2014weak, unproven, and synthetic.", "Both hypotheses share identical tissue-specificity evidence gaps (unmeasured tau and malignant fraction), so tissue axis does not differentiate them."], "missing_evidence": ["BRAF: specific biomarker stratum identity (e.g., BRAF V600E prevalence, co-mutation patterns) is synthetic; actual patient sub-population definition would refine confidence.", "BRAF: whether resistance mechanisms (e.g., MAP2K1 bypass) are anticipated in the current Phase 3 design; this affects unmet need framing.", "FGFR1: any unpublished or emerging clinical data on FGFR1 in melanoma (grey literature, early-stage trials) that might partially offset the 'no precedent' finding.", "FGFR1: prevalence of FGFR1 mutations or activations in melanoma; if a high-frequency driver exists, patient prevalence could be rapidly validated."]}, "right_commercial": {"axis": "right_commercial", "relation": "B_better", "confidence": "medium", "rationale": "Both hypotheses operate in a crowded melanoma kinase field with limited whitespace. However, Hypothesis B (BRAF) has a material commercial advantage: established clinical precedent (Phase 3 program on record) means the patient population, biomarker stratification pathway, and regulatory playbook are partially de-risked. This lowers the barrier to differentiation\u2014a follow-on programme can compete on improved safety, dosing, or combination strategy rather than proving the entire indication from scratch. Hypothesis A (FGFR1) lacks clinical footprint in melanoma, forcing it to establish both patient enrichment and clinical validation de novo, which increases commercial risk and lengthens time-to-market. Neither target offers strong whitespace (both are well-trodden), so the competitive edge hinges on execution risk: B's existing clinical foundation is a measurable commercial advantage over A's first-in-class stratification burden.", "decisive_evidence": ["BRAF has real clinical precedent: Phase 3 programme already active in melanoma (right_patient = 0.85, confidence 0.7, data_origin hybrid with clinical_candidates)", "FGFR1 has no melanoma clinical footprint: both patient population and biomarker would require de novo establishment (right_patient = 0.35, confidence 0.4, synthetic/unproven)", "BRAF's higher disease association (0.701 vs 0.544) and established MAPK pathway role strengthen its competitive positioning relative to FGFR1", "Both targets are in high-intensity fields; neither offers white-space advantage, so differentiation must come from execution\u2014favoring the target with lower clinical-validation risk"], "missing_evidence": ["Explicit competitor count and market saturation metrics for BRAF vs FGFR1 in melanoma (both synthesised)", "Specific unmet-need gaps in the BRAF Phase 3 landscape (safety, dosing, resistance mechanisms) that a follow-on FGFR1 programme could address", "FGFR1's potential synergy or combination rationale in melanoma (e.g., with MAPK inhibitors)\u2014could elevate commercial positioning if credible", "Regulatory/payer perspective on incremental benefit thresholds for BRAF follow-ons vs first-in-class FGFR1 stratified populations", "Real manufacturing, IP, and supply-chain differentiation (both are small-molecule, de-risked modality)"]}, "tractability": {"axis": "tractability", "relation": "tie", "confidence": "high", "rationale": "Both Hypothesis A (FGFR1) and Hypothesis B (BRAF) satisfy identical tractability criteria on the small-molecule modality axis. Both targets have: (1) approved small-molecule drugs already in clinical use, (2) crystal structures with bound ligands, (3) high-quality ligands, (4) druggable kinase pockets, and (5) membership in a well-characterized protein family (receptor tyrosine kinases and serine/threonine kinases, respectively). Both report a tractability confidence of 0.9 and derive evidence from Open Targets' standardized SM-modality buckets. The presence of approved precedent in both cases means chemistry feasibility and developability are de-risked for both programmes. Neither hypothesis faces modality-specific barriers to ligand discovery, structural tractability, assayability, or delivery. The only tractability-relevant difference\u2014that BRAF has explicit clinical-stage small-molecule precedent while FGFR1 has approved-drug precedent\u2014does not materially separate them on modality-target fit; both demonstrate that small molecules can bind, inhibit, and reach clinical readiness against their respective targets.", "decisive_evidence": ["Both A and B satisfy all five Open Targets SM-modality tractability buckets: Approved Drug, Structure with Ligand, High-Quality Ligand, High-Quality Pocket, Druggable Family.", "Both report identical tractability value (0.9) and confidence (0.9).", "Both are kinase targets with well-characterized ATP-binding pockets and extensive SAR precedent.", "Both have approved or advanced clinical small-molecule inhibitors, proving chemistry and drug developability.", "Neither modality has known structural or assay barriers specific to the target."], "missing_evidence": ["Comparative ligand binding kinetics (Kd, residence time) for FGFR1 vs BRAF small-molecule series.", "Selectivity profile across the kinase family (off-target liabilities for each modality-target pair).", "Formulation or PK barriers unique to FGFR1 vs BRAF inhibitors (though both are small molecules, delivery complexity may differ).", "Comparison of intellectual property landscape or freedom-to-operate on FGFR1 vs BRAF chemistry scaffolds."]}}}], "positions": {"H1": {"x": 230.0, "y": 80}, "H2": {"x": 380.0, "y": 80}, "H3": {"x": 530.0, "y": 80}, "H11": {"x": 680.0, "y": 80}, "H12": {"x": 830.0, "y": 80}, "H4": {"x": 80.0, "y": 300}, "H5": {"x": 230.0, "y": 300}, "H6": {"x": 380.0, "y": 300}, "H15": {"x": 530.0, "y": 300}, "H7": {"x": 680.0, "y": 300}, "H8": {"x": 830.0, "y": 300}, "H9": {"x": 980.0, "y": 300}, "H10": {"x": 455.0, "y": 400}, "H14": {"x": 605.0, "y": 400}, "H13": {"x": 530.0, "y": 620}}, "labels": {}, "run_metadata": {"num_input_hypotheses": 15, "num_removed_by_red_flags": 1, "num_surviving_hypotheses": 14, "num_front_hypotheses": 5, "num_domination_edges": 9, "num_tradeoff_comparisons": 15, "num_comparisons_total": 24, "algorithm_note": "Incremental Pareto construction is input-order sensitive in this first version because dominated non-front hypotheses are not compared against future candidates."}, "bbox": {"min_x": 0.0, "max_x": 1060.0, "min_y": 0, "max_y": 740}}</script>
<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const NODE_R = 24;

const svgNS = "http://www.w3.org/2000/svg";
const svg = document.getElementById('graph');
const nodesG = document.getElementById('nodes');
const edgesG = document.getElementById('edges');
const panel = document.getElementById('panel');
const meta = document.getElementById('meta');

const md = DATA.run_metadata || {};
meta.textContent = `${md.num_input_hypotheses ?? '?'} hypotheses -> ${md.num_surviving_hypotheses ?? '?'} survived red flags -> ${md.num_front_hypotheses ?? '?'} on front (${md.num_domination_edges ?? '?'} domination, ${md.num_tradeoff_comparisons ?? '?'} tradeoff comparisons)`;

function posOf(id) { return DATA.positions[id]; }

function labelFor(id) {
  const l = DATA.labels[id];
  if (!l) return { sub: '', full: id };
  const full = [l.target, l.disease, l.modality].filter(Boolean).join(' \u2022 ');
  let sub = l.target || '';
  if (sub.length > 16) sub = sub.slice(0, 15) + '\u2026';
  return { sub, full: full || id };
}

function elWithAttrs(tag, attrs) {
  const el = document.createElementNS(svgNS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// --- edges (drawn first, under nodes) ---
// Curved as a gentle quadratic bow, alternating sides by index, so edges that
// fan out from/converge on the same hub node separate instead of overlapping
// in a single straight bundle (which is both illegible and hard to click).
const edgeEls = [];
const incidentEdges = {}; // node id -> [edge indices]

DATA.edges.forEach((edge, i) => {
  const isDominance = !!(edge.dominator && edge.dominated);
  const fromId = isDominance ? edge.dominator : edge.hypothesis_a;
  const toId = isDominance ? edge.dominated : edge.hypothesis_b;
  const from = posOf(fromId), to = posOf(toId);
  if (!from || !to) return;

  (incidentEdges[fromId] ||= []).push(i);
  (incidentEdges[toId] ||= []).push(i);

  const dx = to.x - from.x, dy = to.y - from.y;
  const dist = Math.hypot(dx, dy) || 1;
  const ux = dx / dist, uy = dy / dist;
  const px = -uy, py = ux;
  const endPad = isDominance ? 8 : 2;
  const x1 = from.x + ux * (NODE_R + 2), y1 = from.y + uy * (NODE_R + 2);
  const x2 = to.x - ux * (NODE_R + endPad), y2 = to.y - uy * (NODE_R + endPad);
  const bow = Math.min(28, dist * 0.16) * (i % 2 === 0 ? 1 : -1);
  const mx = (x1 + x2) / 2 + px * bow, my = (y1 + y2) / 2 + py * bow;
  const d = `M${x1},${y1} Q${mx},${my} ${x2},${y2}`;

  const kind = isDominance ? 'dominance' : 'tradeoff';
  const g = elWithAttrs('g', { class: `edge ${kind}`, 'data-idx': i });
  // Wide invisible stroke so the clickable area is much bigger than the
  // visible 2px line - the line itself stays thin and elegant.
  const hit = elWithAttrs('path', { class: 'edge-hit', d });
  const lineAttrs = { class: 'edge-line', d };
  if (isDominance) lineAttrs['marker-end'] = 'url(#arrow)';
  const line = elWithAttrs('path', lineAttrs);
  g.appendChild(hit);
  g.appendChild(line);
  g.addEventListener('click', () => selectEdge(i, g));
  if (isDominance) {
    g.addEventListener('mouseenter', () => line.setAttribute('marker-end', 'url(#arrow-accent)'));
    g.addEventListener('mouseleave', () => {
      if (!g.classList.contains('selected')) line.setAttribute('marker-end', 'url(#arrow)');
    });
  }
  edgesG.appendChild(g);
  edgeEls.push(g);
});

// --- nodes ---
DATA.nodes.forEach(n => {
  const p = posOf(n.hypothesis_id);
  if (!p) return;
  const g = elWithAttrs('g', { class: 'node', transform: `translate(${p.x},${p.y})` });
  const circle = elWithAttrs('circle', { r: NODE_R, class: `status-${n.status}` });
  const text = elWithAttrs('text', { y: 4 });
  text.textContent = n.hypothesis_id;
  g.appendChild(circle);
  g.appendChild(text);

  const lbl = labelFor(n.hypothesis_id);
  const title = elWithAttrs('title', {});
  title.textContent = lbl.full;
  g.appendChild(title);

  if (lbl.sub) {
    // A translucent backing plate keeps the sublabel legible where a curved
    // edge happens to pass underneath it.
    const bg = elWithAttrs('rect', {
      class: 'sublabel-bg', x: -34, y: NODE_R + 5, width: 68, height: 14, rx: 4,
    });
    const sub = elWithAttrs('text', { class: 'sublabel', y: NODE_R + 15 });
    sub.textContent = lbl.sub;
    g.appendChild(bg);
    g.appendChild(sub);
  }

  g.addEventListener('click', () => selectNode(n));
  g.addEventListener('mouseenter', () => highlightIncident(n.hypothesis_id));
  g.addEventListener('mouseleave', clearIncidentHighlight);
  nodesG.appendChild(g);
});

function highlightIncident(hypothesisId) {
  const incident = new Set(incidentEdges[hypothesisId] || []);
  edgeEls.forEach((g, i) => {
    g.classList.toggle('incident', incident.has(i));
    g.classList.toggle('dimmed', !incident.has(i));
  });
}
function clearIncidentHighlight() {
  edgeEls.forEach(g => { g.classList.remove('incident'); g.classList.remove('dimmed'); });
}

let selectedEdgeEl = null;

function clearSelection() {
  if (selectedEdgeEl) {
    selectedEdgeEl.classList.remove('selected');
    const prevLine = selectedEdgeEl.querySelector('.edge-line');
    if (selectedEdgeEl.classList.contains('dominance')) prevLine.setAttribute('marker-end', 'url(#arrow)');
  }
  selectedEdgeEl = null;
}

function axisTagText(rel, edge) {
  if (rel === 'A_better') return `${edge.hypothesis_a} better`;
  if (rel === 'B_better') return `${edge.hypothesis_b} better`;
  return { tie: 'tie', incomparable: 'incomparable',
            insufficient_evidence: 'insufficient evidence' }[rel] || rel;
}

function renderEvidence(title, items) {
  if (!items || !items.length) return '';
  return `<div class="rationale"><strong>${title}:</strong><ul class="ev-list">${
    items.map(x => `<li>${escapeHtml(x)}</li>`).join('')
  }</ul></div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function selectEdge(i, g) {
  clearSelection();
  g.classList.add('selected');
  selectedEdgeEl = g;
  if (g.classList.contains('dominance')) {
    g.querySelector('.edge-line').setAttribute('marker-end', 'url(#arrow-accent)');
  }

  const edge = DATA.edges[i];
  const summary = edge.comparison_summary || {};
  const isDominance = !!(edge.dominator && edge.dominated);

  let title, chips;
  if (isDominance) {
    title = `${edge.dominator} dominates ${edge.dominated}`;
    chips = (summary.strictly_better_axes || [])
      .map(a => `<span class="chip">${a} \u2192 dominator</span>`).join('');
  } else {
    title = `${edge.hypothesis_a} vs ${edge.hypothesis_b} \u2014 tradeoff / unresolved`;
    const forA = (summary.strictly_better_axes_for_A || [])
      .map(a => `<span class="chip">${a} \u2192 ${edge.hypothesis_a}</span>`).join('');
    const forB = (summary.strictly_better_axes_for_B || [])
      .map(a => `<span class="chip">${a} \u2192 ${edge.hypothesis_b}</span>`).join('');
    chips = forA + forB;
  }

  const axisOrder = ['right_target','right_tissue','right_safety','right_patient','right_commercial','tractability'];
  const axisHtml = axisOrder.filter(a => edge.axis_comparisons[a]).map(a => {
    const c = edge.axis_comparisons[a];
    return `<div class="axis-block">
      <div class="axis-head">
        <span class="axis-name">${a.replace(/_/g, ' ')}</span>
        <span class="axis-tag ${c.relation}">${axisTagText(c.relation, edge)}</span>
      </div>
      <div class="confidence">confidence: ${c.confidence}</div>
      <div class="rationale">${escapeHtml(c.rationale)}</div>
      ${renderEvidence('Decisive evidence', c.decisive_evidence)}
      ${renderEvidence('Missing evidence', c.missing_evidence)}
    </div>`;
  }).join('');

  panel.innerHTML = `
    <h2>${title}</h2>
    <div class="rel">${summary.overall_relation || ''}${!isDominance && summary.reason ? ' \u2014 ' + summary.reason : ''}</div>
    <div class="summary-row">${chips}</div>
    ${axisHtml}
  `;
}

const SEVERITY_TAG_CLASS = { critical: 'incomparable', major: 'B_better', minor: 'tie' };

function renderRedFlagDetail(detail) {
  if (!detail) return '';
  const flagBlocks = (detail.red_flags || []).map(f => `
    <div class="axis-block">
      <div class="axis-head">
        <span class="axis-name">${escapeHtml(f.category).replace(/_/g, ' ')}</span>
        <span class="axis-tag ${SEVERITY_TAG_CLASS[f.severity] || 'tie'}">${f.severity}</span>
      </div>
      <div class="rationale">${escapeHtml(f.reason)}</div>
    </div>
  `).join('');
  return `
    <div class="rationale"><strong>Why removed:</strong> ${escapeHtml(detail.rationale)}</div>
    ${flagBlocks}
  `;
}

function selectNode(n) {
  clearSelection();
  const lbl = DATA.labels[n.hypothesis_id] || {};
  const chips = `
      ${lbl.target ? `<span class="chip">target: ${escapeHtml(lbl.target)}</span>` : ''}
      ${lbl.disease ? `<span class="chip">disease: ${escapeHtml(lbl.disease)}</span>` : ''}
      ${lbl.modality ? `<span class="chip">modality: ${escapeHtml(lbl.modality)}</span>` : ''}
  `;

  if (n.status === 'red_flagged') {
    panel.innerHTML = `
      <h2>${n.hypothesis_id}</h2>
      <div class="rel">status: red-flagged (removed before Pareto analysis)</div>
      <div class="summary-row">${chips}</div>
      ${renderRedFlagDetail(n.red_flag_detail)}
    `;
    return;
  }

  panel.innerHTML = `
    <h2>${n.hypothesis_id}</h2>
    <div class="rel">status: ${n.status}</div>
    <div class="summary-row">${chips}</div>
    <p class="empty-hint">Click an edge touching this node to see the comparison behind it.</p>
  `;
}

// --- zoom / pan (SVG viewBox-based) ---
const bbox = DATA.bbox;
const contentBox = {
  x: bbox.min_x, y: bbox.min_y,
  w: bbox.max_x - bbox.min_x, h: bbox.max_y - bbox.min_y,
};

// Pad contentBox to match the container's aspect ratio so the initial view
// fills the panel instead of letterboxing (preserveAspectRatio="meet" would
// otherwise leave dead space on whichever axis doesn't constrain the fit).
function fitToContainer(box) {
  const rect = svg.getBoundingClientRect();
  const containerAspect = rect.width / rect.height;
  const contentAspect = box.w / box.h;
  let w = box.w, h = box.h;
  if (contentAspect > containerAspect) {
    h = w / containerAspect;
  } else {
    w = h * containerAspect;
  }
  const cx = box.x + box.w / 2, cy = box.y + box.h / 2;
  return { x: cx - w / 2, y: cy - h / 2, w, h };
}

const fit = fitToContainer(contentBox);
let viewBox = { ...fit };

function applyViewBox() {
  svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
}
applyViewBox();

const MIN_ZOOM_W = fit.w * 0.08;
const MAX_ZOOM_W = fit.w * 4;

function zoomAt(clientX, clientY, factor) {
  const rect = svg.getBoundingClientRect();
  const mx = viewBox.x + (clientX - rect.left) / rect.width * viewBox.w;
  const my = viewBox.y + (clientY - rect.top) / rect.height * viewBox.h;
  let newW = viewBox.w * factor;
  if (newW < MIN_ZOOM_W || newW > MAX_ZOOM_W) return;
  const newH = viewBox.h * factor;
  viewBox = {
    x: mx - (mx - viewBox.x) * factor,
    y: my - (my - viewBox.y) * factor,
    w: newW, h: newH,
  };
  applyViewBox();
}

svg.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = Math.pow(1.0015, e.deltaY);
  zoomAt(e.clientX, e.clientY, factor);
}, { passive: false });

let isPanning = false;
let panStart = null;

svg.addEventListener('pointerdown', (e) => {
  if (e.target.closest('.node') || e.target.closest('.edge')) return;
  isPanning = true;
  svg.classList.add('panning');
  panStart = { x: e.clientX, y: e.clientY, vb: { ...viewBox } };
  svg.setPointerCapture(e.pointerId);
});
svg.addEventListener('pointermove', (e) => {
  if (!isPanning) return;
  const rect = svg.getBoundingClientRect();
  const dx = (e.clientX - panStart.x) * panStart.vb.w / rect.width;
  const dy = (e.clientY - panStart.y) * panStart.vb.h / rect.height;
  viewBox = { ...panStart.vb, x: panStart.vb.x - dx, y: panStart.vb.y - dy };
  applyViewBox();
});
function endPan() { isPanning = false; svg.classList.remove('panning'); }
svg.addEventListener('pointerup', endPan);
svg.addEventListener('pointerleave', endPan);

document.getElementById('zoom-in').addEventListener('click', () => {
  const rect = svg.getBoundingClientRect();
  zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, 0.8);
});
document.getElementById('zoom-out').addEventListener('click', () => {
  const rect = svg.getBoundingClientRect();
  zoomAt(rect.left + rect.width / 2, rect.top + rect.height / 2, 1.25);
});
document.getElementById('zoom-fit').addEventListener('click', () => {
  viewBox = { ...fit };
  applyViewBox();
});
</script>
</body>
</html>
